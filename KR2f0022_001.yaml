body:
  text: 楊文忠三録卷一明楊廷和撰題奏前録自劾不職乞賜罷黜以答天譴疏具官臣楊廷和等謹題為自劾不職乞賜罷黜以答天譴事臣等伏見皇上昨以乾清宮被災既下令羣臣同加修省復申敕所司直陳時政即古昔聖帝明王遇災而懼之心也切惟災變之來感召有自皇上嗣登大寶十年於兹寬仁愛人任用賢俊刑政無失惠澤覃敷宜乎景福茂膺休徴協應夫何近歲以來災異遞見水旱頻仍盜賊縱橫兵戈不息強敵侵擾邊境未寧五星失度千里飛蝗隕霜雨雹之非時地震天鳴之相繼軍民困苦帑藏空虛人多怨咨天不悔禍兹乃復有此變宗廟震驚臣民悚懼聖明在上何以致之感召之由實在臣等蓋臣等德薄位高力小任重陛下有上智之資而臣等無格心之學陛下有大有為之志而臣等無濟時之才議論不足以禆萬幾之裁决誠意不足以動九重之視聽先事既無開陳之益臨事又無匡救之功瘝曠有年憂慙無地若復依違不去將恐過咎愈深一時之物議既難茍容後世之公評豈能終掩况周官燮理不備其人而漢庭䇿免亦有故事輒敢披瀝悃誠冒干天聽伏望俯從寬貸特賜罷歸别選賢能以充委任庶贊化得人而變可弭矣然消復之道惟賴於聖明而轉移之機正在於今日尤望陛下念皇天付託之重祖宗創造之艱天下生民仰戴之切早朝宴罷以延接羣臣深居簡出以頤養聖體九廟之蒸嘗必親其事兩宮之孝養必主於誠經筵勤日講之御殿庭復面奏之規大開言路通達下情還兊調邊兵以謹外防革禁中市肆以肅內令出西僧於外以絶異端罷皇店之設以通商賈停止一應工作以惜民力減免各處織造以節民財任用正直忠良之士親信老成持重之人夙夜孜孜圖惟治理將見人心悅服天意咸孚和氣薰蒸政教旁達羣盜望之而革心四裔聞之而向化宗社萬萬年無疆之慶也臣等無任激切懇祈之至正德九年正月十九日聖㫖上天示警朕心弗寧寢食遑遑卿等致意朕已悉知九廟兩宮惟日是謹早朝深居朕自處置經筵等項已有成規邊兵只照前㫖市肆常理西僧舊制俱不必改動皇店嚴加禁約下人工作織造著該衙門條陳緩急來看方殷事冗宜盡心輔導以紓朕之不逮用保康寧以寬朕懷所辭不允該衙門知道請遵祖訓以光聖德疏具官臣楊廷和等謹題為遵祖訓以光聖德事臣等聞之禮莫重於視朝禁莫嚴於宮衛自古帝王之治天下必謹視朝之節以觀示臣民嚴宮衛之防以消彌禍變我朝列聖尤致謹於斯伏覩皇明祖訓所載有曰朕以乾清宮為正寢晚朝畢而入清晨星存而出除有疾外平康之時不敢怠惰此所以畏天人而國家所由興蓋言視朝之當謹也又曰凡帝王居安常懷警備日夜時刻不敢怠慢雖親如骨肉朝夕相見猶當警備於心蓋言宮衛之當謹也此皆憂深思逺制治保邦之言聖子神孫所當時時誦讀守為家法者也恭惟皇上聰明天授政令之施動遵祖訓近年以來朝㑹慶賀或至遲暮其初蓋因一時起居違和而然積習既久遂以為常傳之外朝將謂縱耳目之玩極心志之樂觀聽之間不無惶惑去歲以來揀選人馬親自校閲其事蓋因一時敵冦犯順而然意在禦侮實非有他傳之天下皆謂邊兵非宿衛之人禁禦非操練之所疑似之間未免驚駭臣等職居輔導出入禁闥雖隨事納規時有陳請緣議論不足以發明事體誠意不足以孚契聖心尸素有年愧悚無地伏望皇上鑒皇祖之訓典察臣等之愚忠自今以後夙興視朝躬親祀事乘清明之氣以裁决萬機竭享獻之誠以昭格九廟仍選用方直以為侍從信任老成以為腹心軍士操練必於演武之所朝夕督勵付之將領之官推恩左右體悉勤勞啓處以時庶不有勞於聖體關防既謹亦可盡釋於羣疑將見聖德日新天心悅豫神人胥慶和氣致祥宗社萬萬年無疆之休端在此矣臣等下情無任激切祈望之至正德十年正月十七日請宣布捷音并候㫖决囚疏具官臣楊廷和等謹題為宣布捷音并候㫖决囚事近該兩廣四川奏到捷音例該宣捷因聖駕在邊未及舉行今大同又奏到捷音內開分布將士隨機應變皆出皇上神謀妙算以致大有成功臣等下情不勝慶幸然非早賜回鑾臨朝宣捷則天下臣民何由知皇上逺出巡邊有此除冦安民之功哉况决囚日期已近若該科三覆奏既下各項該决重囚本日即當押赴市曹依律處决其家人或有擊鼓欣寃等項皆當臨時奏請取自上裁非比别項事情可以預先裁定伏望皇上早賜回鑾宣捷示衆既以彰天威於天下而亦不廢每嵗處决重囚之舊典臣等不勝懇切祈望之至正德十二年十一月某日請處决重囚疏具官臣楊廷和等謹題為處决重囚事近該司禮監官傳諭聖意欲將今年該决重囚曽經刑科三覆奏者俱押赴市曹示將處决以警凶惡之徒隨即傳㫖取回仍送各該原問衙門照舊監禁此固皇上用刑警衆而又慎重人命不輕殺戮之意但臣等竊謂聖駕既逺臨邊境凡齎去一應題奏事理往返動經旬日然後得㫖批出行下所司今乃不出半日之內概將該决重囚方欲處决隨即取回則人心孰不驚疑以為是何衙門頃刻之間便從何處得奉㫖意如此之速不知將何辭以解之况重囚臨刑其親屬有擊鼓訴寃者直鼓給事中於校尉手上批字走赴市曹暫免行刑具本連鼓狀封進候㫖裁决或殺或留皆在臨時有難預處此係祖宗舊制纍朝遵行孰敢輕變所以臣等前日擬票欲將各項該决重囚俱且監著留待明年秋後審録畢日照舊三覆具奏依律處决伏望仍依原票批出庶事體允當人心不至驚疑而於祖宗立法之意朝廷欽恤之仁亦兩全矣伏惟聖明鑒納正德十二年十一月二十三日請大祀看牲疏具官臣楊廷和等謹題為大祀看牲事照得每歲大祀天地俱先期十二月初一日聖駕躬詣犧牲所看牲此祀天之禮乃祖宗舊制國家大事至嚴至重非他禮儀可比纍朝遵行惟謹皇上臨御以來亦已十二舉矣天心孚祐福祉無疆端係於此近日有㫖閏十二月初一日看牲較之往歲已遲一月即今日期將近未覩回鑾中外人心曷勝懸望且聖駕在外已踰三月臣等內外臣工遙望天顔無由瞻拜悵悵然如人子之逺違父母而身無所依也朝夕食寢豈能自安况邊塞苦寒聖體勤勞意外之虞又有不可不防者此尤臣等之所大慮伏望聖明念一身為天地宗廟社稷之主而郊祀看牲大禮不可一毫少忽亟降明㫖振旅還京實天下臣民之至願也臣等無任忠愛拳拳之至正德十二年十二月某日自劾不職乞賜罷歸田里疏具官臣楊廷和等謹奏為自劾不職乞賜罷歸田里事臣等竊惟朝廷設置公卿輔弼之臣望其陳力效忠將順匡救以共成天下之務非徒取其充位而已兹者皇上出巡邊境數月未回中外人心日夕憂懼臣等備員內閣職專輔導平日既無格心之學臨事又非濟時之才竊位素餐涓埃莫報雖嘗纍疏奏請回鑾又不能少回天聽以慰天下臣民之望誠恐一旦禍患之來出於意料之所不及則臣等雖貶竄誅殛亦不足以贖其罪矣伏望皇上俯察愚誠奮施乾斷亟將臣等即日罷歸田里以為人臣不能盡忠之戒别選賢能代居重任庶幾或有轉移感動之機而臣等雖退猶進雖死猶生也臣等無任迫切殞越俟命之至正德十二年某月某日請回鑾看牲疏具官臣楊廷和等謹題為速請回鑾看牲以成大禮事今日早該司禮監太監蕭敬等於左順門傳奉聖㫖今特差太監張永魏彬張忠趙林齎帖傳與司禮監太監蕭敬等知道即今尚有邊報未寧目下不得便行所有閏十二月初一日起照舊差官輪流看牲不誤大祀天地爾各衙門大小官員各要安心辦事該衙門知道欽此臣等竊為人君之道莫大於敬天敬天之禮莫大於郊祀是以我祖宗列聖百五十餘年來每遇郊祀必於前一月躬往看牲嵗之首月卜日行禮所以天心克享而天下久安仰惟皇上為天之子受祖宗列聖之天下果能上體祖宗列聖之心以事天則天之眷我皇上亦將無異於祖宗列聖之時矣今駐蹕關外久未回鑾顧謂邊報未寧便欲差官先行輪看臣等愚昧心竊未安况邊報縱有未寧自有各該鎮巡等官分任其責皇上但當專其委任明信賞罰則邊境自爾無虞豈可以是為詞遂欲廢此百五十餘年盛典萬一天下臣民及各處宗藩有疑於此而具奏問故則將何說以應之此事係國安危利害不小伏望皇上俯從臣等所言收回新命即日回鑾躬往南郊看牲以成大禮則人心安而天意悅宗社萬萬年無疆之慶端在是矣臣等不勝懇切俟命之至正德十二年十二月某日請回鑾看牲第二疏具官臣楊廷和等謹題為請駕看牲事臣等數日前恭聞回鑾有期不誤看牲下情不勝欣慶近日禮部又節奉聖㫖閏十二月初一日起照舊差官輪流看牲不誤大祀天地臣等愚昧心切不安未敢奉命是以不避斧鉞恭詣居庸關下北望稽首昧死上請伏望皇上念郊祀大禮祖宗舊制速賜回鑾躬往看牲畢然後羣臣以次往看庶得不廢舊制克成大禮實宗社萬萬年無疆之慶也謹題請㫖正德十二年十二月二十七日論緊急賊情疏具官臣楊廷和等謹題為緊急賊情事近日武清東安等縣盧溝橋及清河店等處四面俱有盜賊生發少則四五十人多則百十餘人披帶盔甲兵器擺列馬隊旗號劫掠村店燒燬房屋殺虜人口搶奪財物敵殺官軍數多往來公差內外官員人等悉被其害道路為之不通而京城之內東直門及大時雍等坊强賊白日殺人劫財亦往往有之即今各該地方報到賊情殆無虛日該部奏請調度軍馬支給錢糧未奉明㫖難以擅便施行不無有誤事機臣等竊思前項盜賊固由饑寒窮迫不能聊生以至於此實亦數月以來窺知聖駕逺狩邊境京城居守無人投間抵隙肆無忌憚若不及早撲滅恐致日漸滋蔓不但如近年劉六楊虎之禍而已誠不可不慮也伏望皇上以宗社為憂以生靈為念及早還京庶幾諸司章奏易於上達九重裁斷便於奉行彼强梁不逞之徒不待𠞰捕而自然潜消退伏矣况今郊祀天地時享太廟正旦朝賀各項大禮相繼在邇所以聳四方之觀聽繫天下之人心者尤在於此誠不可不慎也此實治亂安危之幾臣等故敢昧死為陛下言之伏望聖明獨運乾剛深惟至計俯垂聽納天下幸甚臣等不勝恐懼激切之至正德十二年閏十二月某日請慎重郊廟元旦等項大禮以慰神人疏具官臣楊廷和等謹題為慎重郊廟元旦大禮以慰神人事照得嵗暮孟春時享太廟及正月元旦節臨朝受賀皆係朝廷大禮而大祀天地其事尤重自古至今惟天子得以祀天地蓋人君為天之子實天地之主也非天子而祀天地則必不能上享天心以覬天之錫福降祥於天下而祖宗在天之靈惟聖子神孫是憑是依自鑾輿出關巳經五月祖宗神靈亦切望聖駕早回躬行奠獻以得有所依歸祖宗之祀天地皆極其精誠未嘗少有怠慢其說載於祖訓中所列嚴祭祀條者甚詳又元旦乃一嵗之首履端之慶錫自朝廷四方萬國皆欲遂其瞻仰祝頌之誠今去郊天享廟及元旦臨朝之期甚近伏望皇上速賜回鑾恪遵祖訓躬行大禮使天人上下皆有所主祖宗神靈皆有所依實宗社萬萬年無疆之慶也臣等不勝懇切仰望之至正德十二年閏十二月二十二日請駕還京疏具官臣楊廷和謹題為請駕還京事伏惟聖駕在外巳餘一月臣等犬馬之情依依戀慕以日為年近又風聞親統六師將出喜峰口外使人招引三衛人等近邊交易人情惶惶莫知所措臣等竊念兵以治亂如藥以治病無病而服藥非養生之術也無事而好兵非治安之道也見今三衛人等朝貢以時邊境安靖無可征之罪無可乘之釁陛下不知聽何人之言用何人之策輕啓兵端逺臨邊境如無病之人試大毒之藥又率易自用不付之良醫之手况炎天酷暑非出兵之時深山茂林非行兵之路萬一變生不測不知誰任其罪此在凡人稍知自愛者尚不肯為而謂陛下為之乎臣職在輔導坐視不言萬死莫贖伏望俯賜鑒納早回鑾輿深居九重頤養聖體以兵政委之兵部以邊備責之邊臣坐收不戰之功永建無疆之業實宗廟社稷之福天下臣民之慶也臣不勝激切祈望之至謹題請㫖正德十三年四月某日請聖駕還京以安宗社以慰人心疏具官臣楊廷和謹題為恭請聖駕還京以安宗社以慰人心事伏惟聖駕出幸今巳一月矣內外人心栗栗危懼又有訛言傳播總督軍務威武大將軍名號及巡幸山西陜西河南山東南北直隸之說愚民無知轉相告語甚至扶老攜幼逃避山谷此風一傳關係甚大臣愚竊念自古人君乘輿逺幸或以邊境侵擾或以臣下逆命皆因不容巳之勢乃有不得巳之行今陛下當無事之時為有事之舉雖有內外左右忠良之臣諫亦不聞言亦不入不知聖明之見何以出此見今邦畿逺近盜賊公行江淮南北大水為患各處災異奏報不絶士馬疲勞財用匱乏天變於上人怨於下誠恐朝廷之憂不在邊方而在腹裏不在四裔而在百姓也伏望早回鑾輿亟下明詔將前日訛言所傳一切禁約改正自今以後有仍以總督威武大將軍名號見於文移行下官府者坐以詐傳聖㫖重典其原日調來邊兵俱各放回本鎮照舊操守原留隨侍將官亦宜因能授任使之各守職業示以寬大之恩消其疑畏之念陛下深居宸極頤養天和以奉慈闈之歡以俟前星之耀則事體自定人心自安宗社萬萬年無疆之福也臣受恩深厚衰病日加屢疏乞休未䝉俞允困卧床褥與死為鄰前項事情目擊耳聞痛切心肺義不容於不言情不忍於不言故敢冒死言之伏望聖明俯賜採納不勝幸甚正德十三年十月某日止侍郎馮清奏捷疏該司禮監發下整理兵馬糧草等項侍郎馮清奏到捷音二本臣等仰惟皇上親統六師指授將士在於陜西寧夏延綏各邊及薊州等處地方斬獲賊級數多聖武布昭敵人逺遁禮宜宣捷慶賀隨征將士亦宜論功行賞但馮清本內俱開有欽差總督軍務威武大將軍總兵官鎮國公朱字樣恐於事體有礙無以傳示天下垂法後世臣等未敢輕易擬㫖伏望皇上將前項題本不必批出仍令馮清另行具奏止是明言仰遵成算致有此捷庶事體當而人心安矣所有前項題本謹隨揭帖封進伏乞聖明鑒納正德十四年正月某日止逰幸疏具官臣楊廷和等謹題臣等荷國厚恩切官內閣供職無狀心切憂慚竊見近日以來在京各該衙門題奏一應軍馬錢糧緊要事情動經旬月猶未得㫖事多壅滯不行又道路相傳聖駕不時巡行市肆或至夷館菜園等處逰幸夜或不歸甚至馳驟街衢衝冒風雨深更靜夜出入宫門臣等初聞且驚且疑未敢輕信巳而流傳既久衆議紛然今亦不敢不信况聞逺處軍民皆有不美之談臣等之心尤有不勝其隱憂者謹具奏聞伏惟聖明鑒納自今以後切望尊居九重裁决庶務頤養天和茂隆國本流通政務安內攘外綿宗社億萬年無疆之慶臣等不勝惓惓至願正德十四年某月某日請上尊號疏臣楊廷和等謹題臣等仰惟聖母皇太后克配先帝誕育聖躬自皇上臨御以來德化𢎞敷海宇寧謐是皆祖宗列聖洪庥及聖母餘慶致然也以此臣等下情議謂宜如天順年間英宗皇帝加上皇太后孫氏尊號及成化年間憲宗皇帝加上皇太后周氏尊號故事請於聖母今尊號慈夀二字之上加至四字以極尊崇用彰皇上聖孝此亦中外臣民所同致願者也如䝉聖明嘉納特賜允行臣等謹當議擬上請取自聖裁仍乞預敕禮部具儀行禮頒示天下謹題請㫖正德十四年三月某日時外議喧傳聖駕將南巡乃上此疏將藉以留止聖駕竟不報議處江西事情疏臣楊廷和等謹題本月十四日早該司禮監太監蕭敬等同到內閣送下御史蕭淮所奏一本傳諭聖意令臣等看詳議處臣等看得本內開稱寧王聽信奸人出入王城撥置主使陵轢官府强脅郡王虐害忠貞招納亡命打死平人霸占官民田土差來內官旗校人等潜住京師經年纍月前後踵接不知何所營謀及江西鎮巡官太監畢真都御史孫燧御史林潮不能以理規正却又過為推善等情其撥置主使之人各有指名又與前次本府典寶副等官閻順等所奏大略相同事關宗社大計宜存逺慮臣等查得宣德初年趙府被人訴告不法事情我宣宗皇帝遣駙馬都尉袁容都御史劉觀齎捧敕書前去戒諭趙府隨即獻還護衛及羣牧所朝廷待之如初合無照依前例寫書一道遣司禮監太監駙馬都尉都御史各一員領敕前去宣諭皇上保全宗室至意姑從寬貸令其獻還護衛并屯田仍屬江西都司管轄其所奏占種官民田土等項亦各退出先年聽招賊首凌十一閔念四等及其徒黨逐一散遣一應撥置人員不許仍前在府出入仍敕江西鎮守巡撫巡按三司等官并護衛指揮千百戶總旗等一一遵奉施行如此庶幾朝廷親親之情祖宗世守之法兩盡而不廢矣臣等未敢擅擬伏乞聖裁正德十四年某月某日論鎮守官敕書疏宣府巡撫官敕舊與大同稍異都御史寧杲有宣府之命謀欲易之如大同㑹宣府鎮守太監劉祥大同馬錫俱隨駕在京因請以巡撫責任備載太監總兵敕內司禮監屢來傳諭上意執奏如後看得各處鎮守巡撫等項官員各有職掌備載敕書此係祖宗纍朝舊制臣等遇凡奉㫖撰寫止是檢抄舊稿換新命職名間有因事加添責任亦必該部議奏得㫖明白開具印信手本送到內閣然後據其原行增入敕內事畢隨即照舊查改未有該部無行輒敢擅用已意撰擬以更舊制伏乞聖明鑒納正德十四年六月初一日論鎮守官敕書第二疏臣等竊見我朝命各處鎮守總兵官統領軍馬防禦戰守巡撫都御史撫安軍民禁革奸弊鎮守太監託以腹心之寄各有一定職掌祖宗纍朝敕書彼此不同皆有深意此固祖宗纍朝之成法亦皇上世守之成法也是以臣等於宣大二處鎮巡等官敕書只遵奉皇上成法抄謄舊稿進呈請㫖書寫不敢茍從一時新命蓋慮他日聖心悔悟責怒臣等以為不能恪守舊制加以罪戾則臣等死有餘愧矣以此謹將寧杲敕書仍照前任巡撫官舊稿封進伏乞批下謄黃早令前去巡撫以安地方庶不悮事臣等愚昧不勝惓惓忠懇之至正德十四年六月初三日進初七日奉聖㫖朕覽卿等奏詞具己悉知但前次巡狩地方各官隨侍偶有事件往返者數次令特通降便宜敕書易於行事永為定規論鎮守官敕書第三疏臣等看得各處地方自纍朝設立鎮守巡撫等官以來各官職守載在敕書先後相承遵奉惟謹未嘗輒改一事蓋朝廷既恪守祖宗之法彼領敕之臣自不得不恪守朝廷之法孰敢輕易陳請以干國憲今早該司禮監官傳諭聖意發下揭帖欲令臣等將延綏山西寧夏甘肅陕西遼東薊州各總兵巡撫官本等職任俱增入各鎮守太監敕內緣鎮守巡撫等官雖同有地方之責而城池兵馬錢糧獄訟各有所司職掌責任彼此不同係干定制今一旦無故輕易變更他日律以祖宗之法孰任其咎以此臣等不敢曲為阿順仰遵新命伏惟聖明鑒納正德十四年某月某日奏上未允司禮監日來催進稿張鋭送駕回自涿州猶以為言南巡還復申前命竟不敢從㑹議江西事情疏近該南京內外守備參贊等官奏報江西寧府事情兵部巳行遵照欽依㑹官議處經今三日未奉明㫖今日又該南直隸巡撫巡按官亦各奏報前來臣等看得前項事情關係重大處之尤宜慎重停當伏望皇上早賜宸斷俯從兵部㑹奏事理將臣等所擬㫖意即日批出命將出師并敕下各該地方官員分布防禦以彌大患宗社幸甚生靈幸甚臣等不勝懇切仰望之至正德十四年七月十三日止親征疏臣等切念江西事情干係重大前日發下兵部㑹奏一本臣等再三看詳若如此擬必不誤事近者道路傳說聖駕欲往親征臣等聞之不勝驚懼誠恐聖駕一出京城無人居守人心未免驚疑中原盜賊所在蜂起外國聞之深入為冦命令無所稟承章疏不能通達不知何以為處况寧府懷奸稔惡已非一日特以朝廷待之素厚兵端無自而起前聞聖駕有南巡之㫖其心已自不能無疑今又聞聖駕親征自謂罪在不赦必將借此為詞不量逆順聚集黨惡抗拒王師一則欲脫罪求生一則欲覬覦非分意外之患尤有不可測者伏望皇上俯鑒臣等一得之愚深惟宗社萬年之計照依兵部㑹奏事理即日簡命將臣前去行事如此處置决可保無他患臣等不勝激切祈請之至正德十四年七月十三日止親征第二疏今日早該司禮監官發下南京內外守備等官太監黃偉等敕稿各改添朕當親統六師等字樣臣等竊慮兵機貴密此意彼若先知必將益得自為奸計伏望聖裁各該敕稿內俱免令臣等寫朕當親統六師六字蚤賜發行庶為停當正德十四年七月十五日論居守疏具官臣楊廷和等謹題該司禮監官發下兵部㑹奏一本內開多官奉㫖議處京師居守及防邊禦寇并各衙門題奏等項事宜詳其所議止及防邊以下居守重事未嘗議及臣等看得京師居守關係重大古云居守一云留守本朝永樂七年太宗皇帝自南京巡狩北京命皇太子留守南京次年駕還南京又命皇長孫留守北京宣德元年宣宗皇帝親征漢庶人命鄭王襄王居守此祖宗纍朝居守故事人所共知今聖駕親征京師根本空虛無人居守伏望聖明留神裁處宗社幸甚正德十四年八月初五日奉聖㫖居守照南京內外守備事例司禮監內閣內外坐營等官府部九卿并科道等官東厰錦衣衛俱各給與敕書一道該衙門知道止取空頭敕疏該司禮監傳諭聖意令臣等撰寫動調湖廣等處土兵空頭敕書臣等看得兵部先次㑹議及覆奏侍郎王憲本內並無開載調土兵事情此實地方利害所關未可輕議臣等難以擅擬伏乞聖裁正德十四年某月某日請降詔疏臣等查得先年寧夏置鐇反叛朝廷命將出師之時曽頒詔書告諭天下今江西宸濠背逆天道謀為不軌殺害守臣焚劫郡縣地方被其荼毒比之置鐇其罪尤甚皇上親統六師奉天征討與尋常遣將用兵事體大有不同正宜照依前日明㫖頒降詔書大誥天下使知宸濠罪大惡極覆載不容王師之出實非得巳臣等所擬寬恤事宜惟欲𠞰除首惡分釋脅從固結人心保護邦本謹隨揭帖封進伏望聖明俯垂睿覽即賜施行天下臣民不勝歡慶正德十四年某月某日改擬詔草第二疏臣等昨日擬進詔書條欵止據各衙門開送事件參以舊例議擬進呈以俟宸斷但恐中間或有窒礙今臣等再加斟酌刪去六條另具揭帖封進伏乞聖裁早賜施行以慰人心以全事體臣等不勝幸甚正德十四年某月某日改擬詔草第三疏除去罪已之言臣等看得宸濠悖逆反叛罪惡貫盈皇上赫然震怒興師討罪雖已革其王爵削其屬籍但未明詔天下天下之人恐尚未知宸濠之罪大惡極至於如此近日各處奏題本內往往仍舊提寫寧府字樣見者皆憤惋不平實於事體未便今臣等再行撰擬詔㫖上請定奪一應寬恤條件俱各停止以俟大功告成之日另議施行則人心慰安而逆賊指日可擒矣伏乞聖裁正德十四年某月某日進勘合字疏臣楊廷和等謹題為公務事照得功賞勘合并底簿自正德九年置立兵部節次領出填寫用盡合無更造底簿二十扇勘合紙二千張送下奏擬字號等因正德十四年十月二十七日奉聖㫖是欽此欽遵今檢得羣書類句中二十字擬進謹題請㫖計開提劍雲雷動垂衣日月明妙算干戈止神謀宇宙清正德十四年某月某日請掣回南征軍馬疏具官臣楊廷和等謹題仰惟皇上御駕親征聖武布昭神威逺震旬日之內江西逆賊遂已成擒餘黨解散皇上睿謀妙算委任得人以致成功之速如此海內臣民曷勝欣慶臣等尤有私憂過計不敢不為陛下言之伏見近日宣府奏報興和城等堡敵人下營屯闊數十里日遣輕騎千百成羣入境侵擾勢頗猖獗已調大同逰兵前來懷安城住劄但慮各邊軍馬調去南征數多在鎮軍馬缺少未免顧此失彼伏望皇上軫念西北重地萬一倉猝有事恐難支持合無將調去南征軍馬量賜掣回本鎮照舊防守仍乞聖明審度進止或專命親信重臣前去江西㑹同都御史王守仁將生擒斬首逆賊名夥及逆黨家口財産等項逐一查處停當奏請定奪如此則陛下既有以全內安外攘之至計又有以收南征北伐之全功實宗社萬萬年無疆之福也兵部覆奏大同逰擊孫鎮闕內亦是此意通乞聖裁正德十四年八月二十九日請聖駕疏具官臣楊廷和等謹題為恭請聖駕還京以安人心事臣等照得近日孽藩宸濠肆行叛逆皇上念宗社大計不得已親統六師奉行天討先聲所至威武振揚是以地方守臣仰遵睿謀指授方略遂致旬月之間元惡就擒餘黨悉滅此皆皇上聖武神功內外諸臣協心用命之所致也正宜即日班師振旅還京御朝宣捷百官致詞稱賀俟宸濠囚檻至日通行各處親王議罪多官㑹問議擬明白奏請定奪然後論功行賞詔告天下此事體重大難以遲緩陛下不可不亟為之處也臣等尤慮聖駕在外巡逰未已陸路有跋涉之艱舟行有風波之險野宿有震驚之虞古人云千金之子坐不垂堂况以萬乘之尊四方觀聽所繫而可輕自貶損忽略一至此乎且師旅經過日費不資糧餉之給竭於民之所供物用之需盡其地之所産馬匹兊及種騍船夫役至孤婺州縣正官多被逮繫驛遞衙門半已逃亡河道阻塞糧運稽遲商賈不通物價踴貴官府政務俱廢居民室家不保至於回民近在肘腋番僧召令隨行凡若此皆自來所無之事豈不大為聖明之纍哉况今各處地方災異遞見京師乃宗廟社稷之所在而近日地震不寧江南乃國家財賦之所出而連年大水為患他如宣府氷雹大如盤甌陜西大風至於拔木其餘水旱蟲蝗火災不一而足召異致變必有其由又今北方擁衆在邊畿內盜賊蜂起而邊兵缺少未見掣回天下官員朝覲在邇皆不知何以處之又况宮城之內居守無人諸司章奏久不得出卒有事變可為寒心此實臣等之所為大可憂懼者也伏望皇上洞悟聖心深惟至計上畏天變下恤民窮不惑於浮言不牽於逸欲早賜凱旋明正大逆以雪神人之憤庶幾上以妥九廟在天之靈內以慰聖母皇太后之念外以安宗室之心下以遂臣民之願實宗社萬萬年無疆之大慶也臣等愛君憂國惓惓誠悃言與淚俱不覺至此無任激切瞻戀待罪俟命之至正德十四年十月初三日請大祀疏具官臣楊廷和等謹題該太常寺題一本內開正德十五年大祀天地正德十四年十二月初一日該聖駕看牲臣等竊惟郊祀天地實朝廷第一大事祖宗以來皆於每年正月擇日行禮前期一月聖駕躬詣犧牲所看牲然後文武大臣輪看百五十餘年莫之有改今春郊祀乃遽移於二月輕變舊章羣心未愜議者至今惜之災異荐臻上天示戒甚可畏也即今聖駕南征逆賊既擒俘馘將至伏望早賜旋蹕大告武功之成至於郊祀看牲等項大禮務遵舊典以次舉行不少廢忽庶幾人心慰恱天意昭孚宗社靈長之福端有賴矣伏乞聖明鑒納正德十四年十月初十日請聖駕回京具官臣楊廷和等謹題臣等仰惟聖駕南征天威逺布旬月之間逆賊遂已就擒我皇上神謀廟略致此成功正宜即時奏捷獻俘大行賞賚以快人心實中外臣民之至望也臣等尤念明年正月南郊大祀天地預於今年十二月初一日聖駕看牲嵗暮并孟春等月祭享太廟等項大禮俱宜皇上躬親奠獻庶有以致其對越之誠其冬至正旦等節在朝文武百官禮當致詞稱賀外國四裔人員亦各進貢方物赴京朝見及天下諸司官員述職入覲皆欲瞻拜天顔以遂其朝宗之願各處王府册封每嵗朝廷傳制遣官行禮今年尚未舉行至如仲冬頒厯明春殿試等項俱係國家重事皇上御殿然後行之不可廢者即今各項日期漸近臣等日夜憂思不知所處伏乞聖明留意宗社幸甚天下幸甚正德十四年十月二十二日請聖駕第二疏具官臣楊廷和等謹題臣等照得大祀南郊乃人君敬天第一事皇上所以仰承眷命茂膺景福者端在於此今聖駕南征罪人既得實天佑我國家所以戡定禍亂如此之速正宜奏凱班師舉行大禮告成於天以致享薦之誠明年春孝貞太皇太后大祥祔廟奉安神主俱該皇上躬親行禮非臣下所敢攝行者又今天下諸司官員赴京朝覲該吏部㑹官考察各衙門堂上并科道官大班糾劾必須皇上親臨黼座面賜裁决近日以來內外衙門具題事務已經纍次齎奏日久未見發出應行事情率多積滯中間如推用巡撫等項官員處置各邊兵糧問擬罪犯等事動經數月未奉明㫖人心疑惑誤事非細所據前項禮典政務委的事體關係重大不可輕忽伏望聖明留神省覽俯賜采納中外臣民不勝慶幸正德十四年十二月十三日請聖駕第三疏具官臣楊廷和等謹題近日傳奉聖㫖令欽天監另擇郊祀日期今擇於二月十二日行禮又孝貞太皇太后大祥神主祔廟亦該在二月初十日行禮緣前大禮俱係皇上躬親舉行今日期漸近內外人心不勝懸望伏乞鑾輿早回舉行大禮并將隨征官軍人等論功行賞以慰人心臣等幸甚天下幸甚正德十五年正月二十二日請聖駕第四疏具官臣楊廷和等謹題正德十五年二月二十一日該司禮監太監蕭敬等傳奉聖㫖朕親統六師正名討賊今各該罪人既以次擒獲待解到之日隨即班師回京告於郊廟仍躬大祀之禮其考察天下朝覲官員并殿試傳臚等項及孝貞純皇后大祥告祔一應禮節亦俱於三月內次第舉行爾內外文武大小官員宜各安心辦事該衙門知道欽此臣等伏聽明㫖拜稽之餘因以仰窺皇上慎重大禮慰念臣下之至意大小臣工無任歡慶兹者佇俟日久不聞旋蹕之音臣等下懷未免轉生疑慮豈有聖明在上而肯失大信於天下乎切惟大祀之禮我祖宗以來皆於正月行之今嵗改卜二月又改卜三月欽天監選擇日期已經三次矣看牲官員自冬十二月初一日為始至今百十餘日輪流未已時既屢更嫌於褻玩况春丁社稷之事俱未舉行神人之間兩有未安者孝貞純皇后大祥在二月初十日禮宜即時祔廟祀享雖欲擇吉亦當不出數日之內今乃將及禫期而改卜至再揆之禮制似有未宜又天下諸司入覲官員本以朝正為名今到京數月尚未得一覩天顔吏部雖已㑹官考察上請黜陟未奉定奪難擅放回各該官員俱係司府州縣掌印正官離任既久政務悉廢雖有署印官員豈能一一幹理乎至於禮部㑹試中式舉人例該三月十五日皇上御殿策試讀卷傳臚具有皇祖舊規此尤國家登庸賢俊之重事亦不可以太緩者自去秋聖駕南行至今八月有餘在京在外各衙門題奏不下五六百本中間多係緊急重務俱未發出施行人心遑遑莫知所措以上事情臣等纍曽具本奏請未䝉允納若知而不言言而不達則臣等固不能辭其責若陛下聞而不行行而不决亦恐無以自白於天下也况今沿河一帶連嵗災傷餓莩盈野六師屯駐供億繁勞民窮財盡意外之變尤切隱憂考之宣德二年宣廟親征漢庶人於八月初十日出師至九月初六日還京計其往回不出一月之間輯寧邦家貽謀𢎞逺誠聖子神孫之所當體念也伏願皇上仰承祖德俯順人心務懷逺圖用全大信亟命班師回京悉照前㫖將各項禮典以次舉行仍先將各衙門題奏文書照常發出毋致事務久稽致生他虞如此則陛下外攘之功既著內安之政亦修神人胥悅民物咸康而宗社萬萬年靈長之福端在是矣臣等犬馬微誠不勝惓惓之至正德十五年三月十三日請免禁殺猪疏具官臣楊廷和等謹題近日傅聞直隸及山東等處鎮巡等官欽奉聖㫖禁約地方人等不許養豕及易賣宰殺違者發極邊衛分永逺充軍逺近流傅旬日之間各處城市鄉村居民畏避重罪隨將所養之豕盡行殺賣減價賤售甚至將小豕掘地埋棄者有之人心惶駭莫測其由臣等切思民間豢飬牲豕上而郊廟朝廷祭祀宴饗膳羞之供應下而百官萬姓日用飲食之資給皆在於此不可一日缺者孟子曰雞豚狗彘之畜無失其時五十者可以食肉矣古先哲王之治天下所以制民之産其道如此且人年五十非肉不飽則豚彘之畜正飬生之具而非所以致疾也人生瘡痍乃血氣內傷風濕外感所致是食豕肉而致然乎况小民畜飬貿易以此為生理之資正宜教之孳息蕃育是可禁乎至於十二支生辰所屬物畜乃術家推算星命之說鄙俚不經不可為據若曰國姓字音相同古者嫌名不諱蓋以文字之間雖當諱者尚且不諱嫌名今乃因其字之音而并諱其物之同者其可乎又况民間日用牲豕比之他畜獨多牛以代耕亦非可常用之物私自宰殺律有明禁不可縱也此事行之雖若甚微而事體關係其大如此傳之天下後世亦非細故誠不可不慮也伏望皇上洞察物情詳審命令亟敕所司追寢前㫖仍通行曉諭各處地方人等各安生業毋致驚疑則事體不乖而人心慰悅矣臣等偶有見聞不敢緘默伏乞聖裁正德十五年二月初九日請班師疏具官臣楊廷和等謹題為懇請班師以慰人心以安宗社事邇者宸濠叛逆皇上親統六師往正其罪天威逺震元惡就擒尋奉明㫖待解到之日隨即班師人心皆為之喜慰今聞俘繫南都亦已數月陛下以萬乘之尊六軍之衆暴露於外尚未定有還期則人心之喜慰者又未免轉而為憂懼矣伏惟陛下之出已踰一年於兹南郊大禮看牲已久而未祀孝貞皇后大祥已久而未祔殿庭之朝奏久虛宮闈之問視久曠時享太廟久未親行册封宗藩久未傳制㑹試舉人久未廷試凡此皆祖宗一定不易之規朝廷至重極大之典萬世所當遵守者陛下為天地神人之主豈可一切恝然於懷而不為之省念乎况軍旅屯駐供億既繁而倉庫在在空虛夫船候送聚集既多而州縣日日勞擾從征將士行役既久豈無父母妻子之念地方人民貧困已極常有死亡轉徙之虞又近日以來京畿及山東河南等處盜賊竊發百十成羣隨撲隨生不能禁止宣府鎮巡官節報敵人近邊劄營長闊三四十里時遣輕騎擾我墩保深入之計難保必無今日之事豈不大可憂哉豈不大可懼哉此無他蓋以聖駕出京既逺厯時既久居守無人政務廢弛其勢必至於此也然此特在聖心一轉移之間耳况今罪人既得理當奏凱之時天氣漸凉正可班師之日伏望皇上思天位之重大念王業之艱難深戒逸逰務存兢業亟降明㫖振旅班師還京之日將前項祀天告廟論功行賞等事遵照典禮以次舉行庶幾神人交慰中外均歡宗社萬萬年無疆之福端在是矣臣等待罪輔臣不勝忠懇迫切瞻戀顒望之至正德十五年八月二十日請班師第二疏具官臣楊廷和等謹題近日傳說皇上班師已離南都不日奏凱還朝內外大小臣工聞之不勝歡慶所有郊天祔廟朝賀殿試并獻俘賞功各項典禮俟聖駕到京之日必將次第舉行不待言矣但今各衙門題奏文書已該臣等擬票封進各該管文書官節次前往軍門齎奏自去年八月以後至今年正二月文書雖經奏過尚有多半未曽發回自二月以後至今一應文書俱未發出以致各衙門本內往往皆稱未奉明㫖委的前後事情不相照應難以遵行况中間多係重大緊急事情不可遲誤者且如吏部推用南京操江并鄖陽貴州延綏等處巡撫都御史并各處布按二司方面官兵部推用寧夏遼東總兵官皆係邊方重地鎮巡重任日久缺人辦事又法司問完提解人犯監禁月久未見發落及各年重囚例該秋後處决今日期將近難以遽行甘肅地方先年起送進貢外國差官查理明白又令留住在關及近日佛郎機并滿刺加占城等國進來番文事干地方俱未見有處置人情反覆不可不慮各處奏報災異頻仍盜賊生發徴免錢糧賑恤貧困事多稽滯人心不安其江西地方逆賊雖已就擒而荼毒之餘軍民十分困苦見今功罪未論刑賞太遲至如都御史孫燧副使許逵盡忠死節天下之人皆痛憤之今已一年之後尚未顯加褒恤何以激勸人心又况天氣漸寒河道將凍糧運阻塞商賈不通將來之患尤有可憂伏望聖明俯審輿情深惟至計早旋法駕不必久停仍令通查前後齎奏文書先行奏請回京發與各該衙門遵守施行庶幾政務不廢人心稍安臣等職業所關不敢緘默伏乞聖裁正德十五年九月十五日請擇日郊祀疏具官臣楊廷和等謹題伏聞聖駕凱旋已至通州臣等不勝歡慶旬日以來朝夕懸望鑾輿之至今嵗事將暮郊祀大禮尚未舉行况明年祀期又近我祖宗舊制一嵗一郊禮不可缺伏望聖明留意亟命欽天監將今年郊祀日期先行選擇奏聞仍乞將近日禮部㑹官議奏聖駕到京祭告獻俘等項禮典即日預先發下以憑遵奉施行通乞聖裁正德十五年十一月初四日議處反賊疏昨日該司禮監官傳諭聖意欲令臣等擬㫖命多官議處反賊宸濠并從逆栱樤等十四名罪犯臣等仰惟皇上為宗社生靈之故親統六師往正宸濠反逆之罪先行祭告天地宗廟社稷詔告天下仍寫書與各處王府然後出師是皇上奉天地祖宗之命躬行天討而非為已私也今罪人既得地方以寧班師北還駐蹕通州咫尺京師未先祭告天地廟社以復天地祖宗之命又未詔諭天下及寫書與各處王府以慰逺近親踈之心乃遽欲議處宸濠等罪惡則出師為有名班師為無名使聖武神威伐叛安民之偉績皆泯然無聞於世矣臣等受恩深厚切列扈從此而不言其為負國孰大於是所有前項㫖意臣等不敢撰擬伏乞聖明鑒納正德十五年十一月某日議處反賊第二疏具官臣楊廷和等謹題臣等欽遵敕㫖於本月二十五日恭詣行在伺候朝見伏聞聖意欲命多官㑹議逆賊宸濠等罪狀臣等切惟宸濠悖逆天常滅絶人紀肆行反叛覆載不容今幸皇上親統六師布昭聖武罪人既得速宜明正典刑以雪神人之憤但我朝祖宗以來凡議擬大罪必於內闕即古廟議之意處决重囚必於市曹即古刑人於市與衆棄之之意此乃一定不易之成規百五十餘年莫之敢變况前項逆賊聖駕親征之時已嘗告於天地宗廟社稷今日奏凱還京豈可不復行祭告以答庇護之靈貺乎合無請聖駕到京之日先將賊平班師通行祭告俟郊祀禮畢仍照近日提督贊畫機密軍務御用監太監張永題奉欽依事理獻俘之後將各該逆黨應處置者即為處置㑹問者通行㑹問議擬明白奏請聖斷然後論功行賞詔告天下如此則大禮既舉大法以彰國是不搖人心胥定我皇上攘外安內之功兼備而無遺矣臣等身為大臣叨受厚恩知而不言死有餘罪干冒天威無任殞越之至謹題請㫖正德十五年十一月二十六日請免設蘭州凉州分守官疏臣等照得各處分守等項官員應否設置纍朝以來自有定規今若分外添設非惟事體紛更抑且官多民擾况二處地方切臨邊境軍民疲困關係匪輕合無仍照舊規不必差官分守其朝進楊保候有他處相應員缺奏請差用庶幾事體不乖地方安靖臣等仍將原票封進伏乞聖裁正德十五年十二月初三日問安疏具官臣楊廷和等謹題為問安事臣等伏睹皇上於前月二十八日及元旦令節兩次視朝犬馬之情無任欣慶近該禮部節奉聖㫖朕體雖已稍平尚須調理臣等職居輔導地位最親任遇既殊於外廷恩義實同於父子顧起居之節不得與聞食飲之詳無從候問晝夜思之倍增憂恐但聞昔人有言未病謹疾既病服藥今當進藥之時竊惟用醫則宜專而不可雜議藥則宜審而不可輕然治病猶易而調理最難必加千倍之功乃收萬全之效伏望皇上大寬聖慮勉進藥餌調節食飲慎重起居早遂康復以膺萬萬年隆長之福天下幸甚臣等幸甚正德十六年正月初十日選醫疏具官臣楊廷和等謹題伏惟聖體違和已踰半月臣等犬馬微誠殊切瞻戀昨日該司禮監官傳諭聖意欲令臣等擬㫖命該部博訪精通醫藥之人臣等竊惟天下名醫皆聚於太醫院又選其尤者入御藥房但當專任而信用之自收萬全之效又何待求諸草澤未試之人哉况治疾之術調攝為上醫藥次之若調攝少有不節則醫藥亦無速效伏願皇上慎重啓處勿使勞逸之失宜調節飲膳勿使滋味之太過但凡一應玩好有可以惑亂聰明傷損元氣者皆不使少干聖慮自然百體豫康萬福駢臻上可以慰九廟在天之靈下可以慰天下臣民之望臣等不勝惓惓忠懇之至正德十六年正月十六日請免獻俘疏具官臣楊廷和等謹題近日以來伏聞聖體漸復康寧臣等大小臣僚不勝歡慶仰惟皇上一身為天地宗社臣民之主自今以往尤宜倍加調攝凝神靜慮頤飬天和凡一切逰玩動心勞形之事悉置之而不問止之而不為斯可以收勿藥之全功也臣等尤念郊祀慶成獻俘頒詔賞功等項禮典皆以另擇日期尚未奉有明㫖傳云國之大事在祀與戎誠不可以太緩者况此後又有殿試册封等事亦該相繼而行但今聖躬初愈不宜過勞前項禮儀該部題有獻俘奏捷一節蓋聖駕親征與尋常命將報捷不同况首逆宸濠既已處置而各起罪犯又已有㫖法司㑹問所據獻俘揆之事體似亦可免臣等再照各該衙門題奏文書自前年秋後至今多有未曽發出者應行事務未免稽滯乞敕司禮監逐一查出早賜施行如此則陛下攘外安內功德隆盛神人悅豫萬萬年無疆之夀端有繫於此矣臣等惓惓愚忠伏乞聖明留意正德十六年正月二十五日請免妖言人犯連坐疏臣等看得都察院本內妖言謀反首賊假鋹家屬連坐於法相應其潘依道孫爵本內明開無運謀顯跡欲量從末減合無俱免連坐惟復止將伊妻王氏孔氏同王滿堂等俱送浣衣局其餘免坐及大理寺二本犯人王豸等并徐通等本內原無開有家屬連坐之文况各犯情罪比之段鋹等尤有不同今欲將家口俱送浣衣局似乎太重臣等各加斟酌擬票封進通乞聖裁正德十六年正月三十日請免兩廣奏捷升賞疏近該都御史蕭翀等奏報兩廣捷音臣等於兵部覆議廣西本內斟酌擬票已將王堂朱麒各加祿米蕭翀升俸還各廕子姪一人世襲百戶查得正德元年以前各處都御史等官平賊有功俱無廕子世襲軍職事例其蕭翀等恩典已為過重所以於廣東本內止擬蕭翀等各賞銀兩表裏况廣東賊級三千有零雖是蕭翀等督委得人所致然比時蕭翀等身在廣西功次亦自不同其捷音本到又俱在一月之間相去不過數日若又加恩不無太濫臣等别難再擬謹仍以原票進呈伏乞聖明俯賜采納庶於事體為當正德十六年正月三十日請以江西賊平詔告天下疏具官臣楊廷和等謹題仰惟皇上親統六師征討叛逆凱旋之日禮宜即時頒詔天下一以告大功之成一以布大賚之恩今聖駕還京兩月餘矣臣等已嘗撰擬詔㫖進呈御覽適遇聖體違和未䝉發出施行昨聞欽天監擇日欲在郊祀之後然此與郊祀事體自不相關未郊之前亦可舉行况今各處地方水旱相仍災異迭見嵗用錢糧小民拖缺數多各邊軍士月糧經年無支該鎮奏討殆無虛日欲徴之於民而脂膏已竭欲取之於官而帑藏已空閭閻之間愁苦萬狀饑寒所逼嘯聚為非者在在有之其畿內州縣及山東河南陜西等處盜賊百十成羣白晝公行搶掠居民被害商旅不通若非早為拯救痛加寬恤則將來事勢誠有大可憂者即今逺近人心朝夕懸望德音之降真如大旱之望雲霓其情之不容以暫已者喜聞聖躬數日以來漸復康泰伏願留神省覽將前項詔書早賜頒降以慰四海臣民之望仍乞將隨征內外有功人員速行升賞則德澤旁施和氣充洽人心悅懌而天意可格矣臣等愚見如此伏乞聖裁正德十六年二月二十六日請安置犯人家屬於高墻疏具官臣楊廷和等謹題先該太監張永查盤踏勘過江西反叛事情先後具題節奉欽依將宸濠并栱樤等妃妾趙氏等及蕭山等郡縣君及宸潜等多燦等俱著暫在通州空閒公館處所住歇欽此臣等看得前項人犯男婦數多通州地方褊小近又盜賊生發不惟供給不敷抑且防守不易况其事情與郊祀慶功等項自不相關合無不待各項事畢俱照原㫖先差的當人員送鳯陽高墻內安置如此則事體順而人心悅矣臣等不勝惓惓仰望之至正德十六年二月二十三日請慎重調理疏具官臣楊廷和等謹題今早司禮監太監魏彬等同御用監太監張鋭傳諭聖意郊祀大禮尚未舉行聖心深有未安臣等聞之以為只此一念上通於天天心感格聖體即日便當平復然後舉行大禮亦未為晚且聞近日聖駕暫出往來內監在外臣民皆知聖體漸安莫不舉手稱慶以為宗社萬萬年無疆之福伏望皇上勉進飲膳慎重藥餌益加調理上以慰聖母之心下以答天下之望臣等不勝幸甚正德十六年三月初四日楊文忠三録卷一
