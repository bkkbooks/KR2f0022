body:
  text: 楊文忠三録巻六明楊廷和撰辭謝録二少師兼太子太師吏部尚書華蓋殿大學士臣楊廷和等謹題臣等伏見皇上昨以乾清宫被災既下令羣臣同加修省復申勅所司直陳時政即古昔聖帝明王遇災而懼之心也切惟災變之來感召有自皇上嗣登大寳十年于茲寛仁愛人任用賢俊刑政無失恵澤覃敷宜乎景福茂膺休徴恊應夫何近歲以來灾異疉見水旱頻仍盜賊縱横兵戈不息邊境侵擾于今未寧五星失度千里飛蝗隕霜雨雹之非時地震天鳴之相繼軍民困苦帑蔵空虚人多怨咨天未悔禍茲乃復有此變宗廟震驚臣民悚懼聖明在上何以致之感召之由實在臣等蓋臣等徳薄位高力小任重陛下有上智之資而臣等無格心之學陛下有大有為之志而臣等無濟時之才議論不足以禆萬幾之裁決誠意不足以動九重之視聽先事既無開陳之益臨事又無匡救之功瘝曠有年憂慙無地若復依違不去恐過咎愈深一時之物議既難茍容後世之公評豈能終掩况周官爕理不備其人而漢庭䇿免亦有故事輒敢披瀝悃誠冒干天聽伏望俯從寛貸特賜罷歸别選賢能以充委任然消復之道有賴于聖明而轉移之機正在于今日尤望陛下念皇天付託之重祖宗創造之艱天下生民仰戴之切早朝宴罷以延接臣工深居簡出以頥養聖體九廟之烝嘗必親其事兩宫之孝養必主于誠經筵勤日講之御殿庭復面奏之規大開言路通達下情還兑調邉兵以謹外防革禁中市肆以肅内令出西僧于外以絶異端罷皇店之設以通商賈停止一應工作以惜民力減免各處織造以節民財任用正直忠良之士親信老成持重之人夙夜孜孜圖惟治理將見人心感悦天意可囘和氣薫蒸政務旁達羣盜望之而革心四夷聞之而向化宗社萬萬年無疆之休端在此矣臣等無任激切懇祈之至正徳九年正月十九日奉聖㫖上天示警朕心弗寧寢食遑遑卿等致意朕已悉知九廟兩宫惟日是謹早朝深居朕自處置經筵等項已有成規邉兵只照前旨市肆常理西僧舊制俱不必改動皇店嚴加禁約下人工作織造著該衙門查緩急來㸔方殷事冗宜盡心輔導以紓朕之不逮用保康寧以寛朕懐不允所辭該衙門知道具官臣楊廷和謹奏臣以凡庸叅預機政黽勉供事七年于茲屢乞退休未䝉俞允近因乾清宫之灾復與同官連名具疏猥承睿眷仍賜勉留伏念朝廷命官毎因材而授仕人臣奉職當随事而効忠力小負重者必顛受直怠事者必罪且多事之際經理為難而非常之材舉措自别臣本無異能謬膺重任虚糜廩禄優㳺歲時日辦文書蓋秖務于小而未究其大動懐獻納亦徒有其志而未見其功燮理有乖灾變乃見瘝曠至此䇿免㝡宜若復依違自全將至顛躓難悔况臣有父見年七十九歲别臣一十四年日夕相念憂病交集必欲一見臣面庶幾稍慰餘年臣退公之暇言念及此心神若驚寢食俱廢用是不避斧鉞再陳肺肝仰乞聖慈俯垂矜察曲全終始早賜歸休使以優閒之身少盡定省之禮是上雖不能竭忠於國而下猶得致養于家怠事之罪庶幾可免負重之憂庶幾可釋尤望皇上别求茂異用副倚毗修徳政以荅天心更化理以慰人望則臣雖逺處山林之下常如近瞻日月之光感戴聖恩曷有窮已臣下情不勝待罪祈恩激切懇請之至正徳九年二月初四日奉聖旨卿職司宻勿勞勩著稱正方倚任才識老臣豈得因親為念遽求休致所辭不允吏部知道具官臣楊廷和謹奏臣父見年七十九歲舊患痰𠻳之疾不時舉發臣自𢎞治十四年離家復任已經一十四年相違既乆思念甚切時常寄書與臣望臣囘還一見臣毎讀來書涕泣交下屢乞歸省未䝉允俞近日又得父書稱説舊疾轉加念臣愈切竊惟凡人之情必心安而後能處其身志定而後能應于事臣于居家事親之道既有所歉於中則于當官臨事之時必有所不能盡其意雖夙夜在公亦復何補况臣受恩深厚未報涓埃而精力未衰尚堪驅䇿豈忍遽求優逸以至上負聖明伏望俯察愚情特垂矜念容臣暫囘省視少盡菽水之歡即當依限前來益圖犬馬之報臣愚父子不勝感戴懽忻之至正徳九年三月二十九日奉聖㫖卿柱石老臣參謀機務倚託方隆豈以親老為念輒欲歸省可不必去著彼處有司給米三石羊二隻酒十瓶以伸優待該衙門知道具官臣楊廷和謹奏為懇切陳情乞恩給假事臣近日具奏省親節奉聖旨可不必去著彼處有司給米三石羊二隻酒十瓶以伸優待欽此臣聞人倫莫大於君親人道莫先於忠孝為子孝而後能忠於君居家理而後可移于治若棄親罔念即是不孝之人雖効勞于官豈有盡忠之節臣屢次具奏實本至情仰承異恩又出望外捧誦詔㫖感切肺肝誓竭庸愚勉圖報稱敢復内顧以瀆聖明竊惟天地生物必欲盡其性臣子事君不敢隠其情且逺方軍民凡有一事皆得具疏上聞而京朝官員毎經六年輒許援例歸省臣愚日侍左右顧不能比于常人離家十有四年乃不得援夫近例展轉思念寢食未安况臣父見今七十有九侍養之日似為不多而臣方今五十有六報効之心將來未已伏望特垂聖鑒體念愚衷嚴立限期暫容歸省計程來往不踰旬月之間望日趨蹌早赴闕庭之下鞠躬盡瘁更復何辭臣下情無任瞻天仰聖激切懇請之至前疏具于正徳八年冬庋之閣中至九年三月廷試事畢十九日赴禮部恩榮宴即封上未得俞㫖欲再上疏司禮監再四傳諭上意趣出供事四月三日乃出秋間㑹有邉報命將出兵遂不敢再請以至先人大變而歸終天之恨曷有窮哉具官臣楊廷和謹奏為陳情乞恩守制事臣近得原籍家書知臣父春于本年正月二十二日病故例該守制移咨吏部題奉聖㫖内閣輔臣丁憂留用事例爾部裏便查了來説欽此欽遵臣哀苦之中一聞命下驚惶無地竊念臣自𢎞治十五年丁母憂起復以來荏苒于今一十四年不得與臣父相見節次具奏歸省屢荷聖慈遣醫調治又令有司以禮存問臣感激在心勉强供職不敢言私又時得臣父手書諭臣盡心職業毋負朝廷委任臣見字畫細楷誨戒諄詳意精力未衰夀當未艾今乃倐爾奄逝恨抱終天既已無及唯得早從禮制親視殯塟庶幾此心少安詎意聖情寵眷批答禮部欲查用留事例臣知該部自能據禮覆奏陛下必能以禮處臣但憑棺之情逺繫萬里奔喪之心切在一朝臣見年五十七歲計守制滿日年纔六十禮大夫七十致仕臣若未即就木尚有十年堪備任使是臣以三年報父以十年報陛下所謂盡孝之日少盡忠之日多也用是不候吏部查奏輒敢以情上瀆伏望陛下俯察愚衷不使臣以哀苦抑鬰成疾豈惟臣之此心知感雖臣父没于九泉亦知感矣臣不勝披誠瀝血激切祈恩之至正徳十年三月初九日奉聖㫖朕以卿春宫舊學輔導年深徳望才猷朝野推重特遵先朝故事為國留卿任用宜勉抑内顧私情以副倚毗至意所辭不允吏部知道三月初八日朝廷差文書房内官監左少監秦用宣諭聖㫖老先生是朝廷輔導重臣國家大事多有倚頼先少保喪事已令該部查例留用望老先生以禮節哀具官臣楊廷和謹題為謝恩事臣近於本年三月初一日聞先臣封少保兼太子太保户部尚書文淵閣大學士春之喪今早䝉皇上垂念特遣内官監左少監秦用下臨臣第宣諭聖意令臣以禮節哀臣憂苦之餘不勝感激慈恩之至具官臣楊廷和謹奏為再陳情悃懇乞天恩事臣以先臣病故疏乞守制荷䝉温旨批答再四開諭念輔導于舊學援故事于先朝申重為國之意抑臣内顧之私若天地之於朽株發生不廢若慈父之于愛子誨諭有加前日又特遣近臣臨慰哀苦顧臣何人冒茲優寵昔人所謂有君如此何忍負之臣之私心實𩔖于此但念人之大倫有二外則君臣内則父子臣自離先臣以來一十四年皆事陛下之日今乞歸守制所以事先臣不過二十七月之期况父子之情幽明無間先臣雖汲其情亦欲得臣一歸以襄大事伏望聖慈俯徇臣請俾得早從禮制即日奔歸少伸終天之恨以慰地下之魂臣不勝披誠瀝血懇切祈望之至正徳十年三月初十日奉聖㫖再覽奏具悉卿迫切至情但内閣任重方頼老成共圖治理卿宜以體國為念勿再固辭吏部知道具官臣楊廷和謹奏為懇切乞恩憐念哀苦事比者臣再疏守制荷䝉皇上悉臣迫切之情見于省覽之下載念責任之重假以老臣之褒拜命之餘倍增感痛切念臣自入仕以來服膺先臣之訓誓以報國為心况遭際聖明寵眷優渥援引故事勉留再三心非木石敢忘報稱但臣兄弟六人臣為長子先臣之喪臣當主祭送終之禮人子大事少有缺失不可復補身為長子而不思主祭之職當此大事而致有缺失之悔言念至此肝腸寸裂且凡人之情必志定而後能處其身心安而後能審于事臣今形神俱䘮心志荒迷萬一臨事眩惑不惟上負陛下圖治之心抑亦自負臣體國之念見今賢俊滿朝共熈帝載臣之去留無足輕重陛下既已悉臣迫切之情忍使臣日夕西向抱痛不已鬰而不伸將為心病乎伏望聖慈特賜矜察即日幸容早歸守制三年免喪亦得早趨闕庭以慰陛下拳拳眷顧至意臣不勝瀝血抆淚懇切哀號之至正徳十年三月十六日奉聖㫖卿屢乞守制情苦詞切今暫准奔䘮冩勅給驛遣行人一員䕶送葬畢即來供職以副委任卿弟楊廷儀也著馳驛去該部知道具官臣楊廷和謹奏為感激天恩懇乞終制事本年八月初一日欽差司禮監管文書内官監左少監秦用親奉璽書宣諭聖意趣臣還朝復勅四川鎮巡三司等官合辭勸諭臣聞命之餘神魂驚怛竊思臣在京時以三月一日聞先臣之憂荷䝉聖眷特舉先朝故事慰諭勉留臣屢疏陳請勅許奔喪仍遣行人䕶送遂于本月十九日啟行閏四月十七日到家豈意啟行方兩月而詔㫖即下到家僅三月而勅使随至枕塊而承自天之恩越紼以拜如絲之命寵光赫奕逺邇驚聳顧臣何人有此榮遇戀闕之情甚切陟岵之痛方深伏念先臣起家於孤貧教臣以忠孝臣出仕頗早缺養最多屢陳歸省之章輒為職司所繫既莫追于往事將少贖于方來况人生大倫君父最重輔臣舉措風化所關親䘮不能自盡不可以為子禮義或有少愆不可以範俗見今耆舊在位忠賢滿朝聞望謀猷皆出臣右臣若以庸劣之才藉故事為口實當太平之世襲金革之變禮已且内愧人其謂何伏望皇上矜憫愚臣召還命使俾情事得伸于喪紀庶舉措小補于人風且隙駒之景易過而犬馬之齒未衰禫禮既成或尚存于視息厚恩未報敢乆滯于山林誓畢餘生勉圖後效鞠躬盡瘁更復何辭臣下情無任感激天恩懇切祈請之至正徳十年某月某日奉聖㫖朕以卿輔導元臣忠勤乆著特差勅使守取速來供職卿宜體朕至意即日就道以慰人望再不必辭吏部知道具官臣楊廷和謹奏為感激天恩懇乞終制事近日猥承聖眷特命内官監左少監秦用賜臣璽書趣臣還朝臣具疏懇辭未䝉俞允賜以温諄之詔假以忠勤之褒捧誦再三且感且泣竊念臣一身自早歲以至今日特受眷知臣一家自先世以及後人俱登仕籍在國家有世臣之義在臣子為不世之逢雖樗櫟之才不堪為用而犬馬之報恒切于心前日親奉璽書既曰葬畢即來供職毋得固違近日再承批答又曰特差勅使守取以慰人望肅肅嚴命蕩蕩厚恩臣雖至愚感切心肺本欲隨同勅使即日就道但念人生大倫惟君與父君臣之義固無所逃而父子之恩終不可解三年之愛人子至情三年之喪古人中制臣前疏所謂親喪不能自盡不可以為子禮義或有少愆不可以範俗者此臣之志也亦禮之經也况臣之淺劣自知甚明羸瘠之軀遽難馳于道路哀毁之狀亦有靦于班行陛下之所以召臣者將以用之也若出而心安志定有益于時勉强一出可也出而無所建明徒冒榮寵不惟無補于風化又或有累于聖明陛下亦將焉用之哉伏望聖慈特賜矜憫許終三年之制以遂匹夫之情愚臣幸甚私門幸甚臣下情不勝瞻望闕庭懇切祈請之至正徳十一年二月十一日奉聖㫖卿孝思純至固乞終制朕覽奏良用惻然今勉從所請原差内官著先囘京待卿服闋還著鎮巡等官催趣馳驛前來供職以副委任該衙門知道具官臣楊廷和謹奏臣于正徳十年三月初一日丁先臣之憂囘家守制十二年六月初六日釋服從吉初七日欽差行人司行人劉翀同鎮巡司府等官親詣臣家宣諭勅㫖命臣上體朝廷眷顧之心下念先臣移忠之教即日還朝供事勿更遲延天語温淳開道懇切拜領之餘且感且泣臣雖捐軀亦未能報遂于八月初三日啟行沿途遇雨登山渉水兼程而行臣素有寒濕痰火之疾加以道路艱辛衝冒風露行至陜西凍河橋驛舊疾復作手足頑麻頭目眩暈舌强語澁狀如痰厥幾至于死良乆方蘇隨處問醫勉强前進遷延乆之尚未平復乃從河南衛輝府上船從容調理得至京師瞻拜闕庭復見天日犬馬之情倍萬歡慶竊伏自念臣以庸劣際遇聖明居官歴十四轉食禄且四十年父子兄弟世受國恩未有尺寸之勞少答生成之造敢圖自便遽乞退休但臣精力已衰神志已耗譬如羸馬不可以致逺敝舟不可以任重强而用之必至覆蹶伏望聖慈俯賜矜憫念臣趨召而來切有報恩之志因疾而退將遂首丘之私病在切身情非得已曲垂優眷放免歸田使得辭榮謝寵休養殘軀倡率鄉井之人歌詠太平之盛則自今以往未盡之年皆陛下之賜也臣下情無任瞻天仰聖激切懇請之至正徳十二年十一月十六日奉聖㫖卿守制三年力辭召命今服闋赴京朝廷方切倚任豈可又引疾求退宜即日入閣照舊供職再不必辭吏部知道具官臣楊廷和謹題為謝恩事臣近有疏乞休節該欽奉聖㫖卿宜即日入閣照舊供職再不必辭已于十一月二十日謝恩到任二十三日欽䝉皇上特遣内臣親到臣家賜臣寳鈔三千貫羊二隻酒二十瓶又于二十四日報名謝恩訖臣萬里逺來如子趨父天顔日表瞻仰咫尺關守限隔無路奮飛犬馬至情曷勝戀慕竊惟邉地苦寒聖躬勞倦兩宫聖母思念于上中外臣民仰戴于下在外一時有一時之慮一日有一日之虞臣等在此安居坐食夢寐不寧伏望皇上念祖宗創業之難神器負荷之重早囘鑾御深居九重頥養天和茂隆國本實宗社萬萬年無疆之慶也臣下情無任感戴激切之至謹具題謝恩楊文忠三錄巻六
