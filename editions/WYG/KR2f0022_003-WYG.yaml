body:
  text: 楊文忠三録巻三明楊廷和撰視草餘録鄭僖王薨世絶東垣繁昌二郡王爭襲繁昌以兄終弟及為辭東垣謂其父與繁昌俱僖王之弟其父行四繁昌第九奏上召府部臺諫集議東角門衆相顧莫先發予曰是當如武官襲廕例衆皆以為然于是㑹奏請以東垣進封然親王世絶進封之例祖訓亦未之及也寘鐇作亂時副總兵楊英逰擊將軍仇鉞俱領兵在外朝廷因命楊英鎮守寧夏仇鉞副之尋聞仇鉞還寧夏朝廷疑其與寘鐇合亟命司禮監至東閣召府部科道官議之皆欲追囬勅書予謂勅已發二日追之必不及鉞之謀或者欲入為内應以待外兵之至未可知也欲為内應而我疑之彼將得以為辭是為寘鐇益黨也使鉞果與寘鐇合其舉事又何假于勅追奪之徒堅其從亂之志耳且鉞世官也受朝廷恩最厚聞兹新命安知不悔而改圖耶又安知寘鐇不因而疑之以為賣已而自誅之耶遂不追未幾奏至仇鉞果以計擒斬諸反者雲南夷奏䝉化知府不法事時逆瑾用事欲差錦衣衞官校械繫来京西涯心知其不可然議擬間猝未有以應也予曰朝廷治遠人與中州殊雲南又逺在荒服外易于生變土官世禄相傳已乆欲拘繫之恐未必可得徒損威重急之或逃避山澤或賊害詔使或潜結交阯為變後患將奈何况土官貪淫暴虐自其常事但不為亂足矣此奏只須下鎮巡勘報耳西涯深以予言為然未幾交阯移文雲南言彼國人有逃入中國者欲發兵萬餘人假道臨安捕之且云將来除道言甚張皇㑹分守金齒太監張辰以貪暴激變地方㡬為土人所殺諸司禮至閣中言曰雲南險逺易變前日楊先生之言果然何以能料事如此焦泌陽曰楊先生往年曾到雲南親迎故知之予笑曰載籍所紀數千年事今皆知之豈一一親歴其地親見其人耶直以義理裁之耳初聞寘鐇之變予謂西涯宜請聖㫖榜文慰諭慶府諸宗室及寧夏之人泌陽以為黄河之舟盡為寘鐇驅至西岸兩地隔絶即有榜諭誰與傳之予曰今日之事夏人不與者十八九苦為寘鐇所脅人人自危若無以慰諭其心彼將謂朝廷盡欲誅之毋乃爲寘鐇樹黨邪言之再四皆為泌陽所抑又明日西涯乃請于上而行之後聞榜至寧夏逺近大恱乆之檢閣中舊稿見宣徳中征漢府亦有榜諭之文蓋事體不得不然也泌陽脩怨于彭文思將移之江西一省㑹萬安舟子盗殺交趾進貢夷人因嗾逆瑾窮治其獄并奏減江西科舉額數禁江西人不得為京朝官又謂王安石禍宋吳草廬仕元欲追榜其罪于朝堂逆瑾主其言一日来閣中議之予謂王吳皆往事舟子殺貢夷自有王法今偶因一時一事遂有此舉動恐駭四方聽聞瑾謂出榜朝堂前代亦有故事予曰此非盛時事恐傷朝廷政體為主上聖徳之累瑾盛怒色變予復從容言之其事竟中止正徳四年夏京城訛言有㫖城内外官民家及各寺觀停寄棺柩盡令焚燬寡婦守節者無少長皆令改嫁逺近驚疑奸人亦有乘之刼奪者予聞之亟請于上傳㫖都察院禁約仍命緝事官校訪察訛言遂息孝廟實錄焦泌陽與總裁之列故與萬文康彭文思有怨每言及彭輒俚語大罵甚至移怒于其鄉人予謂王守溪此老似于萬稍恕守溪笑曰先生在故耳至書將成藉以報復置所厚三二人于内閣東偏所不合者一一屬之作傳而授之意極其詆誣如謂文康于皇親萬通為僚壻其妾常出入禁中大抵皆誣罔之言諸名公卿但異已者盡枉其是非而為之辭所私者恣為溢美不復顧忌西涯守溪見之怫然謂此乃萬世之是非非一人所得私也初亦相與辯論乆乃益厭泌陽又私以告之逆瑾今日入瑾耳明日即出瑾口信之甚篤予知不可口舌爭不復省視西涯曰此穢史也瑾誅後欲請于上重脩之予曰重脩恐致紛紛西涯曰先生忘表中之言乎是曰是非曰非豈得専于獨見疑傳疑信傳信庶以備于將来予為此表時意正在今日也予曰一時人才大賢大奸如黑白之在人耳目者自不可枉其餘中人上下者恐不必傳傳亦無足為輕重公閒中著述時一白之曰賢者如某某為泌陽所誣不賢者如某某為泌陽所右一字褒貶自足取信後世異日脩史者亦自能改正至嘉靖初言官果有以重脩孝廟實録上請者予與總裁諸公亦時以告之諸史官使隨事辯白天理之在人心終不容泯也正徳五年八月十三日劉瑾既收下獄内外多所連逮被逮者輒封其門差出官校相望于道十六日諸司禮同至閣中予言逆瑾亂政挾天子之權所謂狐假虎威天下誰不畏之况諸監局官同在禁内朝夕相接安得不曲意事之若槩以為交通恐人人自危肘腋之間不可不慮果有罪惡顯著者下法司鞫問明正其罪而後籍其家安能逃乎予又言首惡既除附麗之徒去其太甚者可矣諸司禮皆曰先生之言是也自是封門者少人心稍安又數日散本官王奉持二軸来令寫勅乃秦府兩郡王壽劉瑾詩也皆泥金書稱瑾連用兩公字王傳諭上意謂以金枝玉葉卑謟如此勅中務要重加切責欲坐待閣中西涯云且囘至門上即時有稿進呈謂左順門也送至階下予語西涯須熟思之此勅一下宗室疑懼者多矣因要王復坐予云劉瑾専政各處宗室或請名請婚請封或請禄米誰不有求于瑾此軸秖據搜出者朝廷見之以為天潢之派而稱瑾如此是誠可罪但其初意不過媚瑾以干恩澤耳當其時瑾為司禮掌印所媚者太監也今反賊矣以宗室與反賊交通彼一念及于此或將自裁豈不傷天下宗室之心昔漢光武尚欲安王郎反側之黨今聖明顧欲動天下宗室之心耶王云然則將何如處予曰焚之以滅其迹不獨此耳凡瑾私宅搜出問遺私書之𩔖當一切焚之以釋羣疑以安人心王曰果如此便寫揭帖進乃先持二軸去西涯遂進揭帖云云明日問之則云已不行矣正徳六年四月十二日日講罷臣東陽臣廷和臣儲叩頭訖上靣諭曰文選事委吏部武選事委兵部天下大事先生毎主張東陽未有以應廷和恐太遲對曰臣等不才有負委託東陽云臣等欽承聖諭敢不勉强以副聖意又叩頭訖上就御案取書一冊付張司禮永永以授東陽乃是年㑹試錄也永云起来看東陽遂捧之以出至殿屏間展閱之旁有箋註小票皆指摘程文中疵病東陽欲將至閣中廷和曰就此閱畢可遂納上永問如何皆無以應出左順門予語西涯曰此錄若將至閣中便有形迹以言語文字罪人非聖明事况科塲文字乎西涯厚齋皆曰先生之言是也箋註者意不過爭進耳竟為終身口實云是日退朝後復宣予輩入張司禮永等俱至閣中言刑部主事宿進建言忤㫖上怒甚欲宣至𤣥武門山子前親鞫之西涯曰後生狂妄言事要名若重罪之秪成其名耳不如寛之張曰上怒且不測予問已至山子前否張曰使校尉索之不在衙門亦不在家不知此時到否諸司禮又言上欲見三先生靣言之予微聞上已被酒因向西涯云暮夜恐非見君之時張曰若不見須擬㫖進我輩好奏也予又賛于西涯曰我輩不知本中所言何事豈可輕率擬㫖但望諸公從容救解庶于聖徳無損聖政無虧也張曰上意難解予曰難解而能解之方見諸公扶持大功頃之聞進已宣至錦衣衞直房予心私喜以為進至此易為言矣復告張曰望諸公千萬極力調䕶務保全伊性命毋汙朝廷玉堦地也時聞上坐于午門内予輩亟趍出循東廊而行尋聞杖之五十送戶部發囬原籍為民至深夜予令夾江舉人毛亨宻語進云善自保愛毋多言也明日遂抵灣中登舟亨進之姻家也流賊劉七齊彦名等作亂馬都御史中錫張恵安偉督兵剿之乆無功至正徳六年八月初改命陸兵侍完提督軍務師巳出涿州忽報賊在固安上召臣東陽臣廷和臣儲至左順門内上南向立問曰賊在東而師乃西出恐緩不及事適令兵部追還陸完等令東如何臣東陽等對曰甚當且行未逺一二日内可至臣東陽復奏曰賊船在水套自来送死官軍併力擒之不難但恐人心不齊向来累失事機正坐此故今官軍在北宜亟勅東南諸將官嚴謹隄備以防奔逸上曰張俊等皆在南料亦無害臣廷和奏曰盗賊充斥臣等不能運謀設䇿致厪聖慮俱合有罪上曰只用心便是慰諭令退臣東陽因奏曰臣年衰多病累嵗乞休未䝉矜允即今勉強供職稍待事情寧帖再當陳乞臣廷和遽奏曰今已愈矣上復加慰諭命賜羊酒因叩頭出七年京師市易用夾銅錫錢極薄小以二折一謂之倒好張司禮永奏禁之止許用肉好完者毎銀一兩市錢七百文其意本以利民也一時射利之家競收舊錢藏之專用新錢于是物價騰貴貧民失業怨聲載道予因擬㫖奏上令都察院榜諭聴民自便明日遂定時西涯在告京城訛言有㫖選民間㓜女内之禁中逺近惶懼將未出㓜女子一槩婚配奸人至有持一帕入人家徑欲迎去者輿夫為予言之驗問果然因請降㫖禁約仍令緝事官校根究造言之人其事頓止時西涯在告順天府霸州民王豸以妖術惑人張司禮永令人宻捕之以奏法司鞫之致其法謀反予執不可謂未有反狀坐以妖言則情罪當矣時外廷微聞欲加張侯封議者藉藉公卿間皆以為難處一日諸司禮来閣中傳諭上意具言王豸手文成字有異相張能消變未形功甚大宜重加褒賞予應曰是不可不褒諸司禮曰何以褒之予曰寫勅奬勵多加禄米可也諸司禮不然謂上意欲進封爵予曰我朝官制太祖髙皇帝所定載在祖訓内監局官止于四品未有加封爵者范太監璟曰劉馬侯故有例予曰劉馬侯為誰自来未聞此號止聞先年太監中有劉永誠者厯事累朝七十餘年出入中外多効勞勩又乆在御馬監掌事京師人因號劉馬太監未嘗封侯卒于成化初年岳翰林正曾與銘墓岳公文集𩔖博稿可考也其姪子聚乃為將官鎮守地方以功封寧晉伯非永誠自為也今可從寧晉伯劉福家取誥劵来看復就閣中檢𩔖博稿相示銘中載永誠曾出征烏梁海及亦集乃𤓰沙等處擒其酋長斬獲數萬功伐顯著諸司禮讀之有首肯者范曰在古亦有之予曰漢時一日五侯非盛世事宋童貫至封王爵後竟何如范曰可下吏兵二部令多官議之予曰張公奏誅逆瑾靖寧夏之亂功在朝廷天下皆知之恐不假此為重若多官㑹議誰敢阿順上意變亂成法自取重罪必將正言極論形之奏牘揚于大廷傳之天下似非所以為張公寵也時張亦同来皆怏怏而去既退予因張所厚宻諷之謂此舉在朝廷為異恩在公宜力辭乃見勞謙盛徳明日奏下閣中擬㫖寫勅褒諭嵗加禄米四十八石賞綵段五十表裏姑慰其意張上疏辭謝一無所受外議始定未㡬張為丘太監聚所訐出居私第謂所厚曰今日始知楊先生前日愛我之厚也時西涯在告正徳七年冬陜西按察僉事趙應龍為巡按御史劾奏贓私無筭散本官傳㫖以應龍事榜諭天下予謂應龍果如御史所奏罪不可赦但未經覆勘恐無以服其心言之累月予迄不變又數月太僕丞張鑑亦為巡撫官劾奏贓罪散本官復傳㫖申前說欲并寫勅諭内外諸司予應之如前言之亦累月諸司禮使人来言曰内閣不寫勅豈謂我輩不能寫耶予笑曰寫勅易易耳顧此二事見在行勘待勘報至得其情罪以示天下庶㡬人心服而法可行今不待勘至即據所奏勅下若後勘報萬有一不如所奏王言豈可改耶况内外諸司官賢否不同朝廷南靣臨羣臣一一以贓官待之賢者豈能自安耶既而勘至所奏皆虚予亦不復致詰也㑹九年春朝覲考察乃于八年十二月中擬勅稿進令府部諸司各申諭所屬勉脩職業云正徳九年六月初聞上不豫問之散本官皆云不知數日後外議訩訩九日早予輩入朝亟問之散本官盧明應如前予忿然曰我輩為朝廷大臣君父有疾而不知尚可居此位乎皇上乃宗社神人之主有疾司禮監當與我輩同往問安率御藥房官診脉進藥脉主某病藥用某方明白開具揭帖一紙進御一紙留司禮監收貯事體方便今皇上偃卧豹房兩宫聖母不得知中宫及二妃不得近早晚用藥或云四夷舘譯字官或云街市老嫗萬一有不測之禍近幸邊將畨僧義子四散逃逸府部科道交章問罪司禮監與我輩豈能辭責我輩猶有可諉每日辦事還在宫城之外司禮監日侍朝廷左右朝廷只合在乾清宫何故移至豹房又移至新寺又日往虎房逰戲皆我輩不得與聞者傳之天下宗室親王忠臣義士皆將起而倡大義清君側之惡彼時尚可諉之不知耶時風聞上病創甚㡬殆中人猶諱之予故云然盧明聞予言色變蒼黄去以告蕭司禮等遂要谷大用同往問安且云内閣諸臣欲同来上聞之不欲見近侍奏云自家人見之不妨乃召蕭敬等跪于窻外語之曰我已平復着他每安心辦事既退令盧明来囘復如上諭盧相見有喜色是時彼亦方知聖躬之安也正徳九年二月寧府請復䕶衞屯田予與費鵞湖極力諫止鵞湖言近日本府䭾載金銀數騾以謀此事聞者變色予曰我輩但知䕶衞不可復無問銀之有無也鵞湖曰正是正是葢宸濠逆謀予料之乆矣時權倖有納賂主其事者竟得請後謀為不軌予與敬所礪菴請遣官齎勅往諭獻還護衞亦無及矣時忌予者謂寧府本不反因削護衞乃反何耶是年六月北塞侵宣府大同二鎮甚急内降命都督白玉佩平冦大將軍印充總兵官予輩不與知也明日予謂兵部白玉非總制才盍疏止之兵部謂命既下恐難爭也又明日有㫖命太監張永同白玉總制軍務張忠監督都督温恭充副總兵俱聴永玉節制忠奏已與温恭所領三千人俱邊兵遇賊隨便擊殺若受節制未免有所牽掣上巳允之矣下閣中擬㫖予謂散本官曰兵權貴専九節度之敗前事可鑒也且今諸將中有可與李光弼郭子儀比者乎散本官復奏下再傳諭上意曰禮樂征伐自天子出朝廷欲忠受節制則受節制欲忠不受節制則不受節制如何可違也予曰今日有冦至朝廷命將出師便是征伐自天子出若副參聴受大將節制自是軍中紀律違之必敗我輩職在輔導今日不言是懐奸不忠縱一時取恱上意如國家大事何手可斷此㫖决不可擬也忠亦私使人来言予亦以此意應之又數日温恭亦欲佩副將軍印復下閣中議反復數日予執不可散本官謂内府收貯見有副總兵官印將欲何為予謂我朝故事命將多佩副將軍印佩大將軍印者不數人近時惟撫寧侯朱永成化十七年征威寧海子保國公朱暉𢎞治十三年征延綏十八年徃宣府得佩之葢一時大臣失于檢詳耳如唐時李郭統兵權非不重止稱天下兵馬副元帥今白玉佩大將軍印已為不可温恭又可復佩副將軍印邪不知副總兵佩印即大將也如象戲然白玉與小王子對敵各一將也又益一將置之何地耶且冦在門庭禦之當如救焚拯溺温恭輩受命已乆乃遷延如此意欲何為七月十九日晚退朝後忽有宣召甚急予獨至閣中散本官傳諭曰一二日且出師老先生不發勅書似有沮撓軍機之意予笑應曰六月二十七日邊報至七月初二日已進勅稿監督副總兵輩爭議未定當受節制者不欲受節制不當佩印者欲佩印勅稿至今未下沮撓者自有所屬不在我輩也且我輩寫勅只據兵部手本故無挂印及不受節制字樣豈敢擅自增損况議論獻替我輩専職可謂之沮撓乎手可斷前議决不可改也一二日間果欲出師諸公今日便當亟奏散本官以此言復并持兵部手本去司禮諸貴近亟徃奏勅稿乃下錄黄以進又明日遂出師正徳九年三月一日聞先君訃即移文吏部告奔䘮上遣内臣慰問且令吏部查先朝留用輔臣故事予聞命即疏云奪情非令典該部必能據禮執奏朝廷必能以禮處臣疏三上乃得允遣行人送還勅令塟畢趣起復任先是命未下時私心皇皇邃菴獨過予曰上倚公甚重有移孝為忠之諭且時事方殷决不可去諸公卿之意皆然公獨不為朝廷留為天下留耶况本朝累有故事吏部當援以覆奏公無尤也予曰此不可以故事言徃年欲起復尚書陳金掌都察院又欲奪情徐州兵備毛科予皆不可語文正李公曰公與廷和皆有老親在恐後日難處西涯即應曰正是正是念不及此其事遂止正為今日地也公若必欲我留是我能見信于西涯不見知于公將以王叔文待我也邃菴黙然李工部鶴山亦以為言予曰三年之愛人子皆有之無是心是禽獸也朝廷之上藹藹吉人可容一禽獸玷班行乎諸公卿皆知予志不可奪此意亦寖聞于上十五日命下又明日領勅遂行正徳十二年上北狩將歸傳諭五府及團營三大營各為旗帳奉迎時王兵部提督團營因要六部偕行既又屬劉尚書愷要予輩錢寧亦復過予言曰此上意也厚齋已諾矣予曰贈送旗帳在官僚親舊則可恐非人臣事上之禮當更議之寧不恱而去明日寧乃遣張龍達于敬所敬所亦不從又明日廖鵬入朝告予曰奉迎之舉諸老皆報可獨敬所不欲掌印甚銜之予曰不欲者非獨敬所我輩故未嘗欲也人君之尊如天然凡人家嵗時祝天惟瓣香耳酒果皆無所用也天不可以酒果供人君可以旗帳賀耶必欲為旗帳當作何辭威武大將軍何等名號耶或云帳辭但如詩經中語亦可予曰我不能為也我太祖創業垂統以奉天承運皇帝六字傳之聖子神孫未聞有此等號也今日誰其改之或又云聖駕還後此帳不知置之何處誰復問之予笑曰他日午門前置對此帳便出矣廷和今日不為此不過為民耳勿相累也至除夜張龍復使人脅予曰今日張司禮自北来說朝廷知楊閣老不肯為旗帳傳與掌印問他往年丁憂囘朝廷遣行人逺送至家又遣内臣起取服滿後又遣行人徃迎他父祭葬差兩部官管理今日我巡狩將歸如何執拗不肯為旗帳問他懼否有何話說予遜謝曰朝廷之威雷霆也雷霆擊物其何能避人臣生死皆在朝廷將何所逃何敢不懼何說之辭但私竊自念廷和朝廷春宫舊臣䝉眷知最乆開正七日駕囘予輩及府部迎候至徳勝門外竟不用旗帳上意亦無所忤云予以十二年十一月二十日復任十二月二十八日同敬所至居庸闗請駕閏月一日囘京尋有㫖戒飭京城九門守門内外官勿放京朝官出城至正月七日駕囘陪祀郊壇十三日慶成宴畢十四日即註門籍將以說事後上疏乞休二十一日早忽報聖駕又出矣北望長號者乆之二月十日孝貞皇后崩十三日駕囘予朝臨畢即出候于朝房不至閣中夕臨亦如之題銘旌上諡議諡冊俱不與有㫖命題神主亦以疾辭示决欲休致之意六月山陵事畢上還自天壽山七月八日召文武百官集左順門校尉十數輩至予家宣喚甚急閉門不納去而復来且云果有疾將扶之徃驗亦不應不知何事乆之乃知諭百官以將復北巡之意命内閣即門上寫威武大將軍勅厚齋免冠辭礪菴助之言晚乃出敬所時巳在告兩月明日礪菴痰疾作亦註門籍不出諸司禮及近幸三四人同至閣中趣寫勅厚齋獨爭之不得十三日駕出又明日厚齋過予具道所以予卧于床嘆曰廷和負國廷和負國蓋自恨久病不得出朝力爭也自正月至是乞休之疏凢八九上皆不允至十月二日不得巳乃出供職然亦不能日在官也正徳十四年正月七日散本官送兵部侍郎馮清奏㨗本至内閣欲擬㫖奬勵威武大將軍予言皇上親統六師指授將士在于各邊斬獲賊級數多理宜稱賀隨征將士亦宜行賞但不可奏㨗今馮清本内俱開有總督軍務威武大將軍總兵官鎮國公朱字樣于事體有礙無以傳示天下垂法後世我輩豈肯輕易擬㫖即以原本付還散本官予輩即時出徳勝門外迎駕甫至門外張銳馳至行幕以前本授予予言此本適在閣中已見之矣銳言朝廷親征大功合當奬勵予曰功在朝廷則臣下不敢奨勵若謂在馮清則今日之事是朝廷親征其功非馮清所敢擅馮清亦不當奨勵况本内所稱威武大將軍者何人當之何人敢下筆奨勵耶因以本還銳銳轉授之厚齋且言朝廷待有㫖方入城予復取自厚齋以還銳銳言毎日文書房散本官送尚收之我来送本反不收耶予笑言公朝廷貴臣非散本之官此亦非接本之處可以此言囘奏請聖駕即入城免誤事也銳忿然馳去已而復来申前說予言必欲擬㫖則須馮清别具奏稱近日奉命整理兵馬糧草見得某鎮斬獲若干奨勵該鎮守臣乃可不然决不敢擬也銳徑去尋復偕錢寧乃泣而言曰朝廷疑銳説得不分明先生每不肯信所以又差掌印来務要即時擬票予言公是朝廷心腹我輩素知豈敢不信但事體未穏當恐傳笑天下將来未免為馮清之累須如前説易奏乃可寜言上駐蹕教場坐待此㫖不煩多言也予曰此事闗係重大今日不言何時言耶二公可直以廷和此言復奏不必囘䕶决不敢他議也銳與寧乃去未㡬有㫖命予囘内閣擬㫖予乃偕敬所囘具疏執奏如前止擬奨勵馮清竟不及威武大將軍一字卒從之上之明于聴内如此可見凡事多被權幸䝉蔽臣下開陳未明匡救未至耳嗚呼是非獨權幸之罪也正徳十四年三月予以乞休在告疏上不允再上又不允時上欲南巡杖言者于朝予乃亟出言于散本官曰各衙門官諫止南巡皆一念忠愛之誠為宗社計為朝廷計非為身家計也朝廷杖之有至死者何以傳天下何以示後世皇上尊居九重上承九廟之祀奉兩宫之養國本未建人心危疑見今軍民困苦盗賊縱横聖駕必欲南去逺渉大江供應接遞都是腹裏人民面目衣服大段相似不比西北邊塞容易辨别一有奸人藏于其間或泅水鑿舟或因風縱火變起倉卒何以應之又有宗室窺伺于外或偽為奉迎誘至深宫子女玩好日陳于前用其私人隨侍左右凡我扈從之人一切禁格使不得近進退不能内外不通異日之悔有不可言者望以我輩此言達之司禮諸公一一轉奏于上宗社有幸萬民有幸司禮監與文淵閣亦有幸也宗室窺伺之説葢意在宸濠云明日約同寅三公跪門留止如是者三日未得命至四日張鋭来自文華殿出順門而西予􅈤之代奏且申説南去利害如告文書房者銳曰無與我事何不徃豹房自奏予曰我輩止知聖駕在乾清宫不知豹房何在聞公等朝夕奏事豹房不知所奏何事我輩名為大臣凡事不得與知毎日票本送上輒從中改不知何人執筆看来我輩只當六部中一都吏謄稿而已時各衙門題奏文書有留中十餘日或月餘不下者外議謂錢寧令家僮送王兵部瓊處改擬一日兵部參奏四川巡撫馬昊本中誤遺一竹紙小票葢改擬之辭也散本者蒼黄取上卒如所改批出予故云然跪門五日後予謂既不見答姑已之敬所之意終未滿也其忠􅈤如此十四年五月初十日御史蕭淮奏宸濠聚集賊徒招納亡命謀為不軌十四日蕭司禮等同至閣中出示其奏無一言予閱畢問曰上意云何曰著先生每處置予曰寧府之謀天下皆知之不敢言御史獨肯言之難矣但要朝廷處置得宜葢事闗宗室其逆謀雖成反形尚未露須善處予曰宣徳中有處趙府故事在宣廟征漢府囘學士楊榮陳山等奏趙府嘗與漢府連謀請即移兵討之一勞永逸也學士楊士竒楊溥等以為不可請命皇親大臣徃諭之趙府即遣人謝罪獻還䕶衞朝廷遂不用兵趙府亦得保全今日宜如此處為善蕭等云我輩以此言復奏先生更有何言予笑曰另有揭帖進其意葢欲予輩任其責也予又云梁同僚今日偶来遲蔣毛二同僚俱以病註門籍今亦將出矣至閣門梁公来予恐其應之或參差亟語之曰蕭淮御史有本云云予欲云云先生意如何可與諸公言之梁云先生之言是也諸司禮别去乃使人要蔣毛二公入明日進勅稿諭宸濠獻還䕶衞屯田自今勿令諸賊徒與亡命者出入府中改䕶衞為南昌左衞并諭撫按三司等官知之遣者頼司禮義顔刑侍頥夀崔駙馬元以二十四日行時内外權幸多與宸濠交通口語籍籍盧文書明至閣中言將来恐有七國索晁錯之事予應曰晁錯為誰聖明在上國家有福必無此事也三使者遷延不進至浙江聞孫都堂許副使之變遂奔囘至天津王兵部瓊使人要于路曰復命時當云寧府本不反因削䕶衞乃反三使者亦不以其言為然噫王之為謀視袁盎益拙矣崔在途中作詩柬顔有吳王自反盎何諱劉氏雖安錯已危之句葢有所屬也宣府巡撫勅辭舊與大同稍異正徳十四年都御史寗杲將徃宣府請易之鎮守太監劉祥時隨駕還京因請于上乞以巡撫責任備載内外鎮守官勅中予方在告厚齋遂各如所請給之既而薊州遼東陜西延寧甘肅七鎮守臣皆以為請傳㫖閣中速令進稿予偕敬所礪菴再四執奏不可且仍查宣府巡撫官舊勅重與寗杲進稿乞易之未得㫖時各邊鎮守隨駕在京者俱繳還舊勅乞新勅上屢遣諸司禮至閣中言之予言朝廷設官各有職掌在内庭則司禮不得兼别監在外朝則吏部不得干别部在外藩則都司掌軍政布政典錢榖按察理刑獄亦不得相兼在邊鎮則太監専鎮守如古之監軍總兵領軍馬巡撫總理軍馬城池錢榖及一應民事此成法也祖宗律令變亂成法者斬誰敢犯之諸司禮言宣大二鎮業已給之矣予謂前日已誤豈容再誤容檢舉可也予又言西北七鎮盡天下地方之半若創改勅書變易職掌今後七鎮守臣有亂政害人者皆自今日始是西北一半天下由我而壊也廷和么麽小子能當此罪否况内閣寫勅止憑各部手本開具責任豈敢擅增一字因具疏進呈明日得㫖朕覽卿等奏詞具已悉知但前次巡狩地方各官隨侍偶有事件徃返者數次今特通降便宜勅書易于行事永為定規兵部亟送手本請勅散本官云手本已来更復何辭予復執奏云在兵部則從命在内閣則從義决不敢阿狥以取身家之禍廷和手可斷勅不可寫也廷和寧有二頭耶豈肯以身家性命博官耶諸司禮氣阻數日後再至三至言亦如之散本官日至閣中輒首言之予曰前言已盡豈得復易同官中即有肯寫者當自書名進稿不敢連署以取連坐之罪也既而山西鎮守吳經隨上南征至臨清復遣人從閣中乞仍領舊勅曰近日在途止負空筩耳得此亦足壓人耳目葢彼亦知無可奈何已愚戅之性違忤上意如此卒得保全者先帝之仁也至今言之泣下犬馬餘生何以為報哉正徳十四年七月上聞宸濠之變遂欲親征左右日從㬰之意益决予輩雖屢疏諫止終不納至七月十三日命司禮監集百官議于左順門予與同寅三公云滿朝臣子受國厚恩無所補報今日有事正當盡忠竭節為朝廷出死力殺賊豈敢有所推避以遺君父之憂皇上不必親征但當命文武大臣督率官軍前去剿殺仍命各處鎮巡官調度所部互相應援或搗其巢穴或扼其奔突是乃萬全之計此賊大逆不道得罪天地祖宗江西軍民恨入骨髓若出黄榜數百張諭以順逆利害使之勤王報効誅斬首惡寛釋脅從不旬月間只江西城中人亦能擒之不煩天兵也京師根本重地聖駕未宜輕動永樂中北征有皇太子皇太孫居守宣徳中親征漢府有鄭王㐮王居守今大駕欲出居守重任付之何人予因向諸司禮言曰公等敢任之乎又向許泰江彬神周輩言曰公等能任之乎科道中亦有助予輩言者毛禮書澄曰親征亦是好事先朝曾有之予曰朝廷連年北巡今年春又欲南巡豈皆為親征耶顧禮侍清私于人曰若不親征萬一失陷南京誰任其責予初不聞其言既退敬所乃為予言之二禮部皆儒臣亦為此言何耶又明日兵部本出得㫖朕親統六師云云竟不能止也七月十一日逆濠變聞亟要王司馬徳華及王兵侍惟綱至閣中議討賊方略予欲文臣提督軍務徳華恐起楊應寧及彭濟物意不欲乃擬王伯安兼巡撫議定即出筆劄屬就東閣草奏上之予以徳華心事不可知猝與之議葢欲出其不意耳十五日得㫖遂次第擬進各項勅稿至二十七日始發下毎稿俱以硃書增入總督威武親征之詞趣令寫黄王伯安勅中去兼巡撫字予與同官執不可一日上命諸司禮及三四近幸来閣中迫令即時寫進且以危言恐喝曰否者必有身家之禍予以死諍之温司禮亦遣人宻諭上意曰楊廷和若不寫勅當云云云云予亦遜謝之竟不從至八月二十日批㫖于吏部奏中命予囘話予避出駕遂南矣此事已書于前偶閱之覺尚有遺缺輒復掇拾于此兵部議上南征事宜欲内閣扈從欲載御寳行凡數事本下内閣擬予與散本官言朝廷親征大臣扈從分也亦義也但連年巡逰于外皆不用文臣扈從今年自入春以来即欲南巡因言者諫止近以逆濠作亂遂有親征之説其實意在巡逰耳若必欲我輩去行營除軍機進止外凡事俱從我輩議處庶不徒行若御寳亦不可輕出此行以戰鬪為事蒼黄草野中萬一或有疎虞奸人將因而生事近年四川流賊藍五鄢老人掘得一廢印尚且藉以鼓惑愚民况御寳乎蔣毛二公皆主予説厚齋謂朝廷既出我輩不可不出先生不去我亦當去御寳亦當載之以隨予言我輩不去彼用事者尚有所顧忌而不敢為若我輩同行凡事將分任其責彼更何所畏乎公在行遇事有不可者能一一匡救之乎厚齋云我如何不行匡救立在御舟前亦欲力爭也予笑曰在此尊嚴之地又當暇豫之時且不敢爭况行營乎此行賊平即囘凡有除拜號令皆凱旋後行之御寳亦無所用也議論乆之二事俱不果行議者謂兵部之奏厚齋與知又數日文書房来取内閣職名旋有㫖命厚齋與敬所扈從乆之聞上在臨清遣人取去象牙寳一卒用前議敬所之行葢司禮監藉以助厚齋云文書房傳諭上意御寳既不可出須寫調土兵及與王府空勅載之以行予與厚齋言近日兵部議上親征事宜無土兵與王府事安用空勅且土兵恐其反覆不必調議者已嘗及之若王府則無兵可調縱有之亦將留以衞其王國必不可動也外此更有何事勅王府耶萬一有事相干公在行營相機應之我輩不敢豫為此謀也蔣毛二公皆以為然親征之議既决遂遣散本官来閣中命寫威武大將軍勅兵部亦有手本来予笑曰朝廷親征逆賊奉行天討誰敢以差遣為辭又誰敢稱威武大將耶近聞逆濠偽檄以朝廷失政為名起兵若稱威武大將軍名目是何等政令也此勅一傳將動天下之兵必謂朝廷既云親征復有威武大將軍為誰誰降朝廷為此名號誰寫此勅先斬寫勅之人然後興兵問罪吾恐朝廷之憂不在宸濠而在此一舉也楊廷和只有一頭不能當此大罪同僚即有欲寫者請自僉名進稿異日勿相累也廷和不能以宗族性命換官做今日不寫此勅不過為民充軍重則賜死耳一死後便有人奏表贈諡不至上玷祖宗下累子孫也散本者毎来催趣輒至泣下皆以此言應之敬所礪菴皆如予言一日命諸司禮及近幸谷大用錢寧等同至閣中云朝廷唘行在邇勅書尚未有恐悞大事今日必欲進稿令我輩坐待于此予曰朝廷命臣下行事乃用勅書今日朝廷自行何以勅為蕭司禮曰言之將一月如何尚為此言予曰廷和一向為此言文書房豈不以上達耶蕭曰先生之言已達不必再説今日必欲得勅去我輩親奉聖㫖今日無勅蕭敬等不必来見可投金水河死也予笑曰公等不必死若果欲加罪止罪廷和耳公等可以此言復命再遲一年亦是如此説廷和决不敢奉命也蕭云我輩且囘左順門待寫稿予云不必待因送至花臺前諸公爭言之厚齋云只寫勅與鎮巡也罷予云如此公可自進稿張鋭錢寧怒形于色曰上意决欲如此予曰天子有爭臣我輩之意亦决欲如此諸公遂去至午復来蕭率諸公羅拜于花臺前呼予以尊稱聲不絶口予曰諸公皆朝廷貴人以此相待將置我于何地也我所知者太祖太宗之法太祖太宗以奉天承運皇帝六字傳之萬世聖子神孫廷和何人敢稱朝廷為威武大將軍鎮國公耶他日磔屍萬段覆宗滅族不足以贖此罪也廷和有死而已諸公去至晚復来酷暑如蒸坐于左順門者盡日時送𤓰云解渴予語使者曰若不寫勅予輩亦心凉也制誥兩房官及隨從官吏人等見之皆驚紙匠有給事閣中三四十年者相與語曰自有内閣以来未見有此等事也繼此散本官日以為言予曰前言已盡更有何辭至八月十九日上將出㑹吏部具奏請詹事府掌印官得㫖以前年推舉劉尚書春管誥勅事命廷和囘話命下之明日予至閣中始知之亟趍出遂有勅進明日夜半囘話本出得㫖既囘話認罪罷不必在懐便急出辦事復傳㫖趣予入朝天明則乘輿已駕矣五鼓時錢寧張銳使人来傳諭上意予入長安右門則校尉自東而西者十數輩讙傳来了来了心知為予頗以為疑至承天門橋南乃問曰汝曹急走有何事誰所差遣曰為公也厰衞遣来看公来未時礪奄已出予遂同行出正陽門至暮上乃出坐正陽橋南百官皆跪魏司禮傳令進酒官前廷和當進酒趍而前六部隨魏若將止之者酒三進上持盃躊躇若有所言魏遽取以授廷和駕遂行諸司禮以江西奏㨗本至日遣制勅房官速予出擬㫖二十八日予謝恩出至閣中散本官問曰老先生前日進酒上有何言曰無又曰上准備許多説話要與老先生説因醉都忘之矣予因言區區賦性愚直才識短淺時有違忤聖意處得早早放歸庶免罪戾也散本云皇上天資明睿最知重老先生且如二十一日夜票囘話本語魏司禮及張鋭錢寧云我與楊廷和陪話他想不記懐魏等對云朝廷厚恩楊廷和感激不勝有何記懐又云明日務要他出来送我有説話爾鋭爾寧便傳諭他知道若不来爾二人有罪也銳等云豈敢不来予聞是言乃知上持盃躊躇若欲有言及寧等傳諭之意本末如此又明日散本官復言及前事因以告之鄉里白刑部轍楊兵部儀儀云先帝啓行時老先生進酒畢先帝云好生看家衆皆聞之老先生獨不聞乎葢與散本之言合廷和以衰病重聴又蒼黄之際實未之聞也追念聖恩感泣嗚咽者乆之上既南巡東厰捕一盗奏下閣中傳諭欲陞有功旗校予謂舊例未有捕一盗輒陞賞者既而鎮撫司獄上徑擬移文兵部陞賞予復言鎮撫司所理者刑名陞賞自有司存舊例亦未有因具獄擬陞者豈可為一人而變一代之法因一事而變累朝之制我輩决不敢擬㫖封還原奏又數日鎮撫司乃易奏止送法司擬罪不然將遂為故事矣此雖一事救正亦多十四年冬上在揚州有㫖禁民間養猪云食猪肉病瘡又云音同國姓葢為囘夷于永寫亦虎仙輩所惑也軍門遂移文兩直𨽻及山東河南等處巡撫官榜諭禁約且云違者發極邊衞分永逺充軍逺近驚疑旬日間殺之殆盡甚至將小者掘地􅙁之予與礪菴具疏言民間養猪上而郊廟朝廷宴享膳羞之供應下而百官萬民日用飲食之資給皆在于此孟子以雞豚狗彘之畜不失其時為先王之政且人年七十非肉不飽是乃飬生之具非生疾之物人之病瘡或氣血内傷或風濕外感所致非因食猪肉也若曰國姓字音相同則古者文字之間不諱嫌名豈可因其字之音而并諱其物之同者乎乞勅下所司追寢前命以安人心又亟言于司禮監東厰及都察院令京城内外不必禁榜亦不必張人家凡有入肆買猪肉者一切勿問以示意向則屠人生理如故四逺聞之自定矣一日太常寺奏時享缺猪欲以羊代之予謂宗廟牲品皆太祖親自裁定載在諸司職掌此成法也誰敢變亂之必不得已雖小者亦可遂不敢易乆之乃定正徳十五年二月㑹試放榜後禮部循故事印廷試巻諸生私喜以為且廷試矣先帝在南京未有迴鑾之期諸生乃相率言于禮部毛禮書憲清語之曰此事主張在内閣内閣欲行即行我部中豈無供給耶諸生遂拉予鄉人詣予私第言之予曰廷試與㑹試不同昔在先朝亦有故事永樂中太宗北征已丑罷試至辛夘年方舉行諸賢豈未之考耶諸生又曰願老先生具䇿問進呈行在請而行之可也予笑而不應久之諸生日至禮部懇請憲清因以告予予亦微聞前日供給之説乃應之曰諸生之凟告情也先生宜以正法諭之曰廷試求賢朝廷第一重事臨軒發䇿讀巻題名放榜傳制皆天子親行之非若㑹試禮部可以檢舊比題奏舉行也如此告之譁然者當自定若謂部中不是無供給然則我内閣無䇿問耶于是一時讙傳謂禮部欲廷試内閣不欲諸生皆歸怨于予至十二月十一日先帝在郊壇九卿諸公偕過予齋幕憲清復言曰諸生廷試願在年終舉行不願為辛已進士也予愕然曰誰欲彼為辛已進士耶禮部近日題本郊祀後免朝數日以某日賜燕某日獻俘某日賞功至二十四日事方畢去嵗暮纔五六日且廷試一事自發䇿至賜冠服釋菜須七八日亦不足先生為此言姑欲以慰諸生則可不知果可行否九卿諸公一笑而别時聖體違和至十六年春二月初偶幸御用監憲清復告厚齋敬所礪菴三公及予曰聖駕已出逰若諸生廷試後或就豹房或御用御馬諸監局隨便讀巻我輩願從諸老先生後予曰若如此處禮部須題奏可也憲清曰我有司但知守成法耳予曰我輩獨敢變成法耶憲清語塞今上龍飛乃以五月十五日廷試予弟正夫以兵侍與讀巻之例十七日文華殿讀巻退至東閣前語同事諸公曰今日乃知廷試儀節如此予以庸劣繆當事任只此一事明白易見亦受許多怨謗至今言之真談虎也正徳十年兵部缺尚書戶部王徳華欲補其處僉議多屬都御史彭濟物徳華忌濟物欲害之未有間一日濟物于燕㑹間語及錢寧罵曰此賊行當顯戮市曹蒲包裹骨寧聞之大怒㑹土魯畨冦甘蕭徳華欲借是嫁禍濟物濟物總制陜西時嘗遣囘夷舍音和珊齎勅往諭土魯畨和珊私許土魯畨厚賞濟物欲罪之和珊懼賂徳華塊玉重百三十斤祈免罪徳華因誣奏濟物失信致冦朝命給事中黄臣㑹巡按御史趙春及鎮巡官體勘多虚徳華怒覆奏勘官皆奪俸濟物時已致仕落其職逮鎮守巡撫及兵備官至京與舍音和珊廷鞫之徳華主其事鞫者皆莫敢異同毛禮書憲清纔有言輒斥之曰爾安知邊事必陸水村教爾也都給事中王爌石天柱有言未㡬皆調逺方外任巡撫兵備官降黜有差舍音和珊在刑部獄中錢寧假傳上意差校尉數輩往視之近幸饋燒羊酒肉者無虚日既脱罪遂留豹房朝夕近侍冒國姓父子俱授錦衣衞指揮使隨狩南京皆徳華致之也時議者籍籍謂舍音和珊自成化以来交搆土魯畨據哈宻城池奪金印前後虜忠順王善巴哈尚及蘇爾坦巴雅濟三人阿穆爾温都爾實哩亦為所害其意直欲王哈宻也每年進貢所得厚賞皆歸和珊自甘肅至京師沿途皆有店舍擾害西域者數十年近又䝉恩寵乆在禁中内知朝廷事情外知邊方虚實一得脱罪而歸必將據哈宻自立大為邊患不止如宋元昊時事因與同官諸公謀就詔書中擒之不費兵力潜消禍變亦庶幾謀國之逺慮也土魯畨之入冦也勢甚猖獗囘夷寄居甘肅者數百人為之内應兵備陳九疇知之斬其酋長瑪哈穆特于南門其衆遂散去甘肅之亂始定徳華初上疏亟稱其功後因彭濟物之怨乃并及于禍楊文忠三録巻三
