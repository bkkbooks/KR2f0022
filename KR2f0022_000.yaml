front:
  text: 欽定四庫全書史部六
  hash: sha256:5f60e64555bb05171f88ef93eab5b1c285f44f3268a9880b3cbd1f2ca80456fa
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2f0022_WYG_000-1a, image: WYG0428/WYG0428-0749a.png}
body:
  text: 楊文忠三録詔令奏議類二奏議之屬提要臣等謹案楊文忠三録八卷明楊廷和撰廷和字介夫新都人成化戊戌進士官至華蓋殿大學士文忠其諡也事迹具明史本傳是編名為三録實則題奏前録一卷題奏後録一卷視草餘録二卷辭謝録四卷凡四種題奏前録正德時所上題奏後録嘉靖時所上喬宇為之序又有自序謂官內閣時凡朝廷奏對之詞政事可否之議隨事録之序題嘉靖六年而所記止於嘉靖二年則廷和以嘉靖三年正月去位也其中有足與史參考者如武宗本紀十三年正月丙午至自宣府命羣臣具綵帳羊酒郊迎御帳受賀此書載上傳諭五府及團營三大營各為旗帳奉迎廷和不從錢寧及廖鵬張龍屢傳旨要脅廷和終不從駕回竟不用旗帳上意亦無所忤據此則本紀書其始未詳其卒此書乃具其首末又此書載正德十四年正月七日散本官送兵部侍郎馮清奏捷本至內閣欲擬旨奬勵威武大將軍廷和執不可張龍錢寧相繼催取廷和卒擬旨奬勵馮清而不及威武大將軍一字又載慈夀遣散本官傳諭欲改懿旨為聖旨廷和力爭至再方寢又載夀安后崩世宗堅欲持喪三年且擬頒遺誥廷和力爭乃僅服二十七日于宫中遂止遺誥之命凡此數事本紀及廷和本傳俱不載又欲擒戮江彬及議興獻廟曲折始末亦較史為詳辭謝録皆辭職謝恩諸疏林俊為之序其卷帙多於三録而不在三録之數以一人之事非國政也其奏疏有過于朴率之病然告君以達意為主不以修詞為工如正德中請慎重郊廟疏請還宫疏嘉靖中請停齋醮疏皆指陳時弊在當日可謂讜言其他亦多切直中理言雖質直而義資啓沃固與春華自炫者異矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀楊文忠三録序少師石齋先生楊公自正德間以首相值時多虞內蠱外釁而以一身任天下之重佐理匡救啓沃扶翊凡可為社稷利者竭盡心力為之無顧忌卒成中興𢎞濟之功天下之人蓋隂受其賜而有不能盡知者也今觀奏藁曰答天譴遵祖訓戒遊逸數疏皆格君心正國體之大者他如謹名號節權幸之類有以懾姦回之氣而禠其魄宸聰方悟而公以憂去矣向使公在位國家弊端之開當不知是又三年武皇亟召公還則憸人壅間竊弄之勢巳牢不可破北狩方畢遽復南征內降數下欲以至尊稱將領促公定草且動以危言于是廷臣諌者多斃杖下孰敢有犯雷霆之怒者乎公陳説大義執奏愈厲竟不從既而翠華久駐南都公見諸播告之詞居守之議者悉中機會凡郊享諸大政令連章迭上務請回鑾而後巳夫輔相之職將順者易匡忤者難公處不可為之時能為人所不敢為之事雖古名臣之風采何以加焉未幾武皇升遐羣姦洶洶正國勢危疑之際公頃刻間決定大䇿戡剿亂逆實以身蹈不測之禍事勢當此可不謂之難且急邪今聖皇繼統公親扶日轂而釐革誅罰之典又經畫精明世一變而為安厥功尤偉乃知天所以留公者正以為今日用也然公有此丕績方謙虛持盈惴惴焉以盛滿為懼是其體國之忠憂世之志人可得而測其涯涘哉書曰乃心罔不在王室傳曰臨大節而不可奪若公者真所謂社稷之臣矣宇辱公知愛久因讀公奏劄諸草少寓贊述之意并敢以功之成於前者為公慶而以功之圖於後者為公祀也光祿大夫柱國少保兼太子太保吏部尚書前南京兵部尚書參贊機務太原喬宇序楊文忠三録序視草餘録者録在朝奏對之言及政事可否之議也何為録之志愧也廷和承乏內閣前後十有八年視近嵗諸臣號為頗久初從文正李公後因以寡過及文正去任事多齟齬凡關切利害之大者知之必言言之必盡雖未得盡如所請而先帝每優容之一無所忤寅恭勑以雷霆臨之不力執則事日非而國體益褻一難也于時六龍出狩宸居虛拱且嵗餘二寧謀益人勢將傾行則有駭輿之虞居則有固圉之責二難也鑾輿既回大行事迫四家環布毫髮失宜虀粉立至三難也既而肅皇帝入御遭逢何竒比議大禮則以魚水之投而為氷炭之隔四難也公周旋其間停威武勑不草竟見信任居守維鼎擒瑾詒彬押虎逐狼外寧內安人孰不服公有定傾之功然後手扶日月啓四十六年丕承之烈又孰不歸公有定䇿之忠比其力辭伯封恥為灞上之請寧守硜硜不從永嘉之議又熟不亮公有信心之徵而言必信在朝廷可以表納諫之美在臣不可以見敬事之義藏之篋笴姑以示我後人不必其傳之久逺也嘉靖六年丁亥秋八月丙午石齋楊廷和序楊文忠三録序隆慶庚午余為臺史而內江趙文肅以閣學兼領臺事屬邊報急京師戒嚴公語余曰新都楊文忠當武皇時肘腋大姦弄之掌上頓安宗社儻藉籌邊何皇皇如此日繼得公所撰文忠墓祠碑讀之信公知文忠而言之非茍也萬厯已亥余為工相與惟一二同志之賢是賴今上入繼大統推誠委任化理維新時有獻納不過仰承德意坯土細流無補海嶽亦惟同志之助勉強從事以至乞休而歸居常自念平生遭際最勝在任最久而器識最下驅策不前所為報效者止於如此上負聖明下負所學多矣視草之餘隨事録之用以志愧一曰兒輩見之請曰昔人有所著述多在間居之日今政務叢委應接不暇倉卒紀録未必無所遺忘奈何輒語之曰政恐久而或遺乃役志於此縱不能悉猶愈於通無所述也若昔人歸田之録間取士大夫之笑談天順曰録或涉公卿之美刺今兹所録皆親承天語及閣中日常議擬關係職業者此外一無所附事有介時則永嘉進而公退永嘉之難難在違衆公之難難在嬰鱗而卒之易名皆不失為忠雖永嘉蓋棺即允公則蒙莊皇帝以肅皇帝遺命而及然肅皇帝知公不忘公之心一也惟是肅皇帝知公人人能言之毅皇帝知公信任公未有能言之者初公制歸有召守趣終制即起異數也諫齋祀止織造停兩挂印率勉從疏留浹旬或月餘未有竟不下者中使詣公或羅跪有罪逮繫不少假竟安國家於磐石非毅皇帝知公信任公寧至此公鄉人左司馬趙公合刻公視草題奏辭謝三録於楚以序屬余余題曰楊文忠公三録為輔弼龜鑑而因追頌我朝列聖慎簡輔弼而崇重之竟延國家有道靈長之慶如此亦可為萬世當寧獻萬厯癸卯上元日侍經筵資德大夫正治上卿都察院掌院事左都御史關西溫純序
