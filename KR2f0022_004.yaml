body:
  text: 楊文忠三録卷四明楊廷和撰視草餘録正德十六年三月十四日擬廷試䇿問付陳文書嚴呈上未久陳復持回倉皇言駕崩矣豫聞之驚悸失措私念危急時天下事須吾輩當之驚悸何為即語陳曰請衆太監啓太后取興長子來繼承大統莫錯説了話須臾魏司禮英等八人及谷大用張永張鋭同至閣中魏手持一紙授廷和乃大行皇帝遺命説與陳敬蘇進我這病則怕好不的你每與張鋭呌司禮監來看我有些好歹奏娘娘與閣下計較天下重事要緊不管恁衆人事都是我誤了天下事了臣廷和臣儲臣冕臣紀舉哀叩頭訖臣廷和即揚言且不必哭亦且不必發哀遂取皇明祖訓示諸司禮曰大行皇帝未有後當遵祖訓兄終弟及之文奉迎興長子來即皇帝位兵部選法倫序相承正是如此可啓請皇太后降懿旨大行皇帝降敕旨遣司禮監皇親文武大臣各一貟前去奉迎即日啓行途中不可延遲豫遂言內閣遣同官蔣魏云谷哥你去又云韋家你也去駙馬命崔元豫言見任大臣中武臣須皇親定國公徐光祚文臣須禮部毛澄尚書諸公皆應曰諾谷之遣豫意不欲危疑之時恐拂其意遂不敢更頃之厚齋色變向敬所云先生讓我去豫云此行廷和不敢辭以年老多病恐途中疾作有誤大事先生春秋高又方自南都回礪菴亦有痰疾所以欲敬所去非有他也其意不解既而寫奉迎敕稿於興長子下云取來京即皇帝位厚齋云且不必如此説豫云當作何辭厚齋方欲有言豫復云此行不可不正其名凡寫敕與臣下皆寫官名周令中書云即皇帝位正是官銜一般遂書之豫私念厚齋不得去在此必多齟齬遂告魏請梁代蔣去魏云隨先生厚齋乃喜行後百凡議擬豫與蔣毛二公惟善是主無所乖戾要之天意所在非偶然也初諸司禮來閣中王吏部與王兵部邀於左順門欲偕來諸司禮云我輩奉有敕旨無諸公事且云朝廷亦無他事吏部揚言云外面滿街俱傳言取白衣安得無事便呌科道來此等事如何不與我輩會議諸司禮至閣中具言之且戒守閣門者勿納一人議定奉所擬懿旨並大行皇帝敕書入啓畢出就左順門宣諭朝臣知之衆皆躍然大呼曰天下事大定矣府部諸大臣及六科十三道俱就閣中揖豫輩謝吏部雖偕來其色不怡豫輩亦慰之竊念倉卒之際人懷二心三二權姦多欲立其非次以貪功避罪昔吕端之鎖王繼恩李迪之制八大王韓琦之叱允弼皆事權專而委任重所以能辦我朝內閣無宰相之權豫輩任此亦難矣然此非豫之踈淺所能為祖宗功德深厚宗社靈長之福同官皆先朝敷遺舊德同心協力之所致也大議既定王吏部遂有並迎興獻妃之言豫曰天下不可一日無君今日之事望嗣君旦夕至豈可與宫眷同行吏部又言聞長子二月間方出痘恐不可以風豫曰天之所命百神衛護出痘與否未可知即出痘亦當平復如王霸氷合之説非人力所及也吏部又曰五月上任有官者忌之豫曰此俗忌也官員中有明達者亦不忌此紂以甲子亡武王以甲子興嗣君此來為天地神人作主何所忌邪吏部語塞豫因語奉迎諸公云可即日啓行谷韋皆應以明日四鼓發決不敢誤也又語崔都尉云公途中疾行厚齋與毛公或行遲愼勿相候也厚齋將出治裝命典籍多齎奏題本揭帖備用豫曰先生至彼傳命後即隨嗣君來有何題奏厚齋又欲帶兩房屬官各二員云至彼欲有所傳道豫云隨行者多途中供應煩勞厚齋云縱不用四人去亦須二人去豫曰必不得已屠主事可也厚齋云屠多病不可去豫曰屠信不可去亦不須他人厚齋又云至彼將為先生道達奉迎之意豫曰天命所在誰敢貪天之功邪慎勿言及於我異日府中人相見亦不敢承也奉迎之議既定遂擬旨散豹房官軍命太監張永張忠武定侯郭勛安邉伯許泰兵部尚書王憲提督優恤命威武團練營官軍各回原營操練各邊鎮守太監各回本鎮管事原調各邊並保定官軍各回本鎮操守各邊者俱於本鎮人賞銀叄兩命太監張永武定侯郭勛安邊伯許泰兵部尚書王憲揀選團營官軍分布皇城四門及京城九門防守命革皇店管店官校並軍門辦事官旗校尉人等俱回本衛命哈密及土魯畨等處原差進貢等項夷人該放回者該部各照原擬賞例給賞差人送回其餘仍令會同館安歇該管官貟嚴謹關防不許縱容出入佛朗機夷人差人送回廣東聽候豹房畨僧及少林寺取來和尚各回本寺南京馬快船隻除常例聽候外盡數發回各處帶來各色匠役樂工及水手人等各放回原籍命東厰錦衣衛緝事衙門及五城巡視御史嚴夜禁督捕盜賊已上事俱以先帝末命行之厚齋在安陸聞之言於藩府臣僚曰此等事何不少留待嗣君行耶夫事機之會間不容髮是時權姦人人自危兵柄利權所在若不急解之變起倉卒誰能制邪九門防守之旨既擬上因以告于王司馬憲及許泰泰意若不慊要王同至內閣欲有所言豫輩問之却不言時徙倚花臺前與王誶語豫謂泰曰今危疑之際所仗在提兵諸公諸公中倚公尤重諸公所以報朝廷正在今日有所欲言當直告我輩勿令我輩揣摩也王曰許總兵與朱平虜同事西官廳平虜又與張孫二太監同提督團營今張與許防守而不用平虜以此未安豫曰團營根本也留孫與平虜在團營專主調發人馬諸公在此專主防守各有專責庶不誤事豫輩再三慰之泰不應但以舌餂唇作次且狀且微語云這箇賊豫問賊為誰王曰李琮也又曰許總兵家中今用三百人防護豫曰今日之事忠臣義士無有不赤心為國出死力者李琮將欲何為李琮受朝廷厚恩圖報正在今日嗣君至日自有恩賞彼老將也亦知利害肯自取滅族之禍邪王云李琮凶狠平虜腹心也許甚憂之豫曰有諸公在琮不足憂亦無能為平虜能自保身家亦必不為琮所動也許公若必欲與平虜同事可一言而決勿次且也泰之意蓋顧望持兩端不欲明與江彬異同無事則因以為功有事則發言者當之耳頃之都督張洪亦至閣中言曰這箇賊不可不防豫問為誰洪曰彬也豫曰公疑江欲反邪公誤矣江明達人也往年征流賊回豹房過隊先帝見其耳帶箭鏃喜其驍勇因留置左右日漸寵任既又扈從巡狩一時隨駕者內外文武皆有之不獨江也江獨何罪而欲反邪伊蓋不必自疑人亦不可以此疑之也近年反者置鐇宸濠以誅君側之惡為名劉六劉七藍五鄢老人等迫於飢寒各嘯聚數十萬人作反隨起隨滅今皆何在朝廷何負於江江以何為名而欲反邪江即欲反雖其家丁亦不肯從與誰同反邪假使逆節一露旋即虀粉人何用疑之在伊自處亦自知本無大罪前日既無以報先帝今日當報之於嗣君趂此危疑之時與諸公協心共濟待嗣君至日閉門辭爵嗣君念其新功或仍其祿秩或聽其致仕未可知也伊亦何用自疑邪伊不必疑而自疑人不必疑而疑之此則在諸公掌兵者制之豫輩書生握數寸筆管無能為也洪唯唯而退洪蓋探豫輩意耳豫復語泰曰今日已晚矣不必遲疑西官廳舊有宋贇參將三千人可且分布防守各門過此一夕也因問宋參將何在泰曰見在午門外遂呼之入宋之先蜀人也豫迓而語之曰總兵鄉兄今夕之事一以付君嗣君至日我輩為君具奏之作一知證人也贇即出分部三千人於各門京城街市間人馬介介有聲意以為江彬部曲人心皇皇竟夕不寐城外者欲移入城內者欲奔出私相語以為彬且反矣非從容處之天下事未可知也許泰隂險猾賊凡江彬所為皆泰導之而隂避其名平居則朋惡以怙寵有事則危言以脅人充其心將欲如何而廷鞫之際不能盡其情尚有納重賂為之救解者大義不明國法不正一至於此至今思之猶將痛哭而不能已也防守之命既下十五日早豫與敬所礪菴二公入左掖門內與郭武定王兵部及許泰相見豫亟問云各門人馬巳分布否齊應曰張太監不肯相會我輩派定者張公又欲改撥豫曰諸公就而會之如何今日之事須同心乃克有濟郭云人馬在營中如散沙然我輩原非團營官兩手只扯得兩人權不在手如何行事豫云懿旨既下即權之所在若只一束草亦當聽受節制兩總兵皆世受國恩司馬公掌九伐之法如何可為此言朝廷何所賴邪諸公皆遜謝豫時有所激辭甚峻尋亦悔之然不容已也於是武定諸公乃往就張議之至午王吏部同永忠二張太監至閣中言曰二公受命防守須重其權不然恐行事不便豫曰唯唯徐謂永曰公朝廷重臣平置鐇擒劉瑾威望久著今日之事內外倚重又謂忠曰公朝廷近臣久在大行左右能直言為大行所親信今當危疑之際同心共濟嗣君至日自有恩典忠曰防守事體最重若無名目無敕書無關防如何行事豫笑曰倉卒之際豈能便鑄關防懿旨一下即是敕書提督防守即是名目嗣君旬月之間可至我輩臣子當此有事之時大率各盡忠心隨事效力為是議論多恐嗣君聞之亦不樂也又謂永曰今早聞武定諸公云人馬尚未會撥恐不宜太遲永曰已分布矣但欲請賞賜耳豫輩曰賞賜朝廷不吝也吏部初來徑造閣中堂豫輩但揖之無延入之意已乃迤邐出至閣門外大慙沮故事改革之際各門防守原無敕書時忠亦無防守之命吏部乃挾之以來獨不念嗣君未至尊位尚虛假母后之命以號召內外人心訩訩是何等事變而忍為此掠美嫁禍之計邪內外奉迎官行後復議啓聖母請命司禮太監一人及京營提督官領兵迎護遂命溫司禮祥及提督團營太監孫和惠安伯張偉兵部侍郎豫弟正夫領京營兵五千人往鄭户侍宗仁主饋餉趙工侍璜治道路孫和等皆言兵少豫謂經過處所供億繁勞必不得已六千人足矣和又欲請旗牌二十四面副豫言此行與征剿不同無他調發安用旗牌是日早方欲哭臨和拉王兵部候豫輩於金水橋南言之豫輩不應和又欲渡河而南豫言但候於黃河北岸可也數日後王吏部要府部科道俱來言各衙門欲分官奉迎豫言二十四監局諸貴幸皆欲去恐其途中請間迎合有先入之姦已力止之矣諸公若去彼將有詞也明日禮兵二掌科言曰聞諸貴幸多齎金帛前去行賂須科道各遣二人往時監察之庶有所警豫云彼欲行賂豈令人知若隨路糾劾恐驚疑人心事體不便萬一發之不中嗣君之心先疑矣張太監永使人來言欲迎至真定上下豫謂行止在公不敢與知也郭武定及許泰亦為之言使者再三至乃語之曰公受命防守委任最重若必欲逺去各門之事能保無他虞乎張鋭人來亦復云云豫曰我輩但知公領敕提督官校京城緝事耳他非所知也遂皆止不行十七日朝臨罷出右順門王吏部向豫云天象可憂豫問如何王曰不見日色乎日色正赤豈不可憂豫曰久旱故耳王曰占書不然主女主昌豫曰今以懿旨行事非女主昌而何王曰恐其應不止此豫曰天道逺非人所知天若祚明必無此事也似有幸亂之意蔣毛二公言曰辟如應試秀才文字不得意但欲科場失火耳可嘆可嘆慈夀遣散本官傳諭欲改懿旨為聖旨豫與同官言今日之事祖宗功德深厚上天眷佑宗社靈長有老太后在上當此大變嗣君未至凡事皆以懿旨行之盡善盡美萬世稱頌若欲改稱聖旨事體似有未安因檢祖訓皇后不許干預朝政一條示之云皇祖內令如此之嚴又檢大明律內皇后稱懿旨一條示之曰我輩不敢差了久之又來傳諭云前代有稱聖旨是如何我輩云世代不同法度亦異如前代宰相封王童貫內臣亦封王此等事今日行得否老太后盛德大功為今日女中堯舜我輩豈敢不成就盛美以致貽譏後世邪遂不復言江彬提督團營之命久下尚未領敕三月十四日至閣中會敕豫輩恭問聖躬近日曾進藥否因慰藉之旋聞晏駕之變十五日彬不出十六日出聽遺詔十七日朝臨罷魏英出右順門向豫言曰親家煩扶持謂彬也豫云公親家朝廷大總兵也安用扶持時京師人口語籍籍皆言彬決反豫與同官切憂之敬所時以為言且云疑者事之賊也豫謂發之有機萬一不中大事去矣十七日晚愼恆二兒皆言外議謂父親何不早擒之豫漫應之曰彬逆節未露將以何辭擒之邪仔細保首領勿取滅族之禍蓋慮後生輩不密故云然十八日早入朝至端門同敬所行因以告之敬所云連日介介豫懷者正在此耳豫云彬手握重兵發之須中機會今日可與文書房議之是日命夀寧侯張鶴齡齎遺詔往安陸誥諭用寶諸司禮令陳嚴王欽二文書來閣中請豫輩同看言已即去時礪菴以痰疾作卧朝房中豫與敬所同入至左順門要陳王回密語之曰外議皆謂江彬不擒恐不靜煩告衆太監啓太后早為之處陳曰用寶後老先生自言之若我輩言稍有不合不敢復言矣豫曰良是用寶訖諸司禮揖豫輩出陳曰兩先生有話説因屏去左右豫復左右顧魏司禮云爾輩都去都去左右皆去豫二人揖諸司禮云前日之議大功已成宗社之慶也但有大患未除若大患不除大功未得全美魏問曰何為大患豫以魏與彬為姻家不可徑以為言先曰大義滅親古人所重管叔蔡叔都是周公弟兄二人作亂周公誅之東晉宰相王導有兄王敦謀反導親誅之至今聲名垂於史册公雖與江彬為親奉大行之命出於不得巳實非本意也今外議紛紛若不請于太后及早擒之恐彼亦不能自安將貽嗣君以憂未免為大功之纍張鋭疾言曰彼有何罪豫曰江彬挾著皇帝著處巡逰安得無罪魏曰巡逰出大行聖意何人敢挾鋭曰前年去南京我送至涿州某事如何處某事如何處一一出自上意法度又嚴誰人挾得豫竊念大行巡逰時諸司禮多在扈從恐激之怒因好語曰挾之一字我誤矣再不復出口江彬罪惡萬千如擅引邉軍入禁內擅立威武團練營擅改團營教場為西官廳教場擅立鎮國府名目之類擢毛不能盡其罪只舉一二件也勾他死了魏乃曰他委的惡貫滿了罪不能逃鋭猶極力為辨豫曰公莫回護他鋭曰我如何回護豫曰這等説話豈不是回護我輩言出禍隨身家巳不顧了公亦須自顧身家公雖無子孫亦有祖宗墳墓亦有兄弟都是祖宗子孫不可不念見今嗣君未至萬一有變途中聞之安得不驚諸公同聽今日之言他日有變張公當之不得辭也陳嚴見事不諧引溫太監衣附耳云云溫因向魏云且收得在豫與敬所即應云正是且收得在又不問他罪待嗣君至日或寬宥他也未可知擬旨所以有監候之言敬所云待了此事方去哭臨鋭曰如何這等急豫曰此等事情間不容髮安得不急公便去準備拿人鋭曰我如何拿人豫曰拿人是錦衣衛事彬之罪該籍沒緣坐一拿後封閉門戶防範人口照管財産豈不是行事衙門的事公何故抵死攔截也溫因揖豫輩出曰老先生每去閣中調旨意文書房去取旨意來豫與敬所再四謝云諸公扶持社稷竭盡忠誠同幹好事太祖太宗孝宗在天之靈亦知諸公之心千萬就奏太后行之擒彬賊後方哭臨也又云與江彬同惡相濟者止李琮神周二人他無與也諸司禮皆以為然既擬旨付陳進呈久之未下豫與敬所私念事若不成禍必先我三家我輩豈肯離此地壞於賊手但兒子輩在外不能逃耳又念弱孫心為之痛復相與慰藉遭逢至此莫非數也死得其所亦復何憾敬所云天若祚宋必無此事頃之有人報神周已宣至右順門伺候久之陳來云江彬已擒矣幾乎逸出豫與敬所再拜以謝陳亦拜謝豫輩曰二老先生大功大忠也延之坐備述所以是日坤寧宫安獸吻豫恐張鋭至工所與彬言之事敗矣問之則鋭已從工所來不復去矣但聞工所有內豎附耳語彬遂急奔西安門以取西官廳文書為辭中道折向北安門亦復云云門者云有旨留提督彬叱之云皇帝何在旨從何來手批門者守門人羣擁抱之追者至遂縛之由東安門至錦衣衛直房內官數百人隨而撲之拔其鬚鬢殆盡豫謂陳曰一時撲殺之誠快人意仍須留待嗣君來鞫問明白肆諸市朝以正其罪陳遂去告魏以此意遍曉於衆令長隨護之出端門乃止時久旱遂雨都城中歡聲雷動有拿了江彬朝廷安穩之謠蓋以吻為穩也王吏部瓊聞彬被擒呀呀失聲蒼黃奔魏英于河下河下者魏司禮宅也不遇復奔東安門欲趨外宅遂不及哭臨百官至右順門豫尚語鴻臚寺行禮須待冢宰至久之不至乃行禮李琮自其家縛至錦衣衛朝房罵彬曰汝早聽我言豈至於此彬云悔不自斷其子怨其母亦云然時收捕者云彬已分腹心於東安西安北安三門衷甲裹糧立馬以伺動息蓋其處心積慮久矣是舉也贊其決者敬所也先是奉迎官啓行時即與之約以四月十八九至京師二十二日嗣君即位或有沮撓者已斥之矣既而谷太監等有啓本排日計程大約二十二三方可至京即位擇在二十四二十七兩日豫與蔣毛二公皆怏怏于中欲以兼程啓請又念長途冒暑恐不可強既聞渡河後日每二程二十前後間可至京乃知前日非不能速不欲速也竊以為憂至二十日早王吏部瓊要九卿科道候豫輩於左掖門外議欲迎至良鄉豫輩唯唯問至再則應之曰初議如何蓋初時禮部會議嗣君至日百官迓於彰義門外二里許如漢文渭橋故事至是王必欲逺去豫輩不應忿然曰何不斷也諸皆無言科中亦有一二人以為不必違初議者王别去至部中更衣遂行既出宣武門乃遣人上疏啓知慈夀不早上者恐尼之也各衙門相繼去二十一日早至良鄉朝于行在槩慰諭之而退先是王嘗遣四人至安陸書辦官陳潮隨厚齋趙咨隨崔都尉其二人則營中舊部曲一指揮一千戶也四人者皆於內外府僚處為伊道情欵王意此行必特召見賜問乃不然大慙沮而退午後豫與二同官出巳過彰義門見有校尉數輩馳馬來問是內閣否且云諸司禮請于行幕相見有事啇議豫輩折而東頃之文書房亦有一二人來俱至幕次谷韋二太監崔都尉皆在與諸司禮揖豫輩言曰府中議欲明日即位如何豫即響應曰正好正好諸公初往奉迎時已擬擇此日今得如初議此天意也同官皆和之又言請亟啓懿旨命嗣君即位今日晚嗣君便請至行殿三箋俱於行殿次第上之諸公皆以為然因擬旨付谷韋二太監啓慈夀崔都尉回良鄉復命漏下二鼓嗣君至行殿先是箋文已授禮部遂上第一箋不允召內閣宣諭上第二箋不允召府部諸大臣宣諭上第三箋乃允三批答皆就行殿東廡擬上文書房供紙筆墨硯金序班雲鴻書之時久旱第三箋命下雨隨降文武侍衛及逺近迎候瞻望之人歡聲雷動以為帝王自有真非人力也二十二日五鼓時嗣君遂由正陽門入二十二日之議既定敬所先回閣中整理詔書兩房官在門外者皆趣之回詔條中若軍門皇店官校豹房畨僧寫亦虎仙數事尚未入草豫别用小摺親書密緘之藏於刺函中防漏泄也敬所至豫家諭家童取之以去至閣中巳晚杜文書震送官燭送酒饌兩房官就中堂分書之黎明時揭帖已進呈敬所又密書片紙與杜轉付錦衣韓指揮待詔下後密捕之蓋趙瑾姚俊張倫張璽舍音和珊諸罪人姓名也又與杜約批紅出方鳴鼓至日向辰文書房官忽來言欲去三二條皆關切時忌者豫揚言曰數年以來事有齟齟者皆曰朝廷不從今日朝廷到便有此等事乃知前日虧了朝廷多少即此一事廷和便當出去不可在此地但未拜新天子今日拜賀後明日跪於奉天門前乞休且奏陛下初到如何便更改詔書務見明白雖死亦甘心也蔣毛二公皆力言之豫又言果欲去某條便須在本條下注云臣某去此乃可耳文書房官知不可回復持去久之鳴鼓批紅猶未下豫與三公亟趍華蓋殿後往來玉除間不見一人局蹐無所容入而出出而復入者至再竟無所遇復趍奉天殿覔直殿者要文書房官來相見且語之云亟去萬一誤事我輩有説話也厚齋云批紅若不下明日開讀也罷豫與二公言自古人君即位雖草昧中亦須下詔改元以新天下之耳目今日之事若無詔書不知所改者是何年號人心惶惑恐有他虞誰任其咎杜文書復來云衆老太監都不肯奏蓋是日蕭太監初宣入魏掌印事未定故也再四懇之入乃得批紅來且曰幹我家事也不是如此用心豫與三公言處官事如家事正是公盡忠處太祖太宗孝宗在天之靈亦鑒公此心也遂命中書就閣中取詔書十三張用寶訖即持入鐘已鳴矣是日早雨尚霏微辰已時猶隂翳鼓聲一動天容日色萬里開霽無片雲晶英濯濯照映黃瓦若洗濯然京師老稚皆踴躍歡慶舉手加額曰真太平天子也我輩有福矣正德十六年四月二十四日午前召臣廷和臣冕臣紀見於文華殿臣廷和致詞云陛下順天應人為天下臣民之主初至行宫雨澤隨降一登寶位天日開明可見宗社萬萬年之慶上曰先生每説的是知道了臣等叩頭訖臣廷和又致詞云伏望陛下敬天法祖修德愛民任賢納諫講學勤政建立萬萬年太平之業臣等不勝幸甚上曰先生每説的是知道了臣等又叩頭訖上賜酒饌又叩頭訖方退進揭帖謝恩正德十六年四月二十五日早命文書房送下各衙門題奏數本皆御筆親批也因進揭帖稱謝云今早伏覩皇上御門視事宣諭禮官臣等仰瞻天表喜慰良深退至閣中司禮監官送下御批數本拜觀之餘竊喜陛下躬覽章奏親御宸翰字畫端徑真得心正筆正之意陛下勤政務學之盛節見於更化之初如此可為天下賀也臣等尤望陛下緝熙無間日進高明宗社無疆之慶端在是矣臣等不勝感仰之至上即位後三日王吏部率九卿上疏請上親政事首引祖訓不設宰相為言凡六部有疑事擬旨未當者召該部該科面議且有不滿劉謝二公正德初年過激之意因乞辭任仍先屬瑞虹弟語豫通欲慰留以責後效云云散本官送文書至閣中笑曰王天官好巧計不肯各自辭欲以一本中了事邪豫應之曰朝廷亦巧於批答也擬旨褒諭之不及辭任事又明日科道交章劾王瓊等二十餘人擬旨俱令致仕上不可仍發回改擬散本官作色言曰上面言內臣張雄張鋭張忠于經等武臣許泰錢寧裴德等俱下獄文臣中亦有朋姦亂政罪惡顯著者皆得輕貸何也老先生常言用法須平閣中這案棹是天平架子如此處置可謂平乎蓋指在內二三尚書在外一二巡撫也豫言諸君所説皆是文官中朋姦亂政者誠有之但所壞只是一衙門事壞事者退則衙門復清矣如雄鋭許泰等蠱惑朝廷移住豹房新寺南北巡幸離間宫闈以致國本中絶此何等罪惡可贖不可贖也散本官云王天官先在兵部時戴爪剌穿貼裏親至豹房與朝廷飲酒非蠱惑而何豫云此等事外人都未之知散本官云今日則知之矣於是欲擬王冠帶間住不應乃擬革職為民明日又發下必欲收下獄王因科道之劾私使人來屬又托瑞虹再四致意但遜謝之無一言以復時內外戒嚴關節不通王危迫甚亟捃托奏豫意豫因奏回避將有庇之者上覽奏怒甚欲重治之豫復為救解蔣毛二公遂進揭帖如左二十八日召豫三人至文華殿慰諭賜酒饌張司禮又傳諭上意欲豫發其事對曰外廷自有公議刑官自有正法廷和無用較也既下獄雨隨降時方亢旱御史李獻等奏比之烹桑𢎞羊云先是擒江彬及後是誅錢寧皆久旱而雨歡動京師蓋人心之厭亂即天心也蔣毛二公因張司禮傳諭乃疏王覆議逆濠事情節略以進正德十四年南京內外守備等官黃偉等奏報江西宸濠反逆一本內稱宸濠殺害巡撫方面等官占擬九江等處城池其為反逆昭彰明甚本年七月十三日已奏抄到部自有此奏到京人誰不知宸濠反逆無可疑者又何待體勘哉本月十五日王瓊乃按住此本不行覆奏却將黃偉等并巡撫等官李充嗣等前此所奏題覆乃云事有可疑又云尤為可疑又云中間恐有别情又云合無本部差官前去沿途直抵江西探聽體訪差去官員體勘的報取具本處官司印信文書回奏不許止慿傳聞輕信忽略又云不必張皇失措其本內並不及黃偉等反逆昭彰明甚一言又彼時江西各衙門印信皆為宸濠奪去乃欲取具印信文書其意皆出回護蒙蔽其前項奏本覆本月日前後一一見在兵科可查此蔣毛二公疏王吏部事情正德十六年四月二十九日上因王吏部奏廷和召臣廷和臣冕臣紀見於文華殿臣等叩頭訖上諭曰先生每為國勤勞朕悉知之宜安心辦事臣等叩頭訖謝云陛下聖政更新臣等奉行唯知守法不顧怨謗以致流言上賴聖明慰諭照察臣等不勝幸甚上復宣諭云知道了賜茶而退錢寧以狡黠得幸出入禁中進見無時朝廷左右皆其私人或有所欲言時令家僮密啓無人敢間之者先帝南巡江彬始從道中發其交通宸濠狀還至臨清乃逮係之今上即位後兩月法司方議其罪初寧厚遇士夫本衛官校及內庭諸臣皆為所餌又以發自江彬間有為之彌縫者法司鞫之謂不得其死罪狀豫曰錢寧冒國姓擅威權進退大臣改易鎮守四方賂遺月無虛日宸濠護衛屯田之復皆出其意其罪浮於逆瑾天下皆知之更欲何云既而藉沒江彬家得取宸濠世子司香手敕諸司禮令散本官持來閣中示豫輩謂是錢寧所為其中有此敕出自內意閣下不知之語豫因與散本官言曰錢寧罪惡至此外人豈得知之即此可正其罪矣即欲將手敕發出意內中不欲或反有沮格止就法司議罪本中據此擬票以進明日得旨乃正典刑寧赴市曹時始知其死臨刑詈豫不絶口蓋知豫所擬也後言者乃借其言以仇豫噫亦誤甚矣初查革詔下權貴家弟侄有奏乞以都督致仕者豫應之曰事在兵部再四言之不可遂止言者蓋其所嗾也正德十六年五月十二日豫與同官恭詣武英殿題武宗神牌諸司禮皆在張司禮首言追崇大禮豫曰連日議論已盡更無他説自古聖帝明王莫如舜禹舜有天下不曾追崇瞽叟禹有天下不曾追崇伯鯀此可為萬世之法漢宣帝追諡史皇孫王夫人不過曰悼考悼后至今猶非之哀帝尊崇定陶衰世庸君所行不足為擬魏明帝敕戒公卿謂今後藩王入繼臣下敢有邪佞導諛謂考為皇稱妣為后者股肱大臣誅之無赦晉元帝自琅琊王入繼止立皇子為王奉父共王祀宋時濮園之議英宗終於不行孝宗理宗並不追崇所生所以廟號稱孝稱理今日我皇上舜禹之聖也漢宣帝以下皆在下風我輩臣下不以舜禹事之而顧阿意導諛使蹈哀帝之失是萬世罪人也諸司禮亦反覆言之曰先生每所言皆是皇上但欲盡孝情不可不從豫曰外廷公卿科道自有正議誰敢犯之是日蕭司禮又言及張邵夏蔣四皇親家人輩時有訟四家強占人房屋地土搶奪人財物畜産者法司鞫之其家人輩皆擬枷號充軍奏下閣中文書房傳諭上意欲貸之豫與同官執不可往反再四至是蕭復以為言豫曰數年以來權姦擅政法守盡廢外戚家因而怙寵生事新天子嗣位如初日照耀萬方皆仰光采各皇親家正當奉法循禮以助新政張氏二侯尤當痛自檢制以為之倡率顧乃首欲犯之邪往年無籍之徒指稱二侯名目在外害人京師人怨入骨髓二侯恐不及知未能禁約遂使錢寧張鋭輩得以藉口搆于大行前姦人曹組肆為誣奏重賂寧鋭輩至十數萬兩事乃得解尚不許朝謁杜門不出者數年太后在內多有不安亦不知外家之事至於如此前日已誤今日可再誤邪重治此輩正為衆皇親家增福也蕭附耳語云各宮掌宮太監及各監局掌印多在此恐聞之豫曰正欲揚言于大庭使之轉聞于內戒諭外家自求多福也既而各家人輩皆發遣充軍但免枷號耳新政之善如此正德十六年十二月七日傳旨取回廣西鎮守太監傅倫廣東市舶太監牛榮命御馬監右監丞鄭斌守備倒馬關太監楊金各代之以右少監安川守備倒馬關先是聞近幸有請託宮闈進獻珍玩干恩澤者至是果然戶兵二部各有手本請敕豫與同官上疏言聖明嗣位以來采納忠言釐革弊政各處鎮守等官壞事害人者屏黜殆盡代之者類皆廉靜老成事體漸諳人心已定但令久於其任地方自安今蒞事未久過失未聞輒復更換朝令夕改徒長姦弊未免為新政之纍乞收回新命仍令原任官照舊用心辦事敕書免令臣等進呈仍密諭該部論之遂不果行明年三月二十一日復傳旨命鄭斌分守四川建昌楊金分守陜西涼州安川看守廣東廉州珠池該部亦有手本請敕豫輩執奏如前其事復寢時羣邪觀望伺隙而動使此端一開將來流弊恐不止如正德年間事矣上之明於聽納如此自成化間以來朝廷所病者冗兵冗食之費臣下建議皆首以為言未能裁省劉東山司馬在𢎞治中最為孝廟所知每因召見輒以為言孝廟納之乃上奏欲裁革騰驤四衛之冒濫者已得請孝廟上賔太監寧瑾奏止之東山以此怨謗叢集遂及於禍身幾不免正德中冒濫尤甚十六年四月以前在京官軍旗校勇士軍匠人等食糧之數共三十七萬二千一百餘員名一年支米三百九十八萬八千八百餘石嵗運四百萬石之餘除海運三十五萬石外雖盡數到京亦不能支今上嗣位之初明詔一下凡查革十四萬八千七百七十有餘一年實支米二百四十五萬六千四百餘石所省一百五十三萬二千四百餘石半年之後人心已定既而內官御用尚衣織染兵伏等監局諸新貴各奏乞收補兵科一一參出時司禮監亦有查補之疏兵部初亦執奏其詞過激內批有詰問之意乃遽引咎欲併二十四監局已革者盡復之豫與同官讀之太息以為新政第一美事只此一本盡壞之矣姑擬旨令其再行查議又月餘覆上會有南京大水之異豫輩又極以為言擬旨已查革的再不許收補存留數內有逃亡事故者照數勾補幸而聖明俯納如所擬批出諸司見之皆相慶此亦一大機也大婚揀選分遣近臣在京蕭司禮領之已得劉鎮撫女為首選外議紛紛謂劉之先故太監永誠家人也以蕭主之莫敢有言者豫欲禮部發之毛尚書澄未決會有與劉氏爭者揚言于諸王館前寖聞于上召府部科道官至左順門議之毛乃具述外議云云蕭不以為然因出一揭帖相示曰此東厰訪察之奏也故與永誠無干禮部該司言曾查兵部貼黃實如外議豫曰內臣以朝廷為家果然則朝廷自家人也何用選邪遂不果選毛因是得免物議嘉靖元年正月十三日上以清寧宮後三宮火命司禮監傳諭宮眷居住稠密欲奉遷武宗皇后居西城仁夀宮賢德二妃居永安等宮憲廟皇妃之居清寧後宮者亦並西移豫輩聞之驚愕遂言皇上仁孝豈宜有此舉動嘗聞西城仁夀宮乃先朝幽閉廢黜之所武宗皇后母儀天下十有六年皇上在藩邸嘗以臣禮事之况親受武宗神器之傳恩德甚大事其后妃禮宜從厚今康陵土尚未乾遽忍忘之邪憲廟諸皇妃逮事皇祖與邵太后實在同時親愛之情不言可知偶然遭此回祿之變正當體念安慰顧欲置之此地非惟聖心不安恐邵太后之心亦不欲也此於聖德所損不小若未行不必行已行亟止之庶不起天下紛紛之議尋具揭帖極言之其事遂止蓋亦不出上之意也嘉靖元年八月初大婚選到女子將進宮揀選擬上聖母昭聖慈夀皇太后懿旨令欽天監擇日司禮監傳諭欲出自夀安皇太后豫與同官皆以為不可往復再四未允遂具揭帖言聖母作配皇考孝宗母儀天下垂四十年去嵗首定大策迎請陛下入繼大統有安社稷大功近日加上夀安皇太后興國太后尊號大婚遣官選擇皆奉聖母之命而行必出於此然後名正言順協于公論今一旦改易衆心未免驚疑恐致天下紛紛之議伏望俯從初擬庶幾事體穩便不至虧損聖德又數日乃得允臣等仰窺聖意蓋亦有不得已者存焉耳嘉靖元年八月二十八日日講官祭酒趙永講論語首章未及終篇而退朝廷特遣太監扶安慰諭再三明日臣廷和等致詞稱謝云講官趙永昨日講書遲誤欽蒙皇上傳宣慰諭臣等不勝感戴叩頭謝恩又奉聖旨卿等宜安心辦事不必介意臣廷和等舉手相慶而退時講官諭德臣溫仁和臣董玘校文兩京侍讀臣徐縉以丁憂去惟諭德臣李時一人供事永初以是日受命進講在文華後殿中前此身未嘗到至是叩頭見訖入班甫定即趍至講案前敬慎太過以致稍欠接續再承溫旨慰諭皇上體悉臣下其寬仁一至于此嘉靖元年十一月十八日夀安皇太后崩逝蕭司禮傳上意欲頒遺誥且手持一黃揭帖曰此已有稿第欲先生潤色之豫云遺誥止行於宮中先傳旨諭禮部具喪禮儀注可也蕭去豫遂與同官言曰遺誥在夀安未宜皆以為然豫又曰三年之喪亦不可行礪菴曰且先議服制服制定乃議其他因取會典摘大明律令孫為祖服齊衰期年之文相示又取孝肅孝貞大喪禮俄注閲之豫曰內庭一應祭奠皆如舊儀不可減外庭之禮皆殺之服以十三日而除遂擬敕諭進呈敬所謂有敕諭可以止遺誥矣明日早掖門未啓散本官趣豫輩入索遺誥豫曰昨已進敕諭矣再來應亦如之未幾諸司禮偕至閣中傳諭上意今日之禮悉如孝肅行事急頒遺誥豫曰事體似有不同蕭曰夀安與孝肅皆自皇妃為皇太后如何不同豫謂孝肅於憲廟為親母孝廟承憲廟之後服制當行三年亦當頒遺誥今上繼孝宗之後承武宗之統因興獻帝乃加尊號蓋聖情有不得已者於禮為未安於義為未正豫輩自去年三月言之至今外議紛紛猶未已也此事豈可更犯衆議以損聖德萬一不聽豫輩言議者復將紛紛聖躬才平復能無傷聖心耶宫中禮儀一切從厚聖心亦可少慰也尋復來執議如前謂上意必欲服三年之喪豫輩言此乃綱常典禮所繫決不敢從諸司禮謂非天子不議禮今以上意行之何為不可豫言非天子不議禮謂所議者合於禮也若非禮之禮豈天子所議况既謂之議須合天下之情非獨斷也尋召豫輩至文華門豫以為上將面議之及至門下則諸司禮云一應禮儀上意俱從列位先生言但欲改十三日為二十七日耳再無容議也豫云所當議者正在服制廷和今日不言將得罪於天下後世太祖太宗孝宗在天之靈必加隂譴他日死而有知見自已父母於地下父母必謂爾伏祖宗福廕遭逄聖明濫叨大任不能輔導朝廷以禮今日何顔見我也張司禮云老先生議論已到忠情已盡朝廷行三年之喪亦盡孝道君臣之間忠孝兩全豈不是好老先生説他日無顔見父母於地下即是王旦削髮之意但王旦是贊助天書矯誣之事與今日事體不同豫云為大臣不能事君以道隱忍不言即是欺心與矯誣天書一般衆司禮云連日議論我輩一一奏知聖意堅欲行三年之喪以盡孝道先生每何不順從豫云經書所言孝道事甚多今不必逺引論語中孔子告孟懿子問孝的言語只説生事之以禮死葬之以禮祭之以禮便是盡孝的事若服制非禮豈得是孝豈可阿意曲從同官相繼言之諸司禮皆變色謂上意已定我輩更不敢奏也然二十七日之制但行於宫中免頒遺誥外朝哭臨止三日在外王府並諸司俱免進香亦見降殺之義矣甘肅軍士因爭折糧銀捶死巡撫都御史許銘大變也實總兵李隆之意所謂解雖不知甚於解殺之者推此意以正其罪隆復何辭陳巡撫九疇議其獄擬以主謀則求之似太深矣及隆取回在道又奏彼欲與其黨入賀蘭山作亂正欲甚其罪耳都察院獄上議如九疇命多官廷鞫之仍如初擬上疑之乃擬旨此大獄關係朝廷紀綱死者當雪其寃生者當正其罪干證人犯俱在彼處差官再勘正欲曲盡事情以服人心遂遣鄭大理嶽王錦衣佐同往先是甘肅奏亦卜剌近邉出沒鄭難之欲械隆往並逮繫干證人龎鎮李夀及楊淮等五十餘人至西安會鎮巡官鞫之都察院覆奏會於蘭州鄭偕王至閣中會敕猶以邉報為辭豫曰公等若以寡就衆徑往甘肅最便若謂見有虜患則五十人者械繫逺來尤為可虞昔顔真卿使李希烈亦無此長慮也嘉靖二年二月二十六日以畿內雨雪愆期風霾連月四方亦屢奏災異擬上修省敕稿請諭內外文武官員各修職業以回天意明日批紅發下增其先年親臨戰陳斬獲外冦並流賊功次曾經核實的兵部還查看來説二十八字豫與同官見之愕然因語管文書官曰刑賞僣濫是致災之由若增此一段是此畨敕諭專為查革官而降非惟不足弭災恐益重上天之怒也亟具疏言之仍録舊稿封進竟如初擬豫與同官舉手相慶以為只此一舉又一畨新政也可見上意初無所主將順者莫為力耳二年閏四月二十二日以後豫以宣弟及余氏女之戚在告五月十四日上命諸司禮至閣中傳諭欲加興獻帝皇字同官不可旋具疏言之至六月初四日豫出朝上語諸司禮曰楊先生出矣至初九日復遣諸司禮來申前説初十日早復來應之如前去而復來明日又來豫言此事關繫萬世綱常自右皆無人敢行豈敢自我輩壞之况自正德十六年言之至今使其可行何待今日廷和等四人雖死不敢奉命若必欲行我輩惟乞休去耳蔣亦極力言之毛費皆和之諸司禮知不可奪乃去嘉靖二年六月十八日朝罷召臣廷和臣冕由東角門入至平臺謹身殿東後左門之左也及門張司禮承旨呼來臣等應之如文華殿後日講之儀入門叩頭者三上曰前乃稍進去御座僅尺許上親授臣廷和敕一通諭臣等曰是孝道事先生將去行臣等叩頭訖共展讀之其辭曰諭大學士楊廷和等朕承天命入奉宗祧自即位以來奉天法祖恭侍兩宮日勤政事未敢一時怠忽朕本生父興獻帝母興國太后雖帝后之稱禮養於天下未遂朕心矣今尊朕父興獻帝為興獻皇帝母興國太后為皇太后其尊號字稱並敕諭卿等便寫擬來看施行朕以答劬育罔極之恩安治天下卿等其承之再勿固執宸翰也臣等又叩頭訖臣廷和言曰臣等欽承上命敢不遵奉但此大禮關係萬世綱常在舜禹之聖皆不曽行陛下有舜禹之資臣等不以舜禹所行事陛下是不忠也况自古以來所未有之事豈敢壞自今日上曰自古亦有行者臣冕曰古來惟漢哀帝曽行陛下不法舜禹如何學漢哀帝然哀帝亦止稱定陶共皇未曽有稱帝者臣廷和言哀帝是衰世庸君不足為法臣等望陛下惟法舜禹臣等自正德十六年三月十四日言之至今使若可行臣等當先事奏請上以慰皇上孝心下以盡臣子職分何待煩勞聖意也臣等議論已盡雖死不敢奉命上曰朕受天命繼大統要為父母盡孝道臣冕言天子之孝在於承宗祀安社稷陛下承太祖太宗孝宗武宗之統興獻帝與興國太后稱帝稱后已極尊崇今止讓一皇字少見大宗小宗正統本生之别若再有所加祖宗在天之靈必不能安恐興獻帝神靈亦必不能安也臣廷和言去年帝后尊號之加外議至今未已臣等心尚未安若再有所加未免損聖德虧聖政臣等輔弼之臣將欲何用上曰朕心只欲盡此孝情臣廷和言連日司禮監傳諭聖意委曲詳盡臣等俱已知之孝道莫大於盡禮孔子告孟懿子問孝只説無違無違是不違悖於禮便是孝道若違悖於禮豈得為孝凡人能隨事盡得本等職分皆可稱孝古人以事君不忠戰陳無勇為不孝蓋為不能盡本等職分也陛下敬天法祖用賢納諫愛養軍民全盡君道即是孝之大者上曰朝廷政事朕不曽怠忽了臣冕言陛下日勤政務便是大孝的事臣廷和又言陛下順天應人入繼大統為天下臣民之主若此等大禮所行未當則上無以合天心下無以服人心誠恐聖心亦自不安臣子之心皆不安也臣等恭奉聖諭措身無地豈敢固執亦知陛下之心有大不得已者容退後再進揭帖陛下從容啓知興國老娘娘以安老娘娘之心張司禮跪云到下面再議臣冕云更無他議諸司禮皆跪賴太監云叩頭叩頭臣等叩頭訖命賜酒饌臣等又叩頭訖遂奉敕諭出諸司禮皆出門送舉手相揖上言溫氣和臣等辨論雖多玉色怡然略無所忤天地之量也初承召時王文書平導之入且行廷和私語敬所曰此為大禮也事必不行言不可激敬所以為然一時應對之言不能悉記姑録其槩如此以侈遭逢之盛云時毛費二同官俱在告嘉靖初元有旨命科道部屬官查勘御馬監草場地踰年盡得其姦私狀以奏户部覆議請追罪其舊任者疏下閣中擬旨逮問司禮監傳諭上意欲宥之往反數四執如初擬九月十八日文華殿日講罷既出屏外復召臣廷和臣冕臣紀臣宏進至御榻前諭曰草場舊事不必深究臣廷和對曰此一事最為先朝聖政之纍場地連跨三四州縣典守者不遵舊額侵占官民田土幾萬頃發人墳墓以千數所在軍民至今怨入骨髓事雖已往不罪之無以示戒將來三臣以次而對皆謂草場嵗租銀不下數萬餘兩盡為掌監事者侵用利歸於下怨在朝廷不可不罪上曰草場地傳自纍朝谷大用等皆先帝所命今俱斥逐去任矣臣等對曰先帝之命本欲其奉公守法不使之害衆斂怨况官地本以牧馬不使之收租收租又不以給公家之用官雖去任贓須還官今勘官及戶部所奏皆是體國之誠非有他也上曰朕已知之須從寬處臣等辨論再四其言多不能悉記明日內批舊任各官降秩罰治有差雖免逮問而法亦正矣臣等奏對之際仰瞻玉容和霽天語溫厚略無所忤真聖明之度也逆瑾專政賣官鬻獄天下府庫之財半入其門為之謀者欲盡去官府簿書以滅其迹乃遣官以查盤為名因而易之既又令工部取在京諸司文卷鬻之為紙筋收其直以備支用不然則聚而焚之豫偶聞之謂李文正公曰圖籍國家所重古人草創之初尚先收之在今日顧欲棄之可乎一日瑾來閣中問之則曰近日部中有言文書積多無架閣處往往浥爛因有此議豫曰移之古今通積庫如何曰通積庫所貯非此類豫又曰聞承天門南千步廊亦有積貯文書何不移之於彼瑾憮然曰再議再議又明日聞取吏部文卷藏之千步廊矣祖宗朝凡開館纂修必選善書者供事授官後又擇其能者備內閣東西房之用東房典誥敕古之外制也西房典制敕古之內制也號為清流選多名士近世以來往往夤緣幸進有玷清華之地豫嘗不滿於斯今上新政初纂修武宗實録諸貴人各有所薦東南富家子弟多厚齎而來外議紛若豫謀諸同寅盡用科目出身者庶以杜奔競而清仕路疏下吏部會禮部考選鄉貢士二十人既而各授中書舍人亦有選入制敕房者諸生自視進身之正皆相慶兩房之官為之一清云吏部文卷及纂修考選二事久亦忘之近聞吕道夫方伯戴中書倫偶向人言及因附于此楊文忠三録卷四
