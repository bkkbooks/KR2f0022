body:
  text: 楊文忠三録卷八明楊廷和撰辭謝録四其官臣楊廷和謹奏為懇切陳情辭免恩命事本年三月二十五日節該欽奉手敕朕入繼大統賴爾內外文武勳戚大臣定策并迎立各宣忠悃保安社稷今山陵及徽稱大禮事畢宜加殊恩以答元功大學士楊廷和蔣冕毛紀首先定䇿忠義大節功尤顯著俱進封伯爵給與誥劵子孫世世承襲食祿一千石餘官如故俱仍在內閣辦事欽此恭惟陛下聰明睿知育德濳邸以憲宗皇帝之孫遵太祖皇帝聖訓奉武宗皇帝遺詔昭聖慈夀皇太后懿旨嗣孝宗皇帝之大位承纍朝列聖之大統名正言順天與人歸即位以來更化善治有繼志述事之大孝有撥亂反正之丕烈雖夏啓之敬承周宣之中興未可同日而語也臣以庸才叨居重任攀鱗附翼既自幸於逢時儋爵析圭敢希榮于延賞在小人有乘器之戒在臣下可貪天之功猥蒙聖慈特加甄録賜以元功之寵假以定策之名三復綸音萬倍兢惕伏望俯察愚衷收回成命俾臣仍守舊官供事數月庶幾身安而慮以舒惕出而咎可免其為賜實多受恩實大矣臣下情無任瞻天仰聖激切屏營之至嘉靖元年三月二十八日奉聖旨卿纍朝元老德望隆重當國勢危疑之際首定大策翊戴朕躬計擒逆賊濳消禍變中外義安功在社稷朕嗣統以來贊襄新政釐革宿弊罔顧利害備竭忠誠朕心嘉悅特加殊典以答元功宜勉承恩命用副朕倚毗至意所辭不允該部知道具官臣楊廷和謹奏為再陳情悃懇辭恩命事近奉手敕加臣封爵臣具疏辭免未賜允俞心切未安神如有失臣聞無非常之功難受非常之賞有無妄之福必致無妄之禍以封爵之典而加儒臣非常之賞也以論議之官而享世祿無妄之福也臣何人斯際兹盛事伏念臣供事內閣歷有嵗年中遭權姦相繼擅政事多至于變亂心徒切于匡持服滿召起之後姦黨愈熾政令所出不忍見聞卧病乞休疏凡十上私情未遂隱忍班行錢寧張鋭每每假傳上令脅制外庭期于必行以竊威柄每日票本擬進徑從豹房改出臣與大學士蔣冕毛紀隨事執奏多不奉行以此姦權切齒必欲中傷遂於先帝親征前二日揑寫聖旨令臣回話臣私竊自慶以為因此罷歸鄉里庶得免於陷穽乃復半夜傳旨慰諭勉留聞命之餘益增悲苦去既不得遂其情留又不能盡其職心口相語蹤迹孤危進退之間狼狽萬狀時慮家門之禍不止性命之憂將以即死為安寧有後來之望今則欣逢景運利見聖明羣姦伏法善人生氣臣之自視如出窮谷而登坦途去水火而就袵席室家相慶有若更生大造之恩沾被多矣又幸因攀附得效涓埃仰荷陛下之寵光上副先帝之委託豈敢過有希望以冒非分之賞速無妄之禍哉所有恩命決不敢受萬一皇上不察其情不聽其讓將使物議未平紛紛不巳是以朝廷報功之典為臣下多口之地於臣之心豈能安乎伏望聖慈特賜矜允臣雖不敢自謂勞謙之有終亦庶幾竊比知足之不辱此臣之願也亦臣之分也臣下情無任瞻天仰聖激切祈請之至嘉靖元年四月初六日奉聖旨卿在先朝隨事匡持備竭忠悃中外共知朕入繼大統實卿定策迎立計安社稷又能除姦弭亂寧一衆志功勳顯著前此所無封爵之加出自朕心宜勉承恩命以副朕報功至意慎勿固辭該部知道具官臣楊廷和謹奏為激切陳情容令辭免恩命事臣于近日兩次具疏懇辭新命節該欽奉聖旨封爵之加出自朕心慎勿固辭欽此聞命之餘益增兢惕臣惟朝廷懸爵賞以待有功無功不可以冒賞人臣懷仁義以事其上非義不可以自居君臣之間各欲自盡在上雖以一朝之饗為禮在下必以四維之間為重臣何人斯敢昧斯義竊念臣少小多病才識庸愚遭際盛時歷事列聖見今行年六十有四居官四十五年優遊嵗時遍歷華要以禁署為養老之地以官廪為代耕之資未有分寸之勞上答乾坤之造顛危是懼寢食不安鬱鬱于懷頻頻乞退何幸桑榆之景再瞻旭日之光身無懋德而受懋賞之恩功非康侯而蒙蕃庶之錫已且內愧人其謂何天道惡滿鬼神禍盈在小臣官卑祿薄尚計日月而敘遷况愚臣力小任重乃出格調而加寵此義之所當辭而心有未安也當辭而不聽其讓是速臣之去也未安而冒昧受之是自失其心也由衷之請倘未得從喪心之病恐或不免必得請而後巳惟引退之為決伏望皇上特賜矜憐察其迫切至情收回成命使之委蛇自適勉圗後功則上之待下恩禮既盡下之事上分義亦安矣臣下情無任激切懇請之至嘉靖元年四月初八日奉聖旨卿當國勢危疑之時首定大策翊戴朕躬除姦弭亂中外帖然扶顛持危竭盡心力近古社稷之臣忠謀偉績朕所簡知加以封爵實不為過而乃再三具疏辭免不允所請務勉受封以表朕懷該部知道具官臣楊廷和謹奏為哀號陳情乞恩致仕事臣近奉手敕加授封爵再三具奏激切堅辭天聽尚髙俞音未下淵冰在念寢食未寧竊念臣之事君以無隱為義上之待下以從欲為仁欲寵利者固人之同情好名節者尤人之志願五等之爵千石之祿在今日足為一身之榮在後日足為子孫之澤况以從龍而得似無續貂之嫌臣亦何心獨不欲此但義有所未當則心有所未安能薄厚饗者必危功成名遂者當退與其為一時之利孰與為名與其遺子孫以危孰與遺安再念臣自幼而病未老而衰近日以來困憊尤甚齒牙脫落言語差訛目既昏朦耳亦重聽神若有失事多健忘徒懷戀闕之情實切首丘之念氣盡詞竭不知所云伏望聖慈收回成命容令致仕得遂生還庶幾心志稍安不致狼狽無措既俯全于晚節將自詫於歸榮此愚臣之所以無隱於陛下而陛下之所以曲成乎愚臣也臣下情無任瞻天仰聖懇切哀號祈請之至嘉靖元年四月十三日奉聖旨朝廷禮待臣下功疑惟重卿倡義定策以續國統密計除凶以消禍變功在社稷事無可疑推恩加封義不為過乃具疏懇辭至于數四又遽欲棄朕託疾乞休似不念新政倚毗之切朕知卿勞謙雅志決不可奪但報德酬功朕宜從厚可不必至再固辭務受前職以紓朕情用贊維新之治著該部便擬爵名來看具官臣楊廷和謹奏為激切哀號懇乞致仕事臣辭免封爵之命疏巳四上節該欽奉聖旨朕知卿勞謙雅志決不可奪但報德酬功朕宜從厚欽此有命自天驚惶無地伏念臣之事君猶子事父孝子不敢言勞于父忠臣豈敢言勞于君以微勞而輒有非分之望是市井之事知禮義者不為也以文儒而冒受封爵之賞是屠販之類知亷耻者不為也禮義亷耻國之四維臣雖無一得之愚每以四維自勵嘗考之國朝故事及參之前輩傳聞文臣封爵舊不多見在天順初徐有貞以奪門迎駕封成化中王越以搗巢撲賊封即在當人之身已有追寢之命以一朝之寵乃易終身之辱以非分之福卒致無妄之禍臣雖庸劣自處亦審前日手敕初下即具疏上陳既而溫旨屢頒俱未蒙報可是蓋積誠未至素行未孚哀懇徒勤有言不信將舉平生而棄之寧不自愛或盡天下而非之亦復何辭因盛事而反為詬病有至情而未得體悉此臣所以啓處不安神志若喪矢心自誓顧影自慙衷曲不容於不伸陳情不嫌于屢瀆未奉俞音雖百章而未巳欲全晚節惟一去之為宜伏望天光下照洪造曲成收回異恩準令致仕使得從心所欲完璧以歸則從厚之恩雖沒身而永感難奪之志亦自信而不移矣臣下情無任瞻天仰聖哀號懇請之至嘉靖元年四月十六日奉聖旨朕以報功宜厚巳著定擬爵名來看欲卿勉受以紓朕情而乃屢疏懇辭決以去就朕不能強特允辭封全卿亷讓之節還寫敕褒諭賜宴禮部用表朕眷注至懷卿宜益竭忠誠贊成維新之治仍廕卿一子錦衣衛指揮使永遠世襲該部知道具官臣楊廷和謹奏為合辭陳情乞免恩命事臣等先因屢辭封爵獲奉俞音各改廕于錦衣俾永沾于世祿賜宴比鐘鼓之饗璽書榮華衮之褒感與愧俱以榮為懼即欲力陳情悃抗疏以辭時因再遣禮官宣諭而出慮愚衷之太激姑少待于經旬乃以兵部之言復有申命之寵倍增惶恐益重愆尤切念君臣之分以義而合辭受之間以義為主義有可受則萬鍾不辭心或未安則一介不取朝之廕敘明有彛章武廕必以軍功而加文官故無世襲之例國史備載職掌可稽臣等見秩俱崇階難更進先帝服制未滿燕亦未宜所有前項恩典臣等決未敢受伏望俯垂鑒照曲賜保全收回節次溫綸令以舊官供事謹祇承于德意將勉受于璽書汝諧汝往之文蓋嘗聞之舜典乃績乃休之諭幸再見于虞廷此則可以傳之四方而昭于永久藏之策府而裕諸後人者也臣等下情無任感激聖恩懇切辭免之至嘉靖元年五月十七日奉聖旨朕念國統未定事勢危疑之際卿等能同心協謀請于昭聖慈夀皇太后早決大策以安宗社其時逆賊江彬稔惡負罪尚握重兵心懷不軌禍機難測卿等又能乘時擒獲不動聲色濳消大變朕雍容入朝傳序繼統中外晏然𢎞濟艱難功勞懋著考之前史漢文帝宣帝繼承大統之後亦嘗加封丞相陳平周勃楊敞蔡義等邑戶我太宗文皇帝以尚書茹瑺有默相事機之功亦進封忠誠伯况大明律內明載出將入相能除大患盡忠報國者同開國功勳一體封拜朕前日敕加封爵義不為過第重違卿等雅志已準辭免朕心怏然賜宴進階及文武録廕略示朕報功之意卿等宜勉承恩命不必過為髙潔以傷朕懷所辭不允該衙門知道封爵之命五疏辭免仍改廕錦衣衛指揮使世襲方欲再辭兵部復有議處之奏乃合辭云云兵部奏辭節附于左兵部為乞允輿情議處恩廕事臣等竊嘗思之定策之名於臣下固不敢言而定難之功在諸臣亦宜首别當武宗毅皇帝疾劇彌留之時乃國祚安危之際其往日欺君誤國竊弄威權惡極罪大者人思脫禍之門朋姦附黨各持兩端者坐幸非常之變比聞晏駕而賓天益恐置身之無地逆謀已形于爪牙之環布事機惟在乎頃刻之奔逃萬一廟堂之上謀議不協機事不密姦雄之徒得逞所欲國家生民之禍固不忍言而三二密勿大臣之身家不首罹虀粉之殃而無噍類乎此等濳消禍變再安宗社之功尚不敢受封廕之報况濳邸從龍者已沐驟遷之曠恩禁掖舊任者久荷纍朝之殊眷加祿巳足酬勞廕後寧敢徑受顧今一槩廕以錦衣重職委于事體未安公議沸騰也諸臣之所以力辭言官之所以抗論亦坐是耳除見封侯伯者多係皇親及該吏部掌行臣等不敢論列外伏望皇上體念內外諸臣辭免之懇切俯從科道等官論奏之頻仍痛革錦衣衛所官員之積弊將前項敕內有如大學士楊廷和等量加别項恩典以為大臣忠誠之勸其費宏毛澄以下分别等第係文職者量廕應得文職如此則輕重適宜名器不濫庶于朝廷崇德推恩之盛典諸臣秉忠戒滿之本心而言官隨事納忠之専職咸兼盡而兩全且上符聖祖神宗之貽謀下息天下後世之訾議矣嘉靖元年五月初九日太子太保本部尚書彭澤等具題本月十二日奉聖旨楊廷和等既準辭伯爵在朕心尚怏然除廕子指揮千户外楊廷和再廕一子四品文職蔣冕毛紀五品文職各一人費宏廕一子七品文職各世世承襲本職楊廷和上進二階蔣冕毛紀費宏仍各進一階庶足朕報功之典以垂於永久其餘各官録廕俱有成命了便著該衙門擬授職銜來看再無煩擾具官臣楊廷和謹奏為衰病陳情乞恩休致事臣近以調攝不謹致生腹疾吐㵼交作上下俱病俄頃之際困頓不勝聲啞氣澌頭眩目暈偃卧直所乍起乍伏延至薄暮扶掖回家氣息僅屬自分必死荷蒙皇上憫念衰殘亟遣尚醫前來診視旋有大官之賜再厪命使之臨市肆歡傳比鄰動色天光下照疾眚頓消從此未死之年盡是更生之造其為感戴莫罄名言正當入謝大廷勉供舊職但念斗筲之才所容有限犬馬之用力盡則疲物且尚然勢不可強臣以能薄厚饗福過災生未老先衰因衰益病萬一前病不起必至輿尸而歸道路逶迤非旬月可至山川險阻有震撼之虞旅魂有知亦將自悔况臣之求退非始于今年而臣之陳情非止於一疏不能者止乃分之宜既老而休于義為當伏望俯垂睿鑒特賜生還成始成終謹祇承於異渥知足知止竊自附于前賢載歌嘉靖之休長享優間之福進退之義庶得以自全君臣之間真可謂兩盡矣所有前日廕敘等項恩命臣與同官别有會本辭免兹不敢瀆臣下情無任瞻天仰聖懇切祈請之至嘉靖元年六月十七日奉聖旨卿耆德元臣功在社稷望重朝野當先帝之世及朕嗣統以來懇切求歸章數十上中外共知朕為天下留卿倚毗方切比聞微疾旋即平復延佇入朝何忍棄去朕左右鴻臚寺便往諭朕意宜即日亟出供職益竭忠誠贊襄新政用成嘉靖之治以副眷注至懷慎勿再辭吏部知道具官臣楊廷和謹奏為乞恩放歸田里以全名節事今早聞新升山西按察司僉事史道因升官外任具本奏臣不知所奏何事竊念臣賦性愚直才識踈淺恭事陛下兩年以來自慶遭逢感激知遇知無不言言無不盡欲圖報稱于微涓不顧利害于萬一既不敢為市恩植黨之私又不敢為避怨逺害之舉名實未加使蹤迹孤危于下甘辛難和致謗詬叢集于身衆口鑠金積毁消骨昔聞其語今見其真所謂正人指邪人為邪邪人亦指正人為邪是以聖人畏讒説之震驚君子懼讒人之反亂詩書所嘆略同一揆今古相襲何能有定尚賴陛下聖明有罪無罪不能逃于淵衷之洞察也史道昔官諫垣不為不久即其既往無非可言之日而誣奏乃在五日之中何故日前反默默不言而今日遽嘵嘵自鳴邪去年夏中臣注門籍數日不出史道建言上聞請亟起臣以禆新政薦墨未乾謗書隨至一人之言自相矛盾豈臣期年之間遽易行改節如此之速而道之顛倒是非何如此之易邪黑白隨其點汚雌黃由其口吻陛下將何以聽之乎去年陛下登極釐革弊政誅殛罪人王瓊自知其罪未收先一日誣奏臣以求寬其誅當時史道論救王瓊陸完許泰自知公論不容外除後五日又誣奏臣以自解於人夫王瓊之罪臺諫所發也而誣臣以自脫史道之升吏部所擬也而誣臣以自解是臣之一身譬則射者之招也羣目睽睽以競射之其能有全招乎靜言思之誠可嘆也大抵位峻者勢顛功成者身退福過者災生亢極者有悔臣之一身犯此四纍雖無史道之言臣固知其難為自立矣草木遭霜不可以風過况以衰病之年當此隆重之任寒暑膏肓侵其內怨謗詬惡攻其外恐不知稅駕之所矣為臣萬全之計惟有一退而巳伏望聖慈念臣迫切之情容臣休退之請亟賜俞允不待終日免致頻煩聒瀆天聽則臣之名節庶幾可全而朝廷始終之恩感戴無極矣臣不勝激切懇請之至嘉靖元年十二月十四日奉聖旨卿以正學直道輔佐先帝隨事匡救備竭誠悃力止護衛諫止巡遊以死自誓不寫威武大將軍敕書綵帳不附權幸逼令回話先年聞父訃音旬日之內連章乞歸終制忠孝大節中外共知及國勢危疑之際又能計擒逆彬俟朕從容嗣統功在社稷更化以來議處大禮釐革弊政誅逐姦黨褒進忠賢知無不言罔顧利害勳望隆重朝野稱述簡在朕心方切倚毗豈可偶因一人挾私怨望讒佞排陷之言輒求休退鴻臚寺便往諭朕意即日亟出供職以副眷懷所辭不允吏部知道具官臣楊廷和謹奏為辨白欺罔懇乞休致以全名節事近聞山西按察司僉事史道奏臣不知其所言何事臣具疏辭免節奉聖旨卿以正學直道輔導先帝隨事匡救忠孝大節中外共知及國勢危疑之際又能計擒逆彬俟朕從容嗣統勳望隆重朝野稱述豈可偶因一人挾私怨望讒佞排陷之言輒求休退鴻臚寺便往諭朕意宜即日亟出供職以副眷懷臣聞命之餘無任感泣及史道奏下又奉聖旨史道這厮巳升外任却乃挾私怨望揑飾虛辭顛倒是非巧言迎合排陷大臣變亂國是好生無理臣拜讀之餘益增感泣夫臣之愚忠陛下既已信之道之排陷陛下又巳知之臣即死于九泉亦瞑目矣何用再有辨論但竊伏自念史道所奏上關朝廷之治體下關人臣之名節中關百僚之視效外關四夷之觀聽臣亦不容無言請以道之所以欺罔陛下者一一條陳之使中外臣民曉然知陛下所以信臣者非有所私而道之所以欺罔陛下者其言一至於此庶公道明而是非定邪説息而正人安其於嘉靖之治亦非小補也史道原任兵科給事中以本年十二月初八日升任山西命下五日乃有此奏官則外任本則內銜顛倒日期眩惑聖聽其誅語謂亟處漏網元惡以保社稷以回天變末語又謂請以身任欺罔之罪嗚呼寃哉讀之哽咽念之心痛殊不知臣所漏者何網所為者何惡謂臣才不能安社稷則可而危社稷之事則無謂臣德不能消天變則可而致天變之罪則無此其欺罔之一也道奏臣先年與劉瑾同在先帝春宫薦臣由學士升南京吏部侍郎尚書又因納賂傳取入閣臣自成化十四年入翰林供奉三朝歷升詹事兼學士入閣専管誥敕又充纂修副總裁經筵日講官當劉瑾用事之初為其所擠出為南京吏部左侍郎尋升南京户部尚書非吏部也先帝念臣舊學特降手敕召臣還任內閣時政權雖竊于劉瑾敕旨則出自先帝况先帝未出閣之前內閣會推官僚十人臣以官次名在第五劉健謝遷去任吏部會推入閣者五人臣以官次名在第四宫僚入閣自是舊例臣之資歷已三十年其去國也無罪其召還也無因後之承命而來猶前之承命而去也道乃謂與劉瑾同事此其欺罔之二也道又奏臣夤緣起復臣父于正德十年正月二十二日病故三月初一日聞喪次日移咨吏部以聞奉旨命吏部查輔臣丁憂留用故事來看臣即疏乞終制內云吏部自能據禮執奏朝廷必能以禮處臣奪情之舉不可為法此疏尚在可覆也又臣未丁憂之前朝議欲奪情都御史陳金掌都察院又奪情副使毛科任徐州兵備臣語同官李東陽曰我與公俱有親在不可開此路此言人皆聞之及臣丁憂後召命屢下屢辭而免以此自謂得守匹夫之志而道乃謂臣夤緣此其欺罔之三也道又奏宸濠護衛之復票旨雖不由臣未聞一言匡正夫宸濠逆謀臣料之久矣正德六七年間有鄉人除寧府長史相别之日臣令其勿通書問鄉里士夫多知之正德九年正月中聞宸濠獻燈於內又遣人親至豹房張設臣即言於管文書官謂王府無獻燈之例禁中非外人可至恐有姦謀不可不防及護衛之請臣與同官費宏極力諌止臣謂伊祖以謀逆而革劉瑾復之方才革還朝廷豈可又從其請費宏言本府近日馱載金銀數騾以謀此事聞者變色是日午後與費宏同出至承天門橋臣語之曰公今早數騾之言似太露昔人云但可云驪山不可遊不可云遊必有禍我輩但知護衛不可復銀之有無不必問宏因舉手揖謝此言常以告之同官可謂無一言匡正乎况護衛之復張鋭錢寧主之受賂明有招詞揑旨的有主名而道乃謂臣無言匡正及御史蕭淮上變之日臣與同官蔣冕毛紀舉趙府故事請遣官齎敕往諭令其獻還護衛及屯田當時人皆為臣危之比臣為朝錯比忌臣者為袁盎天祚宗社變早禍小罪人斯得臣自以謂庶幾少盡心於國事而道乃以為臣罪此其欺罔之四也先帝初議南征臣與蔣冕毛紀跪門留止謂宸濠姦計萬狀聖駕一出或鑿舟縱火變起倉卒或偽為迎奉誘至深宫進退不能內外不通異日之悔有不可言者既不能止乃命臣等寫威武大將軍總督敕書臣與蔣冕毛紀以死自誓謂太祖髙皇帝所以傳聖子神孫者惟是奉天承運皇帝六字未聞有此等名號誰敢犯萬死之罪下此筆邪有敢下筆者便須親自簽名進稿異日無相纍也既而命司禮諸臣及谷大用張永張鋭錢寧一日三至閣中申諭臣等堅執如前南行前二日遂令臣回話此在朝諸臣之所知也事之本末明白如此道乃謂臣無言此其欺罔之五也北伐南征兩次奉迎內閣俱無彩帳帳既無有安得有辭道乃謂京師人家尚有收藏者此其欺罔之六也道又奏臣不當以姚俊趙瑾張璽張綸諸人之罪入于詔中夫諸元惡得罪先帝臣與蔣冕毛紀恐其懼罪自殺得逭正法又或亡命脫走致生别患因密于詔書中擒之四方聞者無不稱快道乃謂臣受其財物璽之娼妾來家恐嚇且俊等之罪臣等發之也私受其贓而公發其罪似非人情况臣之愚戅任事直前既以身為萬人之敵受萬人之怨硜硜自守尚恐有人媒孽其短更敢貪得茍取自速罪戾乎此其欺罔之七也道又奏錢寧江彬之獄皆不朝審意臣恐其攻訐以揚巳惡夫錢寧謀取宸濠之子其事未有人昌言之者臣與蔣冕毛紀擬旨票出乃正其罪都給事中邢寰又請速正典刑江彬之罪亦臣與蔣冕毛紀密謀于司禮諸臣請皇太后懿旨擒之張鋭尚欲脅止其事幸而司禮諸臣極力贊助乃得就擒各人前後獄詞皆法司所上原無朝審之請而道以罪臣且假死囚臨刑之言而滅官府有據之案此其欺罔之八也道又奏臣強任定策之名親撰封拜之敕夫封爵之命本於德意手敕之下出于宸斷皆非臣等所與知力辭得免臣等方自以為少全亷退之節道乃謂臣為之此其欺罔之九也道又奏興獻帝皇字之號與夀安皇太后喪服之制皆臣議擬之失此等大事有先王之典禮儒先之議論屢經會議自有正論乃敢復肆詖邪之説于成事之後舉非禮之禮以損聖明之德此其欺罔之十也道又奏臣以勢強屬府部寺院等衙門吏兵二部尤被逼迫敢怒而不敢言夫謀王斷國大臣之事事有當言不容緘默若以私屬誰其肯從今府部等衙門具在試一問之曾否有一於是乎既云敢怒而不敢言道何由知之乎此其欺罔之十一也道又奏臣中夜受不資之物有誤扛送于東鄰者今東鄰具在試一問之送者何人誤者何與曾有是事否乎此其欺罔之十二也道又奏臣貪婪悖戾人以生與宦於四川者為不幸臣以為劉瑾江彬之惡亦不至是臣諸子皆讀書僮僕皆務農未嘗置田莊于鄰縣之境未嘗放私債以結怨于人嘗辭坊牌之建以修新都之城捐私家之財以修水利之堰城成而流賊適至所全活數萬餘人堰通而每嵗豐收所灌溉數千餘頃二事鄉人皆歌頌之至若三司府縣並無一事相干無怨無德人所共知道之言乃相反如此此其欺罔之十三也道又奏翰林學士久不推補臣待罪翰林四十五年升遷故事習聞之矣或以纂修或以考滿或以宫僚之選或以登極之恩無事而舉蓋不多見成化五年學士劉珝劉吉升吏禮二部侍郎後至成化八年方轉王獻等五人𢎞治七年轉程敏政等三人正德以來已兩次推舉皆出常調即以臣例之為六七品官者二十六年同年劉忠張澯亦歷二十七八年始升五品當時不以為遲人亦無為之聲寃者道之此言將誰為邪臣又自念素行不孚于人怨詬易集正德八年除授庶吉士先與同官議定然後下筆既而言者獨歸咎于臣夫以常例除授尚招人言分外推升能免物議况近來查革官員數多一有此舉彼將謂我武職官多所裁革爾文職官任意升補謗議一起彼此俱困矣臣之事陛下既不敢蔽賢以取罪亦不敢市恩以要譽如日講官例有金帶之賜臣等每因文書房官以轉逹于上無所避嫌也道乃謂臣因人不肯附已淹留不行推補此其欺罔之十四也道又奏臣薦吏部尚書石珤改任內閣為非臣之薦珤與蔣冕毛紀議而後奏非止為誥敕也以為珤學行老成先帝實録須珤共事况往年白鉞劉春皆以尚書改任絲綸之地不輕于吏部實録之重不減于選法此其欺罔之十五也道又奏南京兵部尚書廖紀以納妻一事斥辱不暇此事發之者言官處之者宸斷臣亦何所與邪此其欺罔之十六也道又奏臣勢逼史官任意增減陛下不以臣為不才使總裁史事十館纂修皆臣督領何謂勢逼是非筆削自有公論何謂增減况史事漏泄有重禁職掌在専官館在禁中事干密勿其成也置之于金匱其稿也滅之于水火其重如此道何所見聞何所傳受而為此言乎此其欺罔之十七也道又奏臣長男修撰慎今年代祀南行帶有一百八扛其實止十八扛香帛祝文領于禮部者七扛自帶衣服書籍十一扛一時同僚鄉里送出門外所共見者且慎以二月二十四日啓行三月二十八日到四川以三十四日之間行八十八站使行李重大何以能如此之速耶道又奏臣次男中書舍人恆齎詔南行帶五十八扛實則二十五扛亦衆所見聞者其中所藏皇上所賜五經四書性理大全諸書及朝廷大慶賀大典禮所賜段匹稠疊隆重之恩十襲百世之珍也如道之意似以為皆贓私之物此其欺罔之十八也道又奏臣姪禮部中式舉人恂罵臣為老檜老牛臣姪讀書知禮此言保其必無况少年未入仕途道亦未曽深交乃誣以此言離間骨肉此其欺罔之十九也道又奏臣知伊將欲論奏令臣壻編修余承勛屬編修葉桂章檢討季方止之夫道既有意害臣豈肯先自聲言臣安得知之若先自聲言便自有所要脅臣安得止之此其欺罔之二十也道之欺罔二十餘條其心實欲害臣一家言臣之二子是欲害臣子也言臣之姪是欲害臣姪也言臣之壻是欲害臣壻也攻一人而要譽于衆口害一家而取悅於羣心是誠何心哉是蓋為錢寧江彬報復為王瓊許泰報復為趙瑾姚俊張綸張璽諸姦黨報復也道昔在翰林為庶吉士臣考校比點有師資之誼平日往來禮貌無纖毫之嫌一旦以財多自纍患失為心沉迷冥惑以至於此不意聖明之世士風如此薄惡此風一長將見姦人橫議善類奪氣公道不明國是未定天下之事未可知也尚賴陛下聰明神聖渙發綸音折其欺罔此臣之所以且感且泣不能自已蓋不獨為一身幸而且為世道幸也夫陛下於臣之心事既已知之真而信之確於臣之身事必將念其始而保其終伏望俯察愚衷放回休致使臣奉身而退不貽玷於虞廷之臣鄰全節以歸庶有辭于益部之耆舊臣下情無任瞻天仰聖激切懇請之至嘉靖元年十二月二十二日奉聖旨卿輔佐先帝以及朕躬忠在朝廷功在社稷清德正氣讜論𢎞猷隨事著見中外傳誦至于律身處家之際動以禮法自持光明洞逹無愧古之名臣史道大肆欺罔挾私詆誣朕巳洞燭其姦又該吏部尚書喬宇等從公參看兵部尚書彭澤具奏辨論尤見公論難泯已别有旨拏問了覽奏具見卿以身體國事君不欺至意今四方多事國是未定豈卿避嫌求去之時吏部便往諭朕意宜即日亟出供職益竭勤誠展布四體贊成嘉靖之治慎勿再辭該衙門知道具官臣楊廷和謹奏為懇乞天恩放歸田里以全晚節事臣近者兩疏乞休皆蒙溫旨慰留又先後命吏部及鴻臚寺官枉臨臣家宣諭聖音令臣亟出供職臣拜命之餘不勝驚惕自惟庸劣何以得此於聖明哉鞠躬盡瘁分所宜然但人君之待下必體其情人臣之事上必量其力故上之恩禮有終始而下之自處無悔尤也臣少而多病老益無能斗筲之才寵祿已踰其分蒲栁之質神志日減于前目昏耳聾頭童齒豁非徒力不能強抑且心有不安宜從知足之針竊附能止之義既稍全于大體亦自息於微躬若復炫桑榆之末光極犬馬之餘力竊恐上無所益下自招損衆詬集而成瘡痍衆喣聚而漂山嶽身名俱困悔之晚矣况臣之歸計巳非一年里社風煙時發于歌咏親戚情話常存于夢寐若蒙聖慈矜念即賜俞允使得辭謝于闕庭優遊于鄉井則林下一日之安陛下所賜之一日也一嵗之安陛下所賜之一嵗也譬如倦鳥投林敢暫忘于清蔭渴魚得水忍少負於恩波哉臣下情不勝瞻天仰聖激切申請之至嘉靖元年十二月二十八日奉聖旨卿朝廷元臣德望素隆出處進退繫國輕重近因連疏乞休朕念卿以經濟宏才匡弼先朝輔佐新政備嘗艱險曲盡心力轉危為安功在社稷孤忠大節中外共知巳屢有旨慰諭為天下留卿如何今日又有此奏至以老病為詞覽之良用憮然還著吏部往諭朕意宜即日亟出供職用副朕惓惓眷倚至意所辭不允該衙門知道具官臣楊廷和謹奏為懇乞天恩以宥狂妄事近者山西按察司僉事史道具本奏臣節奉聖旨史道這厮已升外任却仍挾私怨望排陷大臣變亂國是著吏部便參看了來説及吏部覆奏又節奉聖旨著錦衣衛拿送鎮撫司問此非有私怒於道知道之所奏皆狂妄也臣三次具疏乞休節奉溫旨慰留又命吏部及鴻臚寺官枉臨臣家各再宣諭此非有私愛於臣知臣之愚忠無他腸也夫臣之心事陛下既巳信之道之狂妄陛下又已知之播之綸音傳之邸報天下皆將知之亦皆將信之公議以明國是以定何畏乎巧言何驚乎讒説哉但臣竊念之遏惡揚善固旌别之大法赦過宥罪亦寬大之美政况聞道有二母一向隨任在京當三春布德之始而道乃自投於囹圄當萬國朝賀之日而道乃不齒於簪裾在道之心將自謂怨艾之不及而道之母亦必將哀號之不巳此臣所以不以為怨而顧為道惜不徒為道惜而且為其母惜也伏望皇上念使過之義推宥罪之仁曲賜矜憐特從寬處使道移其勇鋭之氣而動心於改過用其果敢之資以從事於職業異日自效或有可觀是天地無棄物而成大成小各保其太和聖人無棄人而作好作惡同歸于皇極矣臣干冒天威下情無任隕越之至嘉靖二年正月初六日奉聖旨卿忠誠體國正大光明平生心事朕所素知史道挾私讒謗肆意誣罔自取罪戾卿乃為其陳奏懇乞矜宥具見奉公任怨休休有容之量待鎮撫司問明之日朝廷自有處置該衙門知道具官臣楊廷和謹題為謝恩事昨正月初六日欽蒙皇上遣奉御姚忠枉臨臣家賜臣羊二隻酒二十瓶拜受之餘無任感激切念臣近以衰病具疏乞休屢奉綸音再厪寵賜禮如三接當晝日以親承錫過百朋望天顔而起舞感深報淺恩重身輕既醉以歌慙無補于聖化羔羊之節期不負于平生除赴鴻臚寺報名行禮外謹具題謝恩嘉靖二年正月初七日奉聖旨卿耆德元臣偶罹讒謗纍疏懇辭特遣內臣頒賜羊酒用示朕惓惓慰安至意今具疏謝恩巳知道了具官臣楊廷和謹奏為乞恩休致以全晚節事臣近遭山西按察司僉事史道誣奏名節所關不得不辨疏乞休致節蒙溫旨慰留命吏部鴻臚寺官先後宣諭各至於再又命內臣枉臨臣家頒賜羊酒靜言思之且感且泣豈有涓埃之力少酬天地之恩况當萬方朝賀之日又舉南郊大祀之禮堅卧不出義有未安然勉強班行有靦面目偶聞御史曹嘉又上疏奏臣臣不知其所言者何事不過黨史道以求勝挾私忿以報復耳切念臣才微任重處非所宜寵祿巳踰分自當退况消息有盈虛之理進退有倚伏之機盛滿之餘悔吝必生數之所在人豈能違若退之不早縱免人非將有鬼責是無罪而有罪無禍而速禍矣巳且自厭人其謂何曹嘉與臣素無怨惡平日過從頗熟契分似厚史道奏臣之後兩至臣家謂是求全之毁何損盛德臣亦唯唯應之以為知已不意今日乃有此言相知者尚且如此不知者又將何如此臣所以茫然驚愕嘆人心之難測公論之不眀而大臣立身處世之無所措手足也其心之公私言之是非不欲與辨亦有不必辨者浮議不明于一二日之間必待昭于異日臣之迂愚不理于一二人之口已洞察於聖心臣復何言哉惟碩聖慈俯垂矜憐早賜退休以昌言者之氣以避賢者之路使股肱耳目相安於廟堂衰朽形骸獲歸於鄉井臣不勝感戴天恩激切懇請之至嘉靖二年正月十六日奉聖旨卿纍朝勳舊德望素隆贊理天工多施勞勛勿以人言見沮忠義便當亟出供職以副朕懷吏部知道具官臣楊廷和謹題為謝恩事臣以本月十三日具疏陳情乞恩休致十六日欽奉聖旨卿纍朝勳舊德望素隆贊理天工多施勞勩勿以人言見沮忠義便當亟出供職以副朕懷欽此本日又蒙聖恩遣內官監右少監婁斌親至臣家催臣即日速出且欲坐守以待拜命之餘不勝感悚緣臣衰病侵尋勢不能強又屢遭人言義不可出豈敢故違自取罪責除再行具奏陳情外先此具題謝恩伏惟聖眀俯賜鑒察臣下情不勝感激屏營之至嘉靖二年正月十八日奉聖旨卿肝膽忠義有功社稷公論難泯簡在朕心豈可以誣妄之言自生疑沮况內閣密勿之地典司政本卿與同官連日俱各辭避亦于事體未便朕甚不悅乃遣官催促責以大義宜遵朕命亟出供職慎勿稱疾固辭吏部知道具官臣楊廷和謹奏為衰病陳情懇乞天恩放歸田里事臣近日屢疏乞休節奉溫旨慰留加以勳舊之褒奬其忠義之氣又命內臣及吏部鴻臚寺官枉臨臣家宣訓各再聖情繾綣天語丁寧臣雖至愚豈不知髙厚之恩將勉圗涓埃之報哉竊伏自念進而必有退者理也盈而不可久者數也往而不可返者年也衰而不可強者力也臣歷任已四十六年行年已六十有五數窮理極年邁力衰窮極則舉動必招夫悔吝衰邁則聰明不逮於前時常恐叢脞萬幾坐廢三事自貽伊戚有負聖眀譬如負重任者力倦而休庶無困頓之患譬如泛巨浸者風起則止庶無覆溺之虞若沉迷不復貪冒不巳將至身名俱辱晚節盡棄上無補于明時下有愧于同類近不齒於鄉井逺遺誚于史册雖欲悔之亦無及巳伏望聖慈即賜矜允俾臣無抱憂鬱以傷餘生無重愆尤以負寵渥臣下情無任企望懇請之至嘉靖二年正月二十日奉聖旨卿朝廷元臣素負重望赤心為國功業顯著贊襄新政多效忠謀諸所禆益外廷雖不盡知而朕心洞察非人言所能離間近因卿屢疏辭避已遣官再四宣諭朕之視卿蓋如手足而卿必欲乞歸乃不能以腹心待朕于義安乎著吏部往諭朕意卿可即日亟出供職以副朕眷注至懷慎勿再辭吏部知道具官臣楊廷和謹題為謝恩事臣於本年正月十八日上疏乞休二十日節奉聖旨卿屢疏辭避已遣官再四宣諭可即日亟出以副朕眷注至懷欽此本日又蒙遣尚衣監右少監王成義枉臨臣家催出供職蓋自正月以來二十日之間巳三遣內臣宣諭聖意矣犬馬至愚尚知感德臣何人斯忍忘圗報但念臣年巳邁而病益增心欲前而力難強朽木徒施於刻畫枯荄枉被於華風熟復三思惟有一退除再行陳情乞休外先用具題謝恩伏惟聖明俯賜鑒察臣下情無任感激屏營之至嘉靖二年正月二十一日奉聖旨朕以機務至重要人辦理屢遣官催卿早出卿乃不體朕意再三辭避義實未安乞休之疏慎勿再上宜即日赴閣供職吏部知道具官臣楊廷和謹奏為謝恩事臣於今年正月二十一日欽蒙聖恩差內織染局右副使郭宣親至臣家宣諭上意催臣即時入閣供職半月之內命使四臨瞻望天顔不違咫尺聳聽嚴詔急於星火臣雖至愚無任感悚但臣衰病侵尋委難勉強除再行陳情乞休外先具題謝恩伏惟聖慈俯垂鑒察臣下情無任感激屏營之至嘉靖二年正月二十三日奉聖旨朕知卿忠義念卿有功輔導重地推誠委任退休之私決不可遂遣官再四宣諭意巳篤至而猶稱疾偃蹇髙卧朕甚疑焉陳乞之章徒煩筆札不必再上宜即日亟出供職以慰朕懷吏部知道具官臣楊廷和謹題為謝恩事臣近聞弟訃又遭女喪骨肉至情手足深痛􅍭哀茹苦填注門籍在家欽蒙皇上遣奉御姚忠特賜慰諭令亟出供職仍賜臣羊二隻酒二十瓶臣拜受之餘無任感激屏營之至嘉靖二年五月初七日具官臣楊廷和謹奏為辭免恩命事嘉靖二年九月初七日欽奉手敕少師兼太子太師吏部尚書華蓋殿大學士楊廷和輔翊朕躬勳勞茂著今以一品九年滿後又歷三年考滿特加太傅太子太師尚書大學士仍舊還寫敕奬諭賜宴禮部欽此臣聞命之餘實深慙悚竊惟朝廷之官以三公為重太傅之任視太師惟鈞邦國屬其經綸隂陽付之燮理在成周雖有而不備昔先正常讓而不居臣本以葑菲之才庸劣無取况薄桑榆之景衰病交侵今年二月初旬已歷三年任滿既局蹐而不得退又逡巡而不敢辭徒冒輔翼之虛名豈有勳勞之可紀寵祿彌厚愆尤愈多見職尚懼其不勝新秩又煩於申命縱是暮年之貪得敢忘天道之虧盈伏望皇上察其不容巳之情念其不可受之義收回成命用矜不能庶幾再效于涓埃或得少安於旦夕若乃鐘鼓一朝之饗喜溢班行絲綸一字之褒榮逾華衮舉先朝之舊典勵臣下以奮庸此則受之有名不敢過為虛讓者也臣下情無任瞻天仰聖懇切祈請之至嘉靖二年九月初十日奉聖旨卿纍朝耆舊內閣首臣精忠碩德輔翊勤勞功在國家望隆中外今一品九年後又歷三年勳績茂著朕心嘉悅特加重秩用示優崇宜勉承新命以副朕眷倚至意所辭不允吏部知道具官臣楊廷和謹奏為懇切隱情辭免恩命事昨欽奉手敕加臣太傅臣具疏以辭未蒙俞允捧誦溫綸倍增感愧竊念亢滿之戒不待明者而知出處之間尤以晚節為重臣少小多病本非夀考之人才力疏庸亦無逺大之望祇因遭際遍歷清華館閣之階今已十有五轉犬馬之齒亦已六十五年考功校能全無實效因衰求退屢有封章所以考滿之愆期正為衰殘之宜去豈謂非常之寵加於盛滿之餘聖明亟意于優崇薄劣實艱於負荷將來之嵗月無幾而平生之積纍自知一朝之好爵易縻而後世之完名難保眷言內省益切憂危愚臣自愛其身當知所擇大造曲成之妙宜體其情伏望聖慈收回成命使得從容自效尚有展布之圖進退有餘亦無亢滿之悔臣下情無任瞻天仰聖懇切祈請之至嘉靖二年九月十三日奉聖旨朕以卿元勳耆德望重台司弼亮忠勤多歷年所功存社稷澤在生民穹秩特加用彰殊眷卿乃以盛滿為懼懇辭至再具見勞謙成命巳下宜即祇承朕意從容展布贊成嘉靖之治再不必辭吏部知道具官臣楊廷和謹奏為懇切陳情辭免恩命事比者再上封章堅辭異渥積誠未至聰聽猶髙竊念臣任重才踈能薄厚饗歷俸徒多於年所獻功有愧於忠勤元勳之褒若與臣而無與耆德之諭亦非臣所宜蒙捧誦溫綸實深戰慓極知分量之已過有何勞效而撝謙粵若我朝歷數前哲多有祇承於列聖未嘗進秩於三公臣何人斯敢當是寵况衰頽之狀日以益增而休致之章嵗凡幾上顧求退而反進是惡滿而取盈當鐘鳴漏盡之時為䇿蹇驅羸之步不自虞于顛蹶將有負于聖明舉生平而棄之豈永譽之有望愆由自至悔其可追用是再瀝愚誠上干洪造若固辭而未允惟引去之為安伏望特賜矜憐曲成衰朽收回新命容守舊官沾周燕以歌呼願三熏而飽德領堯言之奬勵謹百拜以揚休臣下情無任瞻天仰聖懇切辭免之至嘉靖二年九月十六日奉聖旨朝廷設立三公之職以待忠賢共圗化理卿匡輔先朝贊襄新政備竭心力茂著忠勤勳績既多特加穹秩資望允宜何乃屢陳懇悃至以引去為辭鴻臚寺便往宣諭宜祇承恩命即日供職用副朕眷倚至意慎勿再辭吏部知道具官臣楊廷和謹題為謝恩事今日臣欽蒙聖恩賜宴禮部仍命尚書侍郎都御史侍宴者都邑歡傳縉紳交慶竊念鐘鼓既設侈燕饗之盛儀徴角具陳見君臣之相悅兹惟異數義不濫施臣以樗櫟之材又迫桑榆之景衰頽待盡懇切懷歸時以覆餗為憂日有素餐之愧乃因滿考揚大號於王庭爰舉舊章肆盛筵于華省公卿陪位俎豆生輝奏周雅于一朝陋羲圗之二簋大烹以養期以小人之腹而為君子之心既醉而歌願攄天保之誠以答鹿鳴之寵除赴鴻臚寺報名陳謝外謹具題謝恩嘉靖二年九月某日具官臣楊廷和謹奏為懇切陳情固辭恩命事邇者欽蒙聖恩加臣太傅三疏辭避未奉俞音萬倍憂惶莫知所措竊念力小任重仕宦之危機福過災生乘除之定數負而且乘者吝據非其所者顛臣雖至愚思之亦審譬如飲水冷暖自知比于加餐飢飽有量分量已踰而強進似非飢飽之宜心知其非而受之乃失冷暖之節臣見任三孤之首已極一品之榮俸祿如此其優任遇如此其久未有涓埃之效以答髙厚之恩內省猶慙人其何謂且君之使臣以禮臣之事君以忠與之名必欲求其實受其實必思稱其事使愚臣能盡二公𢎞化之責則自視何忝經邦論道之官况四方正當災異之時在三公亦有䇿免之義恩踰望外懼本由中臣前疏所謂若堅辭而未允將引退以為安者蓋悃愊之至情非遜謝之常禮也天髙聽卑仰祈矜念意盡辭竭不知所云臣下情無任瞻天仰聖懇切固辭之至嘉靖二年九月十九日奉聖旨自古三公論道具載祖訓朝廷設立此官正以待輔弼之臣朕以卿忠誠體國為時元勳崇德報功宜加異數揆之公論尤為允協而乃具疏辭免至于再四實出悃愊至情朕不欲強特允所辭以成卿勞謙之美吏部知道具官臣楊廷和謹奏為懇切陳情乞恩休致事臣聞大造之仁勞者必終之以逸聖王之政老者必與之以安故嵗晚務間者所以息勞物也懸車解紱者所以優老臣也臣以庸劣際遇聖明起進士歷今官已四十七年自入閣至今日亦十有八載雖華裾佩玉竊非據於穹階而臯壤山林恆不忘於私念去嵗一品三考重歷三年所以逡巡於移牘次且於引奏者為是故也旋承天恩特加殊寵強勉從事又復踰年盛滿之餘積為災戾嵗月益逝衰病益深邇者大禮慶成羣臣賜宴臣乃以河魚之疾不得隨儀鳳之班望闕瞻天不違咫尺延醫問藥又復連朝伏枕而思撫膺以慨賦受之分有限榮祿不可以久居圗報之心無窮精力不能以自強平時趨陪朝著竊恐顛仆班行居之遷延日以沉痼或者首丘未遂將至輿尸而歸謀身不審噬臍何及用是盡露衷曲昵就聖慈再切哀鳴上干聰聽伏望俯矜誠悃早賜歸休則乾始坤成永感洪鈞之造樵歌漁唱不為日昃之嗟矣臣下情無任激切懇請之至嘉靖三年正月十九日奉聖旨卿先朝重臣宏才師保朕承天命纘嗣厯運卿正宜恭天輔朕協力贊襄郊禮之成交慶不赴君臣會逹豈可避哉因公行之事故具章辭所請不準該部知道具官臣楊廷和謹奏為懇切陳情乞恩放歸田里事臣質本衰羸幼多疾疢每有短折之慮原無逺大之期偶以菲才謬登樞要再際飛龍之運幸隨附鳳之班病與寵以俱增憂兼榮而並集俯焉供職倐再踰年新嵗以來舊患增劇頭目眩暈步履艱辛耳目昏聾齒牙脫落懷歸日切愁思日加頃復上章冒干聰聽猥承溫詔未賜允俞然情有迫于由衷不能自止而辭巳窮于纍牘更欲何言竊念仕則慕君蓋人情之必至盈不可久亦天道之自然若神志既昏則筋力亦倦辟之服牛乘馬疲勞乃休又如渴飲飢餐醉飽而止縱忘貪得之戒可勝從事之難惟是謝寵以歸斯為便安之計况有餘之祿義合還之朝廷而未盡之年樂亦在乎林下伏望貞明垂照大造曲成矜其迫切之情遂其生還之願使臣仕有餘榮歸有餘間則臣生有餘樂死有餘休以覆以載兼天地以同仁曰食曰生合君親而一致載咏桑榆之景敢忘葵藿之私從今至死之年盡是感恩之日也臣下情無任瞻天仰聖激切懇請之至嘉靖三年二月十一日奉聖旨卿內閣首輔密務重臣故引疾據卧因政理相關連章具辭準致仕還鄉寫敕馳驛前去著有司月給食米六石嵗撥人夫八名應用前次有旨論功特與世廕等項恩典吏兵二部還議了來説該衙門知道具官臣楊廷和謹題為謝恩事近者臣具奏乞休節奉聖旨準致仕還鄉寫敕馳驛去著有司月給食米六石嵗撥人夫八名應用欽此伏念臣生於踈逺起自寒微以一介之庸愚竊四朝之榮遇秩更三少年望七旬屬慶會于聖明又遷延於嵗月賦受有限寵祿無涯瘝曠已多罪戾不少是以屢陳情悃上瀆宸聰重荷恩慈特蒙俞允褒以璽書之重賜以馳驛之華廩餼月支人夫嵗給假乘軒於出入叨素飽於安間日月回光景耀桑榆之暮陽和布澤春生蒲栁之姿寵若丘山難為負戴恩同覆載豈易名言臣將違逺闕廷瞻依霄漢載歌擊壤行隨野老之吟竊比華封遙祝聖人之夀臣下情不勝感激屏營之至除赴鴻臚寺報名恭謝外謹具本謝恩致仕具官臣楊廷和謹奏為謝恩事近準兵部咨先該臣具奏乞休節奉聖旨前次有旨論功特與世廕等項恩典吏兵二部還議了來説欽此續該吏兵二部會議覆奏節奉聖旨楊廷和既準辭封爵照前旨廕一子做錦衣衛指揮使世襲欽此聞命之餘不勝惶懼竊念人臣含章而從事乃職分之當然大君有命以正功實優崇之令典臣以庸劣蚤入仕途洊歷三孤供奉列聖晚際風雲之會親依日月之光時或隨事而納忠多是因人而成事詎意天光下逮猥蒙沛澤𢎞施封爵之頒堅辭得免文武之廕寵命重申尚遜避之未遑以衰頽而請老仰荷曲成之造幸遂生還特承曠蕩之恩再加世廕忽傳綸命聳聽鄉閭聖慈不棄于箸簪刻畫誤施於朽木厚價以市駿骨將歆動于士心仕宦而執金吾叨賞延於後裔此虞廷功惟從重之德意周武仁不忘逺之盛心也臣受寵若驚以退為進瞻天仰聖謹頓首以陳詞結草銜環誓銘心而圗報臣下情不勝感謝欣戴之至謹具奏謝恩楊文忠三録卷八
