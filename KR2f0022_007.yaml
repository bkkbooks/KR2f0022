body:
  text: 楊文忠三録卷七明楊廷和撰辭謝録三具官臣楊廷和謹奏為陳情懇乞聖恩早賜放歸田里事臣于去年十月到京具疏乞休節該欽奉聖旨宜即日入閣照舊供職再不必辭欽此時聖駕在外未敢再辭已于十一月二十日到任勉強辦事已經三月緣臣稟賦素弱年少之日疾病交攻前年丁憂回家經營先臣喪事益覺衰憊繼後奉召來京沿途衝冒風雨兼程前進舊疾轉加近日以來心煩咯血四肢麻木耳鳴重聽兩目昏花言出于口輒自惶惑心有所念旋復遺忘首丘之情日以迫切藥餌時進猝未見功竊伏自念臣材不逮于中人位已登于極品力小任重福過災生貪冒寵榮積成罪戾滿盈招損理勢固然若不自陳退休誠為有負委任伏望皇上俯察愚衷早容致仕榮祿既謝則災眚自輕心志既安則醫藥自效自今以往或得少延殘喘休息林泉皆陛下生成之賜也臣下情無任瞻天仰聖激切屏營之至正德十三年二月十六日奉聖旨卿元臣碩德望隆中外復任以來朝廷尤切倚注豈可屢次引疾求退宜即出供職再不必辭吏部知道具官臣楊廷和謹奏為衰病不能供職懇切祈恩早賜放歸田里事臣近者疏乞休致節該欽奉聖旨卿元臣碩德望隆中外復任以來朝廷尤切倚注豈可屢次引疾求退欽此拜讀溫綸且感且泣竊念臣之事君必欲盡其義上之使下必欲體其情臣以衰病虛羸困伏枕席一聞大行慈聖康夀太皇太后大喪呼天號地無所逮及義不容于不出悲痛之餘舊患轉劇飲食減少醫藥無效朝夕思念惟望生還情不容于不退况臣德不稱位名浮于實自承召以來復任四月在告六旬師保具瞻豈素餐之地樞機重任非養病之官內自省循實孤倚注遷延既久罪戾愈深皇上雖曲賜優容神明將默加譴責或至纒綿不起終為自負聖恩伏望俯垂鑒照特降俞音憐其哀苦之鳴俾遂首丘之願臣生而自慶當曝背于田間死若有知亦感恩于地下臣下情無任瞻天仰聖激切祈請之至正德十三年二月二十一日奉聖旨朕以卿纍朝耆德方切倚毗况兹多事之時正宜盡心匡輔何乃屢疏固求休致宜照前旨即出供職再不必辭吏部知道具官臣楊廷和謹奏為激切陳情懇乞聖恩早賜生還事臣屢疏乞休未蒙俞允顧承優詔慰諭過情寵以耆德之褒責以匡輔之義伏讀感泣不知所云謹瀝血誠再干洪造九重之聽雖以屢瀆為嫌匹夫之情期于得請乃已竊念人臣事君必精力強健而後能興起事功必神志安和而後能展布自效臣以蒲栁之質百病交攻寒熱往來怔忡眩暈耳目昏瞶手足頑麻步履艱難語言謇澀精神恍惚事多健忘喘息茍存奄奄待盡若復忍旦夕之命叨冒寵榮䇿虺隤之軀勉強長路顛蹶自取罪戾彌增豈惟孤纍朝眷遇之恩抑亦負皇上倚毗之意况今忠賢在位夀俊滿朝臣之才識不足為有無臣之進止不足為輕重陛下勉而留之既不得乞骸以去又不能力疾以出困伏枕席日益沈痼死而後已悔其可追伏望特賜矜憐許令休致幸得生還鄉里庶幾調理殘軀凡桑榆未盡之年皆天地曲成之賜也臣下情無任瞻天仰聖激切祈請之至正德十三年二月二十五日奉聖旨耆德去留繫時輕重卿既為朝廷倚注正宜以身體國豈可纍求休致著鴻臚寺即催出供職再不必辭吏部知道具官臣楊廷和謹題為辭免恩賞事昨日欽蒙聖恩賞大學士梁儲蔣冕毛紀及臣各銀五十兩紵絲二表裏新鈔三千貫聞命之餘惶恐無地切念臣自正月十四日患病填注門籍至二月二十二日恭聞大行慈聖康夀太皇太后崩逝于二十三日力疾趨朝拜聽遺誥當即隨衆散出梁儲等題銘旌之時臣實不與誤蒙厚賞心切未安伏望聖慈俯垂鑒察將前項賞賜等物收回內帑以待有功臣下情無任激切惶恐之至謹題請旨正德十三年二月二十八日具官臣楊廷和謹奏為衰病日深伏枕陳情懇乞聖恩早放生還事臣稟賦素弱早年多病初不自料得至今日兼智識庸下才力綿薄亦不自料得至今官際遇聖明誤蒙擢用官登一品年至六十福祿過分神明降災自去冬以來百病交攻兩耳重聽頭目昏暈手足頑麻咳嗽吐痰鮮血交下纍次陳乞休致節蒙溫旨慰留又命鴻臚寺官宣諭催出天地之大雖曲賜于生成蒲栁之質實難堪于負荷近日以來又感冒寒疾發汗過多氣體益虛精神益耗困卧枕席以日為年醫藥無功飲食少進家鄉萬里夢寐常懸反復思惟情實悲痛竊念人臣事君受一日之祿則任一日之事當一事之任則盡一事之職臣自復任之後供事未及兩月在告且已半年歲郊時享有事如看牲分獻陪祀諸大禮皆不能隨駿奔之列太皇太后大喪如題銘旌上諡册諸大事亦不能與執事之勞飽食深居虛糜厚祿欲出則不能欲去則不得氣息奄奄坐以待斃曠官廢職一至于此傳之天下將謂陛下以高爵厚祿待衰病之士以隆恩殊禮寵尸曠之官是上之用臣徒取其備員不責其實效而臣之事上徒志于富貴不顧夫死生其於聖上知人之哲所纍誠不小也伏望特垂睿眷早賜生還使得延喘息以歸故鄉委殘生以還造化臣之感恩荷德雖九泉亦不能忘也臣下情不勝激切哀鳴瞻望祈請之至正德十三年五月二十五日奉聖旨卿偶有微疾宜善加調理痊可即出供職以副朕倚毗至意所辭不允吏部知道具官臣楊廷和謹奏為衰病迫切懇乞天恩早放生還事臣近上疏乞休未蒙俞允特遣官醫前來調治又遣內臣頒賜蔬米等物伏枕聞命且感且泣天高聽逺下情莫通積病之餘益增憂苦切念人君使臣不強其力之所不能人臣事君必審其力之所能盡臣以庸劣叨冒榮寵已四十一年隨侍陛下春宫至今二十二年矣德薄厚饗福過災生百病交攻日甚一日炎暑長天困卧床褥奄奄待盡以日為年數月之間疏凡五上沈痼之狀前已備陳見今痰氣喘急起坐艱難遍體皆痛虛汗不止蓋枯朽無發生之望衰頽無再壯之期惟圖暫息于林泉庶或少延于殘喘况不退一日則受一日之祿抱病一日則曠一日之官無功而受祿神理之所不容受任而曠官物議之所不免陛下既用之于少必將優恤其老既寵之于始必將保全其終萬一強而留之決未能出徒使久注門藉而稱號朝官長卧私家而冒支官廩憂鬱日積災眚日增或至輿尸而還豈不顛沛道路臣之庸愚不知量力自處以至于斯固不足恤竊恐於陛下知人之哲保全之恩兩有所負也情苦辭切不知所云伏望天光下照大德好生體臣控訴之至情驗臣衰病之實迹特垂矜憫早放生還則臣之一身自首至踵毛髮齒骨皆皇上之賜也臣下情不勝激切哀鳴之至正德十三年六月二十五日奉聖旨卿之名德簡在朕心正宜以身體國用副倚毗至意豈可偶因微疾纍疏求退宜更加調理痊可即出供職再不必辭吏部知道具官臣楊廷和謹奏為衰病陳情懇乞天恩早放歸田以全生命事臣自今年正月以來舊疾舉發又患傷寒填注門籍在家調理前後且半年矣奏疏屢陳俞音未下五月二十五日欽蒙聖恩遣太醫院院使施鑑院判盧志前來看視診得臣六脈虛數見患痰嗽咯血頭暈脊疼手足頑麻耳鳴眼昏脾胃虛弱等症日每用藥調治六月初五日又蒙遣鴻臚寺卿張昱親詣臣家到臣卧榻看臣病勢驗亦相同體悉之念至再至三保護之恩如天如地伏枕叩謝涕泗交流顧臣何人得此榮遇每感激以自誓將圖報于終身何忍違天日之光就丘園之陋舍卿相之貴伴田野之夫但病根已深病勢日重昨于二十五日早陡然昏迷眩暈狀如痰厥良久方醒呻吟困憊度日如年既不得陳乞以去又不能勉強以出皇上將欲寵之而無受寵之地將欲用之而無效用之力譬如春生之化枉費于枯株雕刻之功難施于朽木生為尸素之官死作遊魂之鬼言念及此實自悲傷臣又竊念閭閻小民皆以親喪為自盡以送死為大事前日太皇太后大喪天下臣民如喪考妣奔走哭臨率土皆同臣身為大臣職居禁近自初喪以至發引多是卧病之日自頒誥以至祔廟曾無分寸之勞偃息在床背若芒刺此又臣之所以惕然內省心口自訟者也伏望皇上憐臣懇切之至情念臣衰病之實迹早降恩綸放還鄉里將見播之大廷傳之天下皆知皇上優禮舊臣保全終始直與古之聖帝明王同符合德真清朝之盛典後世之美談也豈獨臣一人一家之私感而已邪臣下情不勝激切哀鳴之至正德十三年七月初一日奉聖旨朝廷倚任舊臣共圖治理卿豈可偶因微疾固求休致宜勉遵前旨更加調理亟起供職再不必辭吏部知道具官臣楊廷和謹奏為病苦陳情懇乞天恩早放生還事臣以衰病乞休疏凡六上詞已窮矣情已盡矣誠不足以格天信不能以自達哀鳴雖切聰聽未回控訴雖勤俞音未下近于六月二十九日又蒙特遣鴻臚寺左寺丞翟宗仁親詣臣家驗臣病勢此蓋知周萬物而體念尤切道濟天下而曲成不遺臣雖捐軀亦未能報臣委因憂勞之餘積成衰憊兼以傷寒之後出汗過多遂至痰火上攻精神恍惚飲食減少氣體益虛夢寐之中或作譫語影響之疑便生驚悸藥常在口身不離牀似無平復之期敢有生還之望然而下愚不移匹夫自信猶將呼天號地懇懇祈請者貪生之念未忘首丘之私固在也竊念逺方細民凡有情事未伸者皆得赴訴于上而臣近在左右顧不得自言其情聖明寧不照察之乎每嵗審録凡有情可矜疑者尚欲為之展轉求生而臣以乞歸未得乃將至抑鬱而死聖慈寧不憐憫之乎除于本月初一日已移咨吏部照例住俸外用是備瀝愚衷再伸前請伏望皇上普容光之照施大造之仁查臣節次陳奏之情出于真切宥臣積年尸曠之罪許以生還則桑榆未盡之年皆天地再生之賜也銜環之報縱莫效于生前結草之圖當不忘于死後臣下情無任瞻天仰聖憂苦激切哀號冀望之至正德十三年八月十一日奉聖旨大臣之義當以身體國今四方多事卿豈可屢次引疾決求休致宜照依前旨更加調理亟出供職以副倚毗至意再不必辭吏部知道具官臣楊廷和謹奏為懇切陳情辭免恩廕賞賜事該兵部送到謄黃欽奉手敕朕親統六師𠞰除外冦平靜四方內閣官運籌定議協力成功楊廷和梁儲蔣冕毛紀各賞銀五十兩紵絲四表裏還廕他子姪一人做錦衣衛世襲正千户欽此臣聞命之餘不勝慙悚竊念臣于去年六月中恭承召命以八月初三日啓行赴京至陜西地方聞聖駕有北狩之行又至天津一帶聞天兵有破敵之捷臣卧病舟中且疑且懼謂陛下屈萬乘之尊臨邉塞之險違兩宫之養親矢石之勞此臣子之深憂天下之大慮也所幸祖宗功德之厚深入人心陛下勇智之資本于天授致茲克捷事非偶然今日論功行賞之時遂有一視同仁之舉臣官非將領責異本兵前日幃幄之籌無所參也進止之議無所聞也奔走之力無所效也剿除之功無所與也卧病牀褥乞歸未得乃誤蒙陛下賜以無功之祿加以無名之賞傳之天下則天下騰議曰此不能分主之憂而欲貪天之力者也聞之將士則將士解體曰此以文墨之士而冒我介胃之功者也不惟大拂乎人情抑亦有虧于國典展轉思念實切驚惶所有前項恩廕賞賜斷不敢受伏望俯察愚衷收回成命非分之福既去則無妄之眚自消臣感恩佩德過于受廕受賞萬萬矣臣下情不勝惶恐激切之至具官臣楊廷和謹奏為激切陳情懇乞天恩放回致仕事臣自去嵗春初至于秋盡因疾在告屢疏乞休素行不足以取信于時微誠不能以自達于上哀鳴雖切聰聽未回勉出供職又復踰歲簿書從事廩祿虛糜曽無輔導之功以酬高厚之德職隨病廢病與日增見今鬱火上攻痰中咯血耳目昏聵步履艱難借聽而有聞扶掖而後進志有餘而才不逮心欲強而力未能每一思之愧汗交集竊念朝廷之委重于臣必將責其實用人臣之受知於上必欲盡其常職職業未盡不敢安其居績用無成即當聽其去此君臣之大義出處之大節也况廟堂實具瞻之地孤卿非養病之官愚臣本以積勞而致疾過寵而生災若復遷延歲時必至顛沛道路孽由自作悔其可追不惟自失進止之宜抑亦上負倚毗之意伏望皇上察臣再三之奏出于至誠憫臣煩瀆之情本于迫切特賜允俞放歸田里使得優遊林下歌咏太平則臣自今以後未死之年皆陛下再造之賜也臣愚無任願望祈請之至正德十四年三月十六日奉聖旨卿輔導年深德望隆重朕心簡在方切倚毗豈可偶因微疾纍求休致宜即出供職再不必辭吏部知道具官臣楊廷和謹奏為衰病陳情懇乞天恩早放生還事臣先後乞休疏凡十上天高聽逺未奉俞音情竭詞窮徒含憂苦竊念臣叨際聖明誤蒙簡用歷官一十四轉受任四十二年祿賜贍于一家恩封及于三世庸材小器初不自料得至今官多病早衰亦不自料得至今日正欲勉驅駑鈍少效涓埃奈何福過災生病隨日甚供事之日少在告之日多廩餼虛糜俸錢冒受一日不去則曠一日之官一日曠官則重一日之罪隱忍而不以自訟是謂之欺於心含昧而不以自陳是謂之罔于上欺于心則不能盡輔導之職罔于上則何以副倚毗之意言念及此天鑒實臨仰惟皇上曲成萬物體悉羣情不知何所取於臣而不聽其去何所棄于臣而不恤其愚邪伏望聖慈特垂睿覽憐其懇悃早賜生還則臣雖草野間居亦是瞻天之地死生自誓敢忘報德之誠臣無任激切哀鳴泣血祈請之至正德十四年三月某日具官臣楊廷和謹奏為辭免恩命事正德十四年七月十五日節該欽奉手敕少師兼太子太師吏部尚書華蓋殿大學士楊廷和加特進欽此臣聞命之餘驚惶無地竊念臣以衰病乞休未蒙俞允勉強供事又復踰時謀慮不達于事宜議擬未諧于宸斷因循官守以日為年慙愧班行以榮為懼豈意溫綸之下猥承特進之加此在散官號稱極品因考滿而受斯謂有名若幸會而得則為非分是蓋欲求退而反進將自損而更益豈不重增疢疾倍切憂危伏望聖慈特垂睿鑒收回成命俯徇下情庶得身心少安暫圖犬馬之報臣愚不勝激切感戴之至正德十四年七月某日奉聖旨卿清德正學體國忠誠功在朝廷望隆中外特加勳秩用示優崇宜勉承恩命益勤匡輔所辭不允吏部知道具官臣楊廷和謹奏為回話認罪事節該吏部題為印信事伏奉聖旨楊廷和推舉同鄉劉春替李遜學已有旨著另推如何日久不推著從實回將話來欽此臣聞命之餘惶愧無地臣先因內閣缺専管誥敕官員查得舊例多係挨次推用以此將南京吏部尚書劉春會同推舉劉春委係四川重慶府人與臣同鄉一時愚昧失於回避及奉聖旨叧推自合遵命即便叧推為當又因近來文書浩繁辦事不給兼以精力衰耗神昏健忘以致日久未推稽誤遲延罪當萬死伏望聖明俯察愚衷擴天地之量寬鈇鉞之誅臣下情不勝感恩戴罪之至正德十四年八月二十一日奉聖旨既回話認罪罷不必在懷便急出辦事該衙門知道具官臣楊廷和謹奏為衰病陳情懇乞天恩放回致仕事臣遭際聖明濫竽內閣一品歷俸亦既九年屢疏乞休未蒙矜允勉強供事因循至今疾病日深衰頽日甚痰嗽喘急昡暈健忘每趨朝過門步履蹇澀必扶掖而後進凡對人言語聽聞恍惚多再問而後知兼以器局迂愚才識庸下圖報雖切而宣力未能持論雖多而成功則少老疾之狀衆所共見情迫于中不容于不退也瘝矌之罪自知甚明義之所在不可以不退也竊念葵藿尚有傾陽之誠犬馬亦有戀主之意臣雖至愚比之草木鳥獸稍有知識仰承覆載之恩未效涓埃之報豈忍逺違光寵甘處林泉但以情不可強義不可乖難強而強之必有顛蹶之虞當退而不退必有負乘之咎見今朝覲考察州縣卑官倉庫小吏老疾者必退不職者必黜非徒以懲戒於既往抑亦以風勵於將來况朝廷為四方之極大臣乃百官之表臣所居者何官所任者何事顧以老疾而不去瘝曠而備員已且內愧人其謂何伏望皇上特垂睿覽俯鑒愚衷憐懇切哀鳴之情全始終優禮之義許退休于田里得調養于餘年則自頂至踵皆受恩之地自生至死皆感恩之日也臣下情無任激切祈請之至正德十五年二月初五日奉聖旨卿忠誠體國德望兼隆值今四方事殷謀猷贊畫勞績𢎞多朝廷方切倚毗豈可纍疏引疾求退宜照舊供職以副朕懷慎勿再辭吏部知道具官臣楊廷和謹奏為懇陳愚悃辭免恩命事臣近以九年考滿節該欽奉手敕著支大學士俸還與誥命復遣內臣李榮枉臨臣第特賜臣寶鈔五千貫白金五十兩彩段四表裏羊三隻酒三十瓶卓面五張者天光下濟睿澤曲流銜恩未酬以榮為懼切念臣自復任以來三年于比卧病之日十常二三報稱之勞百無一二衰頽日甚瘝曠愈深屢陳乞休之章未奉允俞之旨每欲再申前請顧以時事方殷清蹕未旋私情猶阻勉強就列荏苒踰時猥及考滿之期誤受非常之眷楮頒內帑饌錫天厨上尊養羊絡繹載道白金彩幣絢爛充庭拜受之餘戰兢無已竊以誥命之賜賁及重泉顯揚之恩加于三代實慰私願敢復他辭惟是受廩于官義當計功而食伐檀啓素餐之誚負乘有致寇之災臣今忝竊穹階已叨厚祿若更兼支五品益重汗顔大約五品一年之俸可為一家八口之供當財用匱乏之時正上下節省之日寬一分民受一分之賜省儋石官有儋石之儲伏望聖慈收回成命令臣仍支舊俸少安芻秣之情庶幾恪守官常暫效涓埃之報臣下情無任懇切祈請之至正德十六年五月初六日奉聖旨卿宏才碩德望實素隆弼亮忠貞朝廷倚重一品九年特崇恩禮用酬勞勩卿宜勉遵先朝成命以副朕眷注至意所辭不允吏部知道此疏十五年七月內進時先帝南征久未得命今上登極後乃得旨新政之初首蒙褒諭衰病餘生其何以為報邪具官臣楊廷和謹奏為自劾不職請賜罷黜以彰新政事臣聞之為政莫先于擇人擇人莫先于大臣大臣之黜陟既公然後百官之賢否可得而理也百官之賢否既明然後庶事之規模可得而正也臣資性迂愚器識庸下既無格心之學又乏救時之才輔政數年略無寸補丁憂去任再召還朝屢疏乞休經年卧病未蒙俞允益重愆尤于時四方靡寧百度多闕軍民困苦怨讟流聞揆厥所由皆在臣下臣當大臣之位為百官之首非臣之咎其誰之咎也恭遇皇上當繼統之初操威福之柄剗革前弊創立新規正百官以正萬民闢四門而明四目逺近有中興之望華夷仰麗正之輝惟是進退人才關係最重有如臣者黜罰宜先伏願陛下察臣懇切之情宥臣瘝曠之罪即日罷臣職任遣歸田里則臣之負恩于先帝者可以少贖懷慙于端揆者可以少釋既以彰聖治而開賢路又以警有位而懲無良朝廷之政令自此而一新天下之觀聽自此而一改臣雖在田里得見太平陛下之為賜大矣微臣之為幸多矣臣無任懇祈誠請之至正德十六年五月某日奉聖旨卿在先朝隨事納忠嘉謨令譽播在天下比者受遺定議擁護匡持除姦剗弊備竭勤誠有功宗社朕圖新治理方切倚毗卿宜展布四體共致太平用副朕眷注至意所辭不允吏部知道具官臣楊廷和謹奏為老疾陳情懇乞天恩休致事臣自近年以來齒髮漸改疾疢愈加志氣昏沈精神萎憊耳已迷于聽應目久暗于玄黃數月之間勉強供職武宗皇帝奄棄臣民雲雷方屯水火相息臣才非通變而值改革之時德不及人而當經綸之地憂惶之甚劇若飲氷機緘之難危於臨敵既無涓埃之助敢言退托之私幸逢陛下嗣大厯服乾元資始離照重明葵藿之誠向日雖切蒲栁之質望秋先零况勵精伊始而臣以衰病廢其官賢俊滿朝而臣以老朽與其列審已則宜退量力則不堪若更仰戀明時坐俟終日恐萬幾有叢脞之患三孤為瘝曠之員伏望聖慈憐臣懇切之情遂臣休退之願使得優遊田里歌咏太平則臣未盡之年皆感恩之日也臣下情無任感激祈請之至正德十六年五月某日奉聖旨卿忠清公正德望素隆翊戴勤勞功在社稷朕初嗣位方切倚毗豈可暫離左右今乃屢疏引疾乞休元臣體國之義恐有未安鴻臚寺便往諭朕意即出供職以副眷懷所辭不允吏部知道具官臣楊廷和謹奏為懇乞天恩俯憐誠悃容令休致事臣聞力不足者中廢老將至而耄及昔誦其語今驗諸身臣積老而衰積衰而病今年轉篤入夏彌加昨具短疏上陳冀蒙俞旨下允豈意天言曲奬聖澤洪流伏讀再三憂惶萬狀臣有何德而稱以公清忠正臣有何功而許以翊戴勤勞屢遣禮官趣令供職責以體國之義歆其報德之心顧名實之有乖致罪戾之益重已且內愧人其謂何竊念明良相逢古今盛事當聖明臨御之日正臣工勵翼之時臣以菲才謬膺重任置諸左右實資啓沃之勤委以腹心莫副倚毗之切雖竭駑駘之力以驅末路畢桑榆之景而奉休光分所當然死亦何避但病隨年至身與願違匍匐未能支持不可因循既久瘝曠愈深不惟自負于初心抑且有妨于新政仰祈睿鑒俯察微誠賜骸骨以全歸永荷生成之造視手足以相待能忘舞蹈之誠臣下情無任懇切祈請之至正德十六年六月某日奉聖旨卿輔翊朕躬勳德隆重精忠直節中外共知屢次引疾乞休已有旨再四慰留况今更化之初機務日殷方切倚任宜仰體眷懷亟出供職用副平生愛君許國至意慎勿再辭吏部知道具官臣楊廷和謹奏為衰病陳情懇乞天恩休致事臣聞事君以忠期盡瘁而勿恤不能者止懼陳力之難勝臣以菲才遭逢盛世歷任一十五轉在官四十四年猥蒙四朝之恩久玷三孤之位自從召起卧病上請者凡十二章今事聖明陳辭懇乞者亦已三疏數蒙恩詔曲賜慰留申命禮官枉臨宣諭竊念先帝之山陵未舉皇上之哀慕方深強扶衰羸黽勉從事遷延彌月轉益舊痾雙目漸昏難奉十行之札兩耳重聽罔禆四達之聰陛下之眷遇方隆而臣之筋力已耗太平之氣象日盛而臣之福澤已盈敢貪廊廟之榮實切山林之想况老當致仕非以為名而病冀得間本其至願伏望聖慈早賜俞允懸車授杖永懷周澤之隆擊壤耕田載頌堯仁之庇臣無任激切懇請之至正德十六年九月三十日奉聖旨卿纍朝元老德望素隆翊戴贊襄功在社稷朕心簡注士論咸歸今方勵精圖治虛懷倚毗宜益竭忠誠展布四體助成維新之化豈可屢疏引疾遽求休致鴻臚寺官便往諭朕意即出供職以副中外之望慎勿再辭吏部知道具官臣楊廷和謹奏為自劾不職乞賜罷黜以正綱常昭典禮事臣聞有官守者不得其職則去有言責者不得其言則去臣忝為三孤之官謬當輔導之地凡諸司之所守者皆臣等之所當遵者也諸司之所言者皆臣等之所當行者也况典禮之大義綱常之大倫哉近者陛下欲追崇本生父母禮官據禮以守其職科道交論以正其言臣與同官蔣冕毛紀費宏等上稽古史之舊俯察庶言之同執奏再三不蒙采納續奉慈夀皇太后懿旨加帝后之稱既已力戰天下之公議曲伸罔極之私恩矣後乃再奉詔旨欲於帝后之上復加皇字臣等聞命驚惕不敢奉行隨即封還請從前議豈敢無禮于君取罪于已哉誠以典禮所係不可壞之於聖朝綱常所關不可廢之于今日也昔者魯夏父弗忌逆躋僖公其死也焚煙徹于上宋濮園之議論者謂韓琦歐陽修皆可誅夫生莫逃于公議死莫逭于天刑何也蓋人臣事君不以禮議禮不以正之鑒戒也臣于今日其敢效尤尤而效之罪又甚矣臣等縱不足惜奈陛下虧損聖德何聖旨謂卿等所陳皆推至義朕之所奉昊天至情又令臣等不必拘于史志臣思自古帝王入繼大統皆不行追崇之典豈忘昊天之情無罔極之恩哉而儒者之論亦未嘗議其不孝何也天無二日國無二統身無兩考尊無二上守此者謂之綱常行比者謂之典禮典禮一失綱常以隳拂萬方之心起萬世之議豈聖人以禮事親以孝治天下之道哉綱常典禮之在世譬如日月之在天不可以晦翳譬如江河之在地不可以壅塞自三代至今日萬古不可變非若制度文為一代自一代可以損益不相沿襲也豈可謂前史所載非今日之制而不遵哉臣素有病疾久欲歸休近日以來耳日重聽目日昏暗牙齒動搖肌膚消鑠道當止於不可力亦病于不能伏望聖斷䇿免還家則微臣進退之義既明而朝廷始終之恩益篤矣臣無任激切祈請之至正德十六年十二月二十一日奉聖旨卿屢朝舊德譽望素隆翊戴朕躬計安宗社輔導初政竭盡忠誠朕嗣大統猶未踰年方切倚毗共圖至治豈可以微疾遽求休退所言典禮當委曲裁處宜亟出供職以副眷懷所辭不允該衙門知道楊文忠三録卷七
