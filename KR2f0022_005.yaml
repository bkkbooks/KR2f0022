body:
  text: 楊文忠三録序元人者必有以貞其志浩其氣俟時以發其光明雋偉之烈大明當天羣隂退伏其非細故也大老石齊楊公起異童收早遇以有今師垣歉若嗇退焉其若怯吾不知其勇其晦之深也方正德間辟煽處公無私同出二司徒留部春宫舊德殆非其所也未數月先皇帝念之晉司徒又念之召入以為內閣公辭不可老以請又不可殿學孤卿荐恩異數公辭不可歸省少師翁又不可服憂存慰勤復未卒制使相屬于道亟以還公人者曰公胡為起也巡幸爭不草制載空勑符璽以行强之又不可公之危亦至矣忠誠所感竟有以諒其衷而强委重焉以竟收受遺定策之功健將驕兵元凶宿蠧夷劉翕戢之聲色俱泯之間鼎革之㑹也狄梁公為唐司馬公之為宋以期還我祖宗之舊功髙弗有而力辭世封焉公無南無去無怫心之任非所以為公南而入去而遄來怫而要諸道猷裕圖終𢎞濟艱難其弗遺餘力矣君子在治在亂若鳯潜升貞利龍之所以亨道消息爾矣公前後五十餘疏俊竊觀危孫之機今天子明聖遐隱畢宣危言亢志百世一時也俊以徵之天下士而集思廣益則願之於公公無讓哉公戊戌進士前輩稱榜中得人一公可也晨星落落同時亦僅俊故以俊序嘉靖更元冬仲長至莆見素林俊書于兩槐寓隱欽定四庫全書楊文忠三録卷五明楊廷和撰辭謝録一南京户部尚書臣楊廷和謹奏為謝恩事臣於正德二年六月十四日准吏部咨節奉聖㫖南京吏部左侍郎楊廷和升南京戶部尚書欽此欽遵移咨到臣切照臣歷事三朝洊更八任冒居禁從久侍經幃器識凡庸性資愚戅朝夕講說時有瀆於聰明天地寬容每曲䝉於聽納近者轉官吏部躐授左銜赴任南京特令馳驛敢誇稽古之力極知遭際之榮曽幾何時驟膺峻擢敻出常調斷自宸衷皇上以人惟求舊為心視逺如近微臣以力小任重為愧受寵若驚切惟戶部乃國計所關尚書實經總其要兩京之政理繁簡雖殊官府之建置職掌則一况祖宗根本之地財用不可不充而東南困憊之餘民力尤所當恤顧茲重任宜得通儒豈意菲材誤承迪簡再命而傴甚欲循墻數日以來未敢視篆伏念大號之渙不可以中輟自天之益不容以故違欽遵成命已於本月二十二日望闕謝恩到任管事外仰窺聖意倍感愚懷豈以鉛槧之迂堪任金穀之事謂政事可以澤物因授之劇司謂經術本以濟時乃責其實效此造化曲成萬物之德聖主振厲羣策之機也臣敢不勉䇿駑疲用圖報效力不能强止則有辭臣下情無任瞻天仰聖激切戰栗之至正德二年八月某日奉聖㫖該衙門知道南京户部尚書臣楊廷和謹奏正德二年八月二十八日節該欽奉敕㫖特命爾內閣辦事敕至爾即馳驛來京毋或稽違故敕欽此欽遵已于本年十月十二日到京十三日朝見訖臣頃自翰林遷二南部曾未踰月驟掌戶曹吏事未諳方黽勉以自效聖恩無量忽寵渥之洊加特降綸音召入內閣顧茲纍朝之典傳自祖宗爰以舊學之臣置諸左右駭聞盛事歡動留都馳驛來京蓋逺懷于行役用人如渴乃申戒于稽違捧誦命辭感切心骨載瞻日表誓竭葵誠疊荷殊恩躐升穹秩竊惟內閣乃深嚴之地辦事則機務所關雖建官無宰相之名而責任有鈞衡之重非𢎞才無以濟當世之務非碩望無以服天下之心臣雖至愚嘗聞古訓德薄位尊者殆力小任重者顛以臣之才實類于是再三自忖愧汗交流伏望俯察愚衷收回成命别選茂異以副旁求庶皇上簡在之明仰無所負而微臣自知之義讓亦非虛臣下情無任感激惶恐之至正德二年十月某日奉聖㫖卿春宫舊臣學行素著特茲召用改户部尚書兼文淵閣大學士著在內閣同李東陽每辦事不必再辭吏部知道户部尚書兼文淵閣大學士臣楊廷和謹奏正德三年八月十七日欽奉手敕户部尚書兼文淵閣大學士楊廷和升少保兼太子太保尚書大學士仍舊欽此臣性資愚蠢學識迂踈遭逢聖明曲加甄録遂緣講讀之舊擢居密勿之司未及一年疉承異數服色之賜超出品流誥命之頒施及父祖受恩有同于山嶽圖報未罄于涓埃感激之餘愧悚無已忽承手敕兩晉穹階竊念孤卿乃𢎞化之官宫保有輔德之責實百僚之表率為天下所具瞻祿位愈崇委任亦重既踰涯分恐速過愆伏望皇上俯鑒愚衷收回成命俾臣仍以舊官供職庶斗筲之器不過於滿盈而駑劣之材亦安于驅䇿臣下情不勝感戴天恩之至正德三年十月某日奉聖㫖卿文學才行推重士林講讀輔導積有勞勩特茲加秩宜勉副任不必固辭吏部知道少保兼太子太保户部尚書文淵閣大學士臣楊廷和謹奏頃奉綸音大發宸斷公舉考察之典以正百官將求勵翼之明用熙庶績臣以庸劣遭際聖明召自南都超升內閣置諸左右委以腹心每感激于深恩思勉圖于寸報緣志有餘而學不逮故心欲進而力未能職在格心未有隨事納忠之益分當謀國又無濟時應變之才因循歲時虛糜廩祿面顔有靦寢食不安况朝廷勵精圖治之時正臣下兢惕思過之日臣謬膺三少任重百官內自省循曠瘝為最㑹茲考察罷黜宜先用是仰瀆睿慈俯察誠悃特加體悉早賜退休豈惟矜其不能實足遂夫私願蓋審已量力非敢要知止之名而推賢讓能亦竊附效忠之義臣下情無任懇切俟命之至正德四年三月某日特奉聖㫖卿學行俱優方隆輔導宜盡心供職以副朕懷不必固辭吏部知道少保兼太子太保户部尚書文淵閣大學士臣楊廷和謹奏正德四年五月十四日節該欽奉手敕皇考實録修完他每勤勞總裁楊廷和加升俸二級餘俱如舊欽此臣聞命驚惕莫知所為伏惟孝宗敬皇帝聖德神功卓冠萬世邇者奉命纂述臣以職事叨與總裁雖嘉謨善政嘗親得于見聞而陋識淺才每自愧于揚厲久稽嵗月方就簡編省躬實切于憂危妄意敢圖于榮寵猥承聖眷曲賜優容顯布綸音特加俸級宴賞之典至再至三高厚之恩如天如地在皇上以顯親為孝不遺臣下之微勞在愚臣以敬事為心惟知職分之當盡况臣力小任重輔導無能福過灾生滿盈當戒伏望收回新命令臣支俸如舊勉圖後效以報大恩臣下情不勝激切感戴之至正德四年五月某日奉聖㫖先朝實録已完卿數年勞勩功績昭著特加升賞毋負朕意不允所辭該衙門知道具官臣楊廷和謹奏為乞恩省親事臣以庸劣遭際聖明簡置內閣畀以重任比及三年尚無寸補誓當委身圖報豈敢輒便言私臣父春原任湖廣按察司僉事致仕見在原籍四川成都府居住近䝉聖恩加封少保兼太子太保戶部尚書文淵閣大學士今年七十五歲臣自離家復任已及十年路途遙逺音問稀闊昨于正月二十二日得臣弟廷宣寄到家書說稱臣父自去冬以來痰嗽舉發身體尫羸每思及臣涕泣交下臣竊念此疾非老人所宜以烏鳥之私情迫桑榆之暮景連晨纍夕寢食弗寧展轉于中不能自已伏望聖慈俯矜愚悃容臣暫回原籍少視起居躬調湯藥幸䝉洪庇臣父獲遂安全臣即當依限赴京勉圖供職庶免于徇祿忘親之咎亦可盡輸誠報國之心臣舉家父子兄弟不勝感激欣戴之至正德五年二月某日奉聖㫖卿以父病具奏歸省情詞甚懇已悉孝誠但輔導重事而卿才德兼備精勤弗懈朕方委托豈可逺違左右宜安心辦事著太醫院選差醫士一人馳驛前去看視該衙門知道少保兼太子太保吏部尚書武英殿大學士臣楊廷和謹奏為陳情乞恩休致事臣以庸劣遭際盛時早塵侍從之班歷踐清華之任擢居祕閣未及一年猥沭殊恩驟加三少曾祖以下三代俱得貤封在臣寒門一時最為榮幸頃因父疾具疏乞歸復奉聖慈命醫馳視誓捐軀以為報雖至死而靡他顧以才器所拘驅䇿不進兼之稟賦素弱精力漸衰縱勉强于簿書終虛糜于廩祿竊見今春以來風霾示異雨澤愆期責在臣鄰實司其咎分宜䇿免更復何辭况思臣父年過七旬暮景侵尋喜懼交集臣於此時便當求去進不能效勞于國退猶可致養于親忠孝兩端庶幾一盡㑹有寧夏之變上厪宵旰之憂輒欲自陳其私似為避難而退義有不可情亦何安邇者首惡就擒餘黨悉定捷音一奏中外交歡蓋神謀制勝于廟堂而將士用命于閫外地方以寧人心大慰臣之求去此維其時敢陳悃誠冒瀆天聽伏望聖明俯賜矜察赦其曠瘝之罪遂其休退之情使養親得盡一日之誠則在臣亦無終身之悔臣當優遊林下歌咏太平倡率鄉人惇行孝弟感激深恩死而後已臣下情無任激切俟命之至正德五年五月某日奉聖㫖卿春宫舊臣學行老成才識素著輔導有勞今引親老病欲致養于終已曾命醫看視近因寧夏置鐇等作亂悉平皆卿代言之力足見忠孝至意允副朕懷照舊辦事不准所辭吏部知道具官臣楊廷和謹題為謝恩事臣于正月內因臣父春患病在家奏乞歸省荷䝉陛下以臣叨居近地不允回還特命太醫院選差醫士一人前去看視臣父聞命驚喜病體頓輕服藥以後遂底平復原差醫士徐宗嗣已于七月十六日回京復命訖臣竊伏自念世受國恩身承簡任既不獲問安嘗藥以盡私情又不能奉職宣力以禆聖化仰厪陛下推恩廣愛逈出常科勉以忠孝之心慰其喜懼之念深體羣臣而不棄曲成萬物而不遺自臣之身暨于子姓兄弟靡不銜恩佩德思欲為臣死忠為子死孝以報陛下天地生成之大造也臣無任銘心鏤骨感激慚悚之至除赴鴻臚寺報名行禮外謹具題謝恩具官臣楊廷和謹奏為陳情乞恩懇祈休致事臣以庸劣幸際聖明眷念青宫舊臣擢居內閣近地因循歲月已及三年仰惟皇上法祖愛民虛心圖治不意劉瑾蠧政害人有負委托中外積怨莫敢一言近因劾奏盡露姦謀皇上斷自宸衷明正其罪詔旨一下歡動市朝中間事情多關機務臣備員輔導責亦難辭緣臣才質踈愚智識短淺每日發下票本文書臣等委曲酌議擬㫖進呈務要宣布上德通達下情及至施行率多更易事與心違憂兼愧集虛糜廪祿寢食不安臣有父見年七十五歲致仕在家臣自今年以來兩次上章懇乞歸養荷䝉寵眷曲賜慰留靦顔班行又踰數月伏望聖慈體察愚悃放歸田里以養老親别選賢才參預機務臣庶得少免曠職之愆當優遊林下歌咏太平自生至死之年皆感激聖恩之日也臣下情無任激切懇請之至正德五年八月十六日奉聖㫖卿纍朝舊臣春宫輔導學行聞望衆論所推自入內閣以來輔翊勤勞劉瑾専權壞事卿等委曲酌議多非得已朕已知悉宜安心辦事以副委任不允所辭吏部知道具官臣楊廷和謹奏正德五年九月二十日節該奉手敕寧夏叛逆事情內閣輔導重臣運籌合議大功既成宜加恩典少保兼太子太保吏部尚書武英殿大學士楊廷和加少傅兼太子太傅謹身殿大學士廕他男一人做中書舍人賞銀一百兩紵絲四表裏餘如舊欽此臣聞命驚惶罔知攸措竊念臣官居內閣已閲數年職在論思全無寸補因循歲月積纍愆尤內自愧于愚衷外有慚于公議屢陳求退未奉俞音邇者寧夏之平皆出神謀之斷聖功不伐顧假寵于迂儒詔旨渙頒拜申恩于後嗣穹秩列師臣之亞清銜進內殿之崇捧誦命辭益增愧悚心口相語寢食不安緣臣才尚未充德義何以為聖躬之傅已且不職弱息何以堪近侍之榮矧當經費之餘屢有節財之議縱未能捐俸以助國又安敢冒賞而懷慙伏望聖慈收回成命與其寵之過而納之罪戾之中孰若察其情而賜之和平之福庶止足之義微臣藉以自安而辭受之宜中心亦可少盡臣下情無任惶恐激切之至正德五年九月二十三日奉聖㫖卿輔導重臣忠勤茂著近者寧夏叛逆運籌合議致有成功官廕賞賚禮不為過不允所辭該衙門知道少師兼太子太師吏部尚書華蓋殿大學士臣李東陽等謹奏正德七年九月二十四日該兵部送到謄黃欽奉手敕直𨽻山東河南江西等處盜賊平定內閣官運籌定議致有成功李東陽楊廷和梁儲費宏各賞銀五十兩紵絲四表裏還廕子姪一人與做錦衣衛世襲正千户欽此臣等聞命之餘不勝惶汗竊惟論功行賞者朝廷之大典佐令代言者儒臣之常職比年以來各處地方盜賊蜂起上厪宵旰命將出師寒暑載更兵食俱困臣等職居禁近責在匡持既不能制亂于先幾又不克收功于一旦曠瘝之咎實所難辭幸遇陛下聖武神謨天人協相將臣效力逆黨就誅臣等厚祿高官安居飽食甲兵未被筆舌何功况武職之官必由軍功除授豈有徒操文墨輒可廕及子孫揆公議以難容撫私心而自愧除銀兩表裏臣等仰體聖心不敢辭避望闕叩頭外其廕子恩典斷不敢受伏望聖慈收回成命俾臣等自容于覆載之間庶可少效涓埃之報臣等無任誠懇激切之至正德七年十月某日奉聖㫖近年以來盜賊紛紜卿等出謀運䇿以致安平特官一子以酬勞勩可不必辭兵部知道具官臣李東陽等謹奏昨該臣等辭免恩廕未䝉俞允臣等竊惟賞必當功則人知勸才必當位則職不隳此為政之大端實天下之公議也洪惟我朝立法定制武職之授非軍功不得預其以文臣督兵討賊與大將同事者則有之若兵部職掌戎機預聞調度如有竒功異績間亦舉行臣等義在論思職兼撰述議擬之事類皆出於諸曹進止之機不過仰遵宸斷至于𠞰賊一事未嘗身任其勞彼京邉官軍親冒矢石歲歷炎霜每經萬死千生方進尺資寸級若使白面書生皆得錦衣世廕以五品官階之貴為一時幸㑹之榮將使衣冠相率以䝉羞將士聞之而解體若銀幣之賞本非所安臣等已仰體聖心强顔登受正以廕子恩命決不敢承故略虛辭務存實讓伏望聖明鑒察臣等幸甚舉家幸甚臣等不勝激切懇迫之至正德七年十月某日奉聖㫖成命已下再勿固辭該衙門知道具官臣李東陽等謹奏臣等兩次具疏辭免恩廕未䝉俞允命下之餘益增悚愧伏念朝廷推恩賞不可僣人臣盡職分所當然顧于辭受之間必視禮義所在臣等任非督戰職異典兵禁近從容未嘗親與驅馳之苦文墨議論安敢冒承矢石之功皇仁雖曲賜寵嘉臣子宜自知分限况乘時徼利乃壟斷之謀而非分取榮亦身名之纍在已自知不可物議其將謂何義實未安事非虛讓設若堅辭而未允則將引避以自明豈敢一朝以居致貽羣口之誚連章所具皆出悃誠伏望皇上早賜俞音收回成命庶少全退遜之節抑以長亷靜之風正德七年十月某日奉聖㫖卿等職司綸綍贊化勞心廕子酬功不為過當今纍疏辭還著吏兵二部㑹看了來說具官臣李東陽等謹奏近該臣等纍次辭免恩廕奉聖旨著吏兵二部㑹看續奉聖旨改廕六品文職臣等仰窺聖意俯悉下情謂匪軍功難承世職曲加裁處俾受文階尚有愚誠干冒天聽臣等竊惟廕叙之典非特有文武之分抑亦有厚薄之等比因羣盜肆惡遍歷諸方出入四五年間荼毒數千萬衆主憂臣辱安敢辭勞天佑人歸僅成克捷即今奸凶甫定凋瘵未蘇雖同率土之歡豈免向隅之泣若燕齊河洛之安靖以為臣等之功則川陜湖貴之縱橫復是誰歟之過推恩廕子誠所未安且以六品之華階何可一朝而驟至是用懇乞天恩並收成命使臣等安心于旦夕庶猶可圖報于將來臣等感恩佩德有過于受廕萬萬矣臣等不勝惶恐激切之至正德七年十月某日奉聖㫖朕以卿等勞勩特廕武臣堅辭不受今改文秩又動章文可不必辭該衙門知道具官臣李東陽等謹奏近該臣等纍次具本辭免恩廕未奉俞音數日以來心志不寧寢食俱廢向因武職専言著令之所無及改文階豈為微勞之當得且京朝六品地位清華若非科目之英才必是官曹之纍歷豈可一朝而驟致况于接跡以駢登臣等職在股肱義存匡弼正宜慎惜爵賞以示庶官何敢幸㑹功名僥於一得已不自克人其謂何用是再瀝衷誠冒干斧鉞蓋心有不安無以為展布之地事若不稱豈能逃貪冒之譏所有前項恩廕臣等斷不敢受伏望聖明矜察臣等不勝惶恐迫切之至正德七年十月某日奉聖旨已屢有成命了卿等宜勉順受再勿固辭該衙門知道具官臣李東陽等謹奏臣等再承恩廕纍具辭章曲荷綸音不䝉賜允若心無所愧豈敢故違但理有未安終當懇訴竊惟事有常職故任事者無侵官恩有常格故受恩者無愧色臣等所居之官論思輔導之職也目不識兵馬之數耳不聞金鼓之音足不履行陳之地身不冒矢石之險若文書之經由論議之關涉與戰伐攻擊坐作進止者同功而例論推恩以及家是以平居本分之勞冒格外非常之賞况臣等或已䝉廕録不可重沾或方歷嵗年未經久試捫心揣分實不能堪所有前項恩廕臣等終不敢受伏望聖明俯從愚請竝收成命以慰憂惶使臣等照常格守常職以圖報稱于萬一臣等不勝感激之至正德七年十月某日奉聖㫖卿等纍奏辭免特允所請該衙門知道手敕下後李文正公即具疏與豫洎梁厚齊費湖東二公連名辭疏三上得㫖改文階又三辭乃得允第三疏豫所草其餘皆文正公備録于此以示後人使知朝廷優禮輔臣之恩且以見事之始末如此云楊文忠三録卷五
